workflows:
  ios-testflight:
    name: iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # API key info passed via Codemagic Environment Variable Group
      # named "appstore_credentials". Create the group in Codemagic
      # dashboard → user avatar → Environment variables, with these
      # three vars (the .p8 PRIVATE_KEY var should be marked Secure):
      #   APP_STORE_CONNECT_ISSUER_ID         — UUID from App Store Connect
      #   APP_STORE_CONNECT_KEY_IDENTIFIER    — 10-char Key ID
      #   APP_STORE_CONNECT_PRIVATE_KEY       — paste the entire .p8 file
      #                                         contents (including BEGIN/END
      #                                         lines)
      groups:
        - appstore_credentials
      vars:
        # Capacitor 8 ships with Swift Package Manager — no .xcworkspace
        # and no Podfile. We point the build at the .xcodeproj directly.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.markforyou.app"
      # Capacitor 8 CLI requires Node >=22.
      node: 22
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        # SPM derived data — Capacitor 8 uses Swift Package Manager,
        # so this replaces the old CocoaPods cache.
        - $HOME/Library/Developer/Xcode/DerivedData
        # Distribution-cert private key. Apple stores only the public
        # half of an iOS Distribution certificate, so without a local
        # private key fetch-signing-files thinks every build needs a
        # NEW certificate. Apple caps distribution certs at 2 per
        # account, so by the third build we'd be locked out. Caching
        # the key here means subsequent builds reuse the cert created
        # on the first build instead of registering fresh ones.
        - $HOME/codemagic-signing

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Sync Capacitor (pulls plugin updates into ios/)
        # Capacitor 8 uses SPM, so `cap sync` regenerates Package.swift
        # rather than running pod install. No separate pod step needed.
        script: |
          npx cap sync ios

      - name: Set build number to Codemagic build counter
        # Each Codemagic build auto-increments BUILD_NUMBER.
        # CFBundleVersion is set to the same value so App Store
        # Connect always sees a higher build number than the previous
        # upload — Apple rejects duplicates.
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: DIAGNOSTIC — what does the API key see?
        # Uses explicit --issuer-id / --key-id / --private-key args so
        # we don't depend on the integrations system. Prints what
        # resources the API key has access to.
        script: |
          echo "=== API key auth target ==="
          echo "Issuer ID:    $APP_STORE_CONNECT_ISSUER_ID"
          echo "Key ID:       $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Private key:  ${#APP_STORE_CONNECT_PRIVATE_KEY} chars"
          echo ""
          echo "=== Bundle IDs visible to API key ==="
          app-store-connect bundle-ids list \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list bundle IDs)"
          echo ""
          echo "=== Distribution certificates ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list certs)"
          echo ""
          echo "=== App Store provisioning profiles ==="
          app-store-connect profiles list \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list profiles)"

      - name: Fetch (or create) signing certificate + App Store profile
        # Three-tier key resolution. Avoids the every-build "Apple
        # cap reached" loop by reusing the same distribution private
        # key forever, with two automatic persistence layers and an
        # auto-revoke fallback for orphaned certs.
        #
        #   1. ENV VAR (most durable). IOS_DIST_PRIVATE_KEY_B64
        #      stores the key as a Codemagic env var. Set once,
        #      survives cache eviction.
        #   2. CODEMAGIC CACHE (auto-persisted). After the first
        #      bootstrap we write the key into $HOME/codemagic-signing
        #      and the codemagic.yaml `cache:` block restores it on
        #      every subsequent build. Survives ~weeks of idle, no
        #      manual step needed.
        #   3. BOOTSTRAP (last resort). Generate a fresh key, ask
        #      Apple for a new cert. If Apple replies 409 ("you
        #      already have a current Distribution cert"), the
        #      script lists existing certs via the API, revokes any
        #      that don't match a private key we hold, then retries
        #      ONCE. No more manual revocation in Apple Dev console.
        #
        # On every bootstrap the key is ALSO written to both the
        # cache directory AND emitted as a build artifact, so the
        # user has the option of promoting it to an env var.
        script: |
          set -e
          keychain initialize
          DIST_KEY=/tmp/distribution_key.pem
          CACHE_DIR="$HOME/codemagic-signing"
          CACHE_KEY="$CACHE_DIR/dist-key.pem"

          if [ -n "${IOS_DIST_PRIVATE_KEY_B64:-}" ]; then
            echo "Using IOS_DIST_PRIVATE_KEY_B64 from env vars."
            echo "$IOS_DIST_PRIVATE_KEY_B64" | base64 --decode > "$DIST_KEY"
            BOOTSTRAP_MODE=0
          elif [ -f "$CACHE_KEY" ]; then
            echo "Using cached distribution key from $CACHE_KEY."
            cp "$CACHE_KEY" "$DIST_KEY"
            BOOTSTRAP_MODE=0
          else
            echo "==========================================================="
            echo "  BOOTSTRAP MODE — no env var, no cache. Generating a"
            echo "  fresh distribution key. It will be cached for future"
            echo "  builds AND emitted as a build artifact."
            echo "==========================================================="
            openssl genrsa -out "$DIST_KEY" 2048
            BOOTSTRAP_MODE=1
          fi

          # Persist to cache + artifact whenever we are about to ask
          # Apple for a fresh cert (i.e. bootstrap). Cheap to do
          # unconditionally so subsequent builds always have the
          # cache populated.
          mkdir -p "$CACHE_DIR"
          cp "$DIST_KEY" "$CACHE_KEY"
          if [ "$BOOTSTRAP_MODE" = "1" ]; then
            mkdir -p build/ios/ipa
            base64 < "$DIST_KEY" > build/ios/ipa/dist-key.b64
          fi

          # ── fetch-signing-files: first attempt ──
          # Capture stderr so we can detect the 409 "you already
          # have a current Distribution certificate" case and
          # auto-recover instead of failing.
          set +e
          FETCH_LOG=/tmp/fetch-signing.log
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:$DIST_KEY \
            --create \
            --verbose \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" 2>&1 | tee "$FETCH_LOG"
          FETCH_RC=${PIPESTATUS[0]}
          set -e

          if [ "$FETCH_RC" -ne 0 ] && grep -qi "already have a current Distribution certificate" "$FETCH_LOG"; then
            echo ""
            echo "==========================================================="
            echo "  Apple at distribution-cert cap. Revoking orphans (any"
            echo "  cert whose private key isn't the one we're using) and"
            echo "  retrying ONCE. Live certs that DO match our key are"
            echo "  left alone."
            echo "==========================================================="
            # The CLI tools accept a -k flag to limit revoke to certs
            # that don't match the supplied private key — exactly the
            # behaviour we want. Apple's cap is 2 iOS Distribution
            # certs per team, so this is safe in practice.
            app-store-connect certificates delete \
              --certificate-type IOS_DISTRIBUTION \
              --certificate-key=@file:$DIST_KEY \
              --ignore-not-found \
              --save \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" || true
            # Retry
            app-store-connect fetch-signing-files \
              "$BUNDLE_ID" \
              --type IOS_APP_STORE \
              --certificate-key=@file:$DIST_KEY \
              --create \
              --verbose \
              --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          elif [ "$FETCH_RC" -ne 0 ]; then
            echo "fetch-signing-files failed for a reason other than the 409 cap."
            exit "$FETCH_RC"
          fi

          keychain add-certificates
          echo "=== Installed provisioning profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || echo "(none)"
          echo ""
          echo "=== Patching Xcode project with profiles ==="
          xcode-project use-profiles --verbose
          echo ""
          echo "=== Signing config in pbxproj after patch ==="
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE|PRODUCT_BUNDLE_IDENTIFIER" \
            "$XCODE_PROJECT/project.pbxproj" || true
          if [ "$BOOTSTRAP_MODE" = "1" ]; then
            echo ""
            echo "==========================================================="
            echo "  Bootstrap complete. The key is now in the build cache,"
            echo "  so the next build will reuse it automatically (no env"
            echo "  var needed). For maximum durability — e.g. if you want"
            echo "  to survive a cache wipe — promote dist-key.b64 from"
            echo "  this build's Artifacts to IOS_DIST_PRIVATE_KEY_B64 in"
            echo "  Codemagic env vars (group: appstore_credentials)."
            echo "==========================================================="
          fi

      - name: Build .ipa archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Auth via the env-var group instead of the integrations layer.
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Uploads to TestFlight automatically. Apple's "Beta App
        # Review" runs for external testers (~24h) but internal
        # testers (you, your team) get the build immediately.
        submit_to_testflight: true
