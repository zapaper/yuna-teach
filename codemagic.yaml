workflows:
  ios-testflight:
    name: iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      # API key info passed via Codemagic Environment Variable Group
      # named "appstore_credentials". Create the group in Codemagic
      # dashboard → user avatar → Environment variables, with these
      # three vars (the .p8 PRIVATE_KEY var should be marked Secure):
      #   APP_STORE_CONNECT_ISSUER_ID         — UUID from App Store Connect
      #   APP_STORE_CONNECT_KEY_IDENTIFIER    — 10-char Key ID
      #   APP_STORE_CONNECT_PRIVATE_KEY       — paste the entire .p8 file
      #                                         contents (including BEGIN/END
      #                                         lines)
      groups:
        - appstore_credentials
      vars:
        # Capacitor 8 ships with Swift Package Manager — no .xcworkspace
        # and no Podfile. We point the build at the .xcodeproj directly.
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.markforyou.app"
      # Capacitor 8 CLI requires Node >=22.
      node: 22
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        - $CM_BUILD_DIR/node_modules
        # SPM derived data — Capacitor 8 uses Swift Package Manager,
        # so this replaces the old CocoaPods cache.
        - $HOME/Library/Developer/Xcode/DerivedData
        # Distribution-cert private key. Apple stores only the public
        # half of an iOS Distribution certificate, so without a local
        # private key fetch-signing-files thinks every build needs a
        # NEW certificate. Apple caps distribution certs at 2 per
        # account, so by the third build we'd be locked out. Caching
        # the key here means subsequent builds reuse the cert created
        # on the first build instead of registering fresh ones.
        - $HOME/codemagic-signing

    scripts:
      - name: Install npm dependencies
        script: |
          npm ci

      - name: Sync Capacitor (pulls plugin updates into ios/)
        # Capacitor 8 uses SPM, so `cap sync` regenerates Package.swift
        # rather than running pod install. No separate pod step needed.
        script: |
          npx cap sync ios

      - name: Set build number to Codemagic build counter
        # Each Codemagic build auto-increments BUILD_NUMBER.
        # CFBundleVersion is set to the same value so App Store
        # Connect always sees a higher build number than the previous
        # upload — Apple rejects duplicates.
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: DIAGNOSTIC — what does the API key see?
        # Uses explicit --issuer-id / --key-id / --private-key args so
        # we don't depend on the integrations system. Prints what
        # resources the API key has access to.
        script: |
          echo "=== API key auth target ==="
          echo "Issuer ID:    $APP_STORE_CONNECT_ISSUER_ID"
          echo "Key ID:       $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Private key:  ${#APP_STORE_CONNECT_PRIVATE_KEY} chars"
          echo ""
          echo "=== Bundle IDs visible to API key ==="
          app-store-connect bundle-ids list \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list bundle IDs)"
          echo ""
          echo "=== Distribution certificates ==="
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list certs)"
          echo ""
          echo "=== App Store provisioning profiles ==="
          app-store-connect profiles list \
            --type IOS_APP_STORE \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            || echo "(failed to list profiles)"

      - name: Fetch (or create) signing certificate + App Store profile
        # Explicit auth args — bypasses the integrations layer.
        #
        # The distribution private key is read from env var
        # IOS_DIST_PRIVATE_KEY_B64 (base64-encoded PEM, marked Secure
        # in Codemagic). Bootstrap behaviour: if the env var isn't
        # set yet, we generate a fresh key, run the cert creation,
        # AND base64-emit the key as a build artifact so the user
        # can store it in env vars for all future builds. After the
        # one-time setup, the same key is reused forever and Apple
        # never gets asked to create another cert — solving the
        # "Apple cap = 2, every retry creates a new one" loop.
        #
        # If you ever need to rotate: revoke the cert in App Store
        # Connect, blank IOS_DIST_PRIVATE_KEY_B64 in Codemagic,
        # re-run, and save the new key.
        script: |
          set -e
          keychain initialize
          DIST_KEY=/tmp/distribution_key.pem
          if [ -n "${IOS_DIST_PRIVATE_KEY_B64:-}" ]; then
            echo "Using IOS_DIST_PRIVATE_KEY_B64 from env vars."
            echo "$IOS_DIST_PRIVATE_KEY_B64" | base64 --decode > "$DIST_KEY"
            BOOTSTRAP_MODE=0
          else
            echo "==========================================================="
            echo "  BOOTSTRAP MODE — IOS_DIST_PRIVATE_KEY_B64 is not set."
            echo "  Generating a fresh distribution key. After this build,"
            echo "  download the dist-key.b64 artifact and save its contents"
            echo "  as IOS_DIST_PRIVATE_KEY_B64 in Codemagic env vars."
            echo "==========================================================="
            openssl genrsa -out "$DIST_KEY" 2048
            BOOTSTRAP_MODE=1
            mkdir -p build/ios/ipa
            base64 < "$DIST_KEY" > build/ios/ipa/dist-key.b64
          fi
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:$DIST_KEY \
            --create \
            --verbose \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"
          keychain add-certificates
          echo "=== Installed provisioning profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || echo "(none)"
          echo ""
          echo "=== Patching Xcode project with profiles ==="
          xcode-project use-profiles --verbose
          echo ""
          echo "=== Signing config in pbxproj after patch ==="
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN_STYLE|PROVISIONING_PROFILE|PRODUCT_BUNDLE_IDENTIFIER" \
            "$XCODE_PROJECT/project.pbxproj" || true
          if [ "$BOOTSTRAP_MODE" = "1" ]; then
            echo ""
            echo "==========================================================="
            echo "  ACTION REQUIRED:"
            echo "  1. Download dist-key.b64 from this build's Artifacts."
            echo "  2. Open it, copy the entire base64 string."
            echo "  3. Codemagic dashboard → app Settings → Environment"
            echo "     variables → group appstore_credentials, add:"
            echo "       IOS_DIST_PRIVATE_KEY_B64 = <paste>"
            echo "       (mark Secure)"
            echo "  4. Future builds will reuse the same cert. No more"
            echo "     'Apple cap reached' surprises."
            echo "==========================================================="
          fi

      - name: Build .ipa archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        # Auth via the env-var group instead of the integrations layer.
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # Uploads to TestFlight automatically. Apple's "Beta App
        # Review" runs for external testers (~24h) but internal
        # testers (you, your team) get the build immediately.
        submit_to_testflight: true
