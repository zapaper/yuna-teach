commonMistakes: []

keyWords:
  - { word: 成语, definition: "4-character idiom. Has a fixed meaning that usually CAN'T be guessed from the characters alone. E.g. 恍然大悟 ≠ 'suddenly big understanding' but 'suddenly grasp it'." }
  - { word: 词义, definition: "The meaning of a word/idiom. PSLE Q7-Q8 and Q34-Q35 test this directly; Q13-Q15 tests whether you know the correct USAGE context." }
  - { word: 字面意思, definition: "Literal/surface meaning — the sum of each character's meaning. Often DIFFERENT from the idiom's actual meaning. PSLE traps test this difference." }
  - { word: 搭配, definition: "Collocation — which contexts a word fits. E.g. 不慌不忙 only fits 'cool under pressure' scenes, never 'should panic' scenes." }
  - { word: 上下文, definition: "Context — the sentences before and after. Even if you don't know an idiom, the surrounding context narrows down possible meanings." }

