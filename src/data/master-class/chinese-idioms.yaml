keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: 欢迎来到《词义 + 成语》— 14 分
    mascotImage: /master-class/chinese-mcq-1/panda-welcome.png
    body: >-
      14 分跨 3 个题型, 考的是同一件事。
      14 marks across 3 question types — all testing one skill.
    bullets:
      - |-
        {首先是 }**Q7-Q8 (4 分)** — {题目会}给成语, {让你}选意思{。}
      - |-
        {接着是 }**Q13-Q15 (6 分)** — {题目会给出 }4 个句子, {要求你}选用法正确的那一句{。}
      - |-
        {最后是 }**Q34-Q35 (4 分)** — {题目会}给意思, {让你}在短文里找词{。}

  # ─── Slide 1: Core principle ─────────────────────────────
  - title: "核心原则 — 词义 + 用法搭配"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      每个词必须记 2 样: **意思** + **用在什么场景**。
      只知道意思不够 — 用错地方就丢分 (这就是 Q13-Q15 在测的)。
      For each word memorise TWO things: meaning AND when to use it.
      Knowing the meaning alone isn't enough — using it in the wrong
      context loses marks (that's exactly what Q13-Q15 tests).
    bullets:
      - |-
        **核心 — 词义 ≠ 用法。** 记词的时候必须连"什么场景下用"一起记。
        Meaning ≠ usage. When you memorise a word, always pair it with
        the scene/context it fits.
      - |-
        **例**: 兴高采烈 = "非常高兴"。
        ✓ 用法对: 得了第一名, 他兴高采烈地跑回家。
        ✗ 用法错: 今天天气好, 我兴高采烈地吃早饭。 (太小事用不上)
      - |-
        **Q13-Q15 就是用法考查** — 4 个句子用同一个词, 3 个用错。
      - |-
        {另外，}**Q34-Q35 是反向找词** — {也就是说，}题目给意思, 你要在短文里认出对应的词。

  # ─── Slide 2: Print Tier 1 list ─────────────────────────
  - title: "打印 Tier 1 词汇表 (60 二字词 + 35 四字成语)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      Tier 1 是 PSLE 最可能考的词。每个词附**意思 + 例句 + 用法说明**。
      请爸妈或老师把 Tier 1 PDF 打印出来, 每天背 5-10 个, 一个月内背完。
      Tier 1 = PSLE's highest-probability words. Each entry has
      meaning + example + usage notes. Ask a parent/teacher to print
      the Tier 1 PDF; aim for 5-10 words a day over a month.
    bullets:
      - |-
        **二字词语 (60 个) — 高频例子:**
        克服 · 推动 · 惭愧 · 充足 · 解释 · 后悔 · 遵守 · 保护 · 妒忌 · 提醒
        提议 · 模仿 · 抱怨 · 退缩 · 严格 · 关键 · 安慰 · 拒绝 · 沉默 · 熟悉
      - |-
        **四字成语 (~35 个) — 高频例子:**
        恍然大悟 · 兴高采烈 · 眉开眼笑 · 目不转睛 · 不慌不忙 · 异口同声
        千辛万苦 · 一言为定 · 神机妙算 · 不约而同 · 垂头丧气 · 左思右想
      - |-
        **完整列表**: 打印 Tier 1 PDF — 含每个词的**意思 + 例句 + 用法说明**。

  # ─── Slide 3: CTA — go straight to quiz ────────────────────
