  # ─── Q1-Q2 拼音: 4 traps ───────────────────────────────────
  - title: "Q1-Q2 拼音 — 4 种陷阱"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      10 年 PSLE 错题分析: 这 4 类陷阱占 ~90% 失分。先排除声母 → 再排除韵母
      → 最后看声调。
      10-year analysis: these 4 trap types account for ~90% of
      mistakes. Order: eliminate by initial → final → tone.
    bullets:
      - |-
        **核心方法 — 把 4 个选项"读出来"代入句子, 不顺的排除。**
        Read each option aloud into the sentence; eliminate ones that sound wrong.
      - |-
        **① 卷舌 vs 平舌** (zh/z, sh/s, ch/c) — 稍 shāo · 适 shì · 着 zháo
      - |-
        **② 前 vs 后鼻音** (in/ing, en/eng) — 灵 líng · 整 zhěng · 兴 xīng
      - |-
        **③ 声调** — 紧 jǐn (3声) vs 近 jìn (4声), 只差声调
      - |-
        **④ 多音字 (2023+)** — 着 zháo/zhāo/zhe · 行 háng/xíng
      - |-
        **顺序**: 读出来排除 → 声母 → 韵母 → 声调

  # ─── Q1-Q2 拼音: Practice ─────────────────────────────────
  - title: 试一试 — 拼音 (PSLE 2024 + 2025 真题)
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2024 Q1 — 卷舌音陷阱"
        stem: |-
          国强只是**稍微**用力一拉, 椅子的脚竟然断了。
          "稍微" 的拼音是?
        options:
          - sāo wēi
          - sāo wéi
          - shāo wēi
          - shāo wéi
        correctAnswer: 3
        explanation: >-
          **稍** = sh- (不是 s-), 排除 (1)(2)。**微** = 1 声 wēi (不是 2 声), 选 (3)。
          先看声母排除一半 → 再比声调。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "PSLE 2025 Q1 — 前后鼻音 + 声调"
        stem: |-
          外公每天早上都去公园**锻炼**身体。
          "锻炼" 的拼音是?
        options:
          - duān liàn
          - duàn liàn
          - duān lián
          - duàn lián
        correctAnswer: 2
        explanation: >-
          **锻** = duàn (4 声, 不是 1 声), 排除 (1)(3)。**炼** = liàn (4 声),
          选 (2)。两个字都是 4 声 — 声调要看清楚。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png

  # ─── Q3-Q4 单字 — Whole-word strategy ─────────────────────
  - title: "Q3-Q4 单字 — \"先想 2 字词\"的诀窍"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      Q3-Q4 是从 4 个相像的字里选 1 个填空。诀窍: **题目里已经给了另外一个字**, 你的任务是认出整个 2 字词。
      Q3-Q4 picks 1 character from 4 lookalikes to fill a blank.
      Trick: the OTHER character in the compound is ALREADY in the
      stem — your job is to mentally complete the 2-character word.
    bullets:
      - |-
        **核心方法 — 通常是 2 字词, 题目给了另一个字。看选项的偏旁部首**:
        扌 = 动作 · 氵 = 水 · 亻 = 人 · 心/忄 = 情绪。偏旁不对就排除。
        Usually a 2-char compound; stem has the other character.
        Check the radical: 扌 = action, 氵 = water, 亻 = person, 心/忄 = emotion.
        Wrong radical → eliminate.
      - |-
        **三步走**: 看旁边的字 → 想整个 2 字词 → 选项里找匹配
        例: "___ 生" → 想 "陌生" → 选 **陌**
      - |-
        **常见 2 字词** (10 年 PSLE 考过):
        陌生 · 截止 · 教导 · 慈祥 · 克服 · 嘉宾 · 分享 · 理睬 · 浮现 · 烦恼
        加倍 · 异口 · 痕迹 · 避免 · 编号 · 攻击 · 有限 · 合作 · 多遍 · 户外
      - |-
        **陷阱**: 形近字 — 陌 vs 末/茉 · 截 vs 接/节 · 享 vs 想/响 · 编 vs 偏/扁

  # ─── Q3-Q4 Practice ─────────────────────────────────────
  - title: 试一试 — 单字 (PSLE 2023 + 2025 真题)
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2023 Q3 — 形近字辨析"
        stem: |-
          大伟说话很没有礼貌, 同学们都不理 ___ 他。
          应该填哪个字?
        options:
          - 采
          - 彩
          - 睬
          - 踩
        correctAnswer: 3
        explanation: >-
          整个 2 字词是 **理睬** (pay attention to / care about)。
          采 = 采花 / 彩 = 彩色 / 踩 = 踩脚 — 都不对。选 **睬**。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "PSLE 2025 Q3 — 同音字陷阱"
        stem: |-
          叔叔一直皱着眉头, 好像心里有什么 ______ 恼的事。
          应该填哪个字?
        options:
          - 翻
          - 烦
          - 凡
          - 反
        correctAnswer: 2
        explanation: >-
          整个 2 字词是 **烦恼**。翻/凡/反 都和"心里有事"无关。"烦"=
          worry/trouble, 配 "恼" 组成 烦恼。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png

  # ─── Q5-Q6 词语 — Collocation strategy ───────────────────
  - title: "Q5-Q6 词语 — \"搭配\"才能锁定答案"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      Q5-Q6 给 4 个**意思相近**的词, 让你选最合适那个。诀窍不是"哪个意思最对",
      而是"哪个最贴合这句话的**场景**"。
      Q5-Q6 gives 4 near-synonyms. The trick is NOT "which meaning
      is closest" — it's "which one matches this sentence's SCENE".
    bullets:
      - |-
        **核心方法 — 先读完整句, 弄清意思, 再看选项。** 没有上下文, 4 个近义词长得都对。
        Read the whole sentence first to grasp the meaning.
        Without context, all 4 near-synonyms look plausible.
      - |-
        **关键事实**: PSLE 从不考具体名词 — 只考抽象动词 / 形容词
        例: 克服 / 推动 / 惭愧 / 遵守 / 保护 / 后悔 / 妒忌
      - |-
        **解题秘诀**: 遮住选项, 先想"应该填什么词"。再看选项, 选最贴近你想到的。
      - |-
        **示范** (PSLE 2024 Q6): "救护车 ___ 赶到现场..." → 想"应该快"
        选项: 急切/迅速/紧急/立刻 — 都"快", 但 "救护车 + 迅速" 最自然 → **迅速**
      - |-
        **陷阱**: 1-2 个选项是近义词, 但搭配不上 — 听起来不自然 = 不对

  # ─── Q5-Q6 Practice ─────────────────────────────────────
  - title: 试一试 — 词语 (PSLE 2024 + 2025 真题)
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2024 Q5 — 抽象动词搭配"
        stem: |-
          伟明知道自己的行为伤了妈妈的心, 感到十分 ___ 。
          应该填哪个词?
        options:
          - 失望
          - 难过
          - 后悔
          - 抱歉
        correctAnswer: 3
        explanation: >-
          四个选项都是"心情不好", 但**"伤了妈妈的心"** 暗示是
          "自己做错事而希望没做" → **后悔** (regret) 最贴合。
          失望 = 没达到期望 / 难过 = 一般悲伤 / 抱歉 = 对别人感到不好意思,
          都不如 "后悔" 精准。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "PSLE 2025 Q5 — 看搭配选词"
        stem: |-
          这个著名的童话故事被 ___ 成电影, 小朋友们都很喜欢。
          应该填哪个词?
        options:
          - 翻译
          - 改编
          - 修改
          - 改写
        correctAnswer: 2
        explanation: >-
          "童话故事 → 电影" 这个变化叫 **改编** (adapt for a different
          medium)。翻译 = 改语言 / 修改 = 改小错 / 改写 = 改文字内容。
          只有 改编 = 改成不同的艺术形式。
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png

