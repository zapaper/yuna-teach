    body: >-
      Q1-Q6 共 12 分。每个题型只有几个**固定陷阱**, 知道在哪, 看选项就排除一半。
      Q1-Q6 = 12 marks. Each sub-type has a small number of FIXED
      traps — knowing them lets you eliminate options instantly.
    bullets:
      - |-
