# Master Class: PSLE 华文 — 字音字形词语 (Q1-Q6)
# --------------------------------------------------------------
# 涵盖 PSLE 华文 Booklet A 的前 6 道题 (12 分):
#   - Q1-Q2 (4m):  拼音
#   - Q3-Q4 (4m):  同音字 / 形近字 (单字填空)
#   - Q5-Q6 (4m):  词语填空 (2 字词)
#
# Q7-Q8 (idioms / word meaning) 在 chinese-idioms 模块里, 不在这里重复。
#
# Bilingual: body has Chinese + English; bullets are Chinese-only.
# Source: PSLE Chinese 2016-2025 real questions + model answers.

