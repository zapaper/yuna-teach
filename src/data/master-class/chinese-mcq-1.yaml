commonMistakes: []

keyWords:
  - { word: 卷舌音, definition: "Retroflex initials zh/ch/sh — tongue curled back. Contrasted with flat initials z/c/s. PSLE's top pinyin trap." }
  - { word: 前后鼻音, definition: "Front nasal (-n) vs back nasal (-ng) finals — in/ing, en/eng, an/ang. Second most common pinyin trap." }
  - { word: 多音字, definition: "Polyphonic character — same character with multiple pronunciations (e.g. 着 zháo/zhāo/zhe, 行 háng/xíng). Tested more aggressively since 2023." }
  - { word: 形近字, definition: "Visually-similar characters — different meaning but lookalike form (陌 vs 末 vs 茉). Q3-Q4's main trap. Strategy: identify the full 2-char word first." }
  - { word: 搭配, definition: "Collocation — which other words a vocab item naturally pairs with. Q5-Q6 marks are decided by collocation, not literal meaning." }

subTopics:
  - id: pinyin
    label: 拼音 (Q1-Q2)
    description: "4 traps: zh/z (sh/s, ch/c) retroflex, in/ing front-back nasal, tone confusion (especially 3rd vs 4th), and the new 多音字 trend (2023+). Elimination order: initial → final → tone."
    slideIdx: 1
  - id: single-char
    label: 单字 (Q3-Q4)
    description: "Pick 1 character from 4 lookalikes. The OTHER character in the compound is always in the stem — mentally complete the 2-char word first, then identify the missing piece. Common 2-char words: 陌生, 截止, 教导, 慈祥, 克服 etc."
    slideIdx: 3
  - id: vocabulary
    label: 词语 (Q5-Q6)
    description: "Pick from 4 near-synonyms. PSLE never tests concrete nouns — always abstract verbs/adjectives (克服, 推动, 惭愧, 遵守, 后悔, 妒忌). Decide by collocation (which other words it naturally pairs with), not by literal meaning."
    slideIdx: 5
