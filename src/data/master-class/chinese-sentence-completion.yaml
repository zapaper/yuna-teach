  # ─── Q9-Q10 Section Opener + Scoring ─────────────────────
  - title: "Q9-Q10: Connectors (关联词) — 评分 / Scoring (4 分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      Q9 是单个关联词, Q10 是一对关联词。每题 2 分, 共 4 分。
      整个 PSLE 关联词池只有 **~26 个固定形式** — 全背熟可一题没错。
      Q9 = single connector, Q10 = paired connectors. 2 marks each = 4 total.
      The entire pool is only ~26 fixed forms — fully memorisable.
    bullets:
      - |-
        {做题时，首先要}**看 2 句话的关系**:{比如是}因果 / 转折 / 条件 / 时间 / 让步 / 选择 /{还是}递进
      - |-
        {记住一点，}**关键: 句意先, 关联词后** — {也就是说，}先想 "这两句是什么关系", 再挑词
      - |-
        {另外，这是一个}**小固定池**:{大概有}单连词 ~10 个 +{加上} 双连词 ~15 个 ={总共就是} ~26 总数

  # ─── Q9 — Single Connectors ──────────────────────────────
  - title: "Q9 — 单个关联词 (按关系分组)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      Q9 在前句开头填 1 个连词。**先想两句话的关系**, 再挑那一类的词。
      Q9 fills ONE connector at the start of a sentence. **Identify
      the relationship first**, then pick from that category.
    bullets:
      - |-
        **因果 (CAUSE)** — 由于 · 既然
        例: **由于**下雨, 比赛取消了。
      - |-
        **条件/假设 (CONDITION / IF)** — 如果 · 只要
        例: **只要**你努力, 就会成功。
      - |-
        **让步 (CONCESSION / EVEN IF)** — 即使 · 不管 · 无论 · 虽然
        例: **不管**天气如何, 我都去。
      - |-
        **时间起点 (SINCE-TIME)** — 自从
        例: **自从**搬家后, 我们少见面了。
      - |-
        **除外 (BESIDES)** — 除了
        例: **除了**他, 大家都去了。

  # ─── Q10 — Paired Connectors ─────────────────────────────
  - title: "Q10 — 一对关联词 (按关系分组)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      Q10 在前后两句各填一个连词。同一类关系**有 2-4 个写法可选** — 看
      句意挑最合适那对。
      Q10 fills TWO connectors that must pair. Each relationship has
      2-4 valid pair patterns — pick whichever fits the sentence best.
    bullets:
      - |-
        **递进 (ALSO / MOREOVER)** — 不但…而且 · 不但…还 · 不仅…也
        例: 妈妈**不但**聪明, **而且**勤奋。
      - |-
        **反向递进 (NOT ONLY … ON CONTRARY)** — 不但…反而
        例: 他**不但**不道歉, **反而**还骂人。
      - |-
        **转折 / 让步 (ALTHOUGH / EVEN THOUGH)** — 虽然…但是 · 尽管…还是 · 即使…也
        例: **虽然**累, **但是**很开心。
      - |-
        **条件 (IF / AS LONG AS / ONLY WHEN)** — 如果…就 · 要是…就 · 只要…就 · 只有…才
        例: **只有**努力, **才**能成功。
      - |-
        **因果 (BECAUSE … SO)** — 因为…所以 · 由于…所以
        例: **因为**下雨, **所以**取消了。
      - |-
        **让步 — 无条件 (NO MATTER … ALL)** — 无论…都
        例: **无论**多远, 我**都**去。
      - |-
        **除外 (BESIDES … ALSO)** — 除了…还
        例: **除了**打球, 我**还**游泳。

  # ─── Q9-Q10 Worked Example ───────────────────────────────
  - title: "Q9-Q10 解题示范 — PSLE 2025 真题"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      看 2 道 PSLE 2025 真题, 用"先想关系, 再挑词"的方法解题:
      Two PSLE 2025 questions worked through with the "think relation
      first, then pick word" method:
    bullets:
      - |-
        **Q9 (2025):** "______ 事情__多么糟糕__, 我__都__会和你一起面对。"
        **Relationship we want**: "**No matter** <something bad happens>, I will **still** <stick with you>" — the 都 in the sentence locks in the "no matter / regardless" family.
        **MCQ options**:
        (1) ~~如果~~ — "if" → pairs with 就 / 那么, not 都 ✗
        (2) ~~除了~~ — "besides / except" → wrong relation (addition, not concession) ✗
        (3) **不管** — "no matter" → pairs with 都, locks in universal concession ✓
        (4) ~~要是~~ — colloquial "if" → same shape as 如果, still the wrong adverb pair ✗
        > "**No matter** how bad things get, **I will still** face them with you."
      - |-
        **Q10 (2025):** "______ 平时多吃__有营养__的食物, ______ __不会__那么容易生病。"
        **Relationship we want**: "**If** <do something good>, **then** <won't fall sick>" — a condition → result link.
        **MCQ options**:
        (1) **只要……就** — "as long as ... then" ✓ (achievable condition → certain result)
        (2) ~~不但……也~~ — "not only ... also" → addition, not condition ✗
        (3) ~~虽然……但是~~ — "although ... but" → concession ("despite eating well, no sick" makes no sense) ✗
        (4) ~~尽管……还是~~ — "despite ... still" → concession again, same problem ✗
        > "**As long as** you regularly eat nutritious food, you **won't** get sick so easily."
      - |-
        **错题陷阱**: __"如果...就"__ 也是条件, 但语气是"假设可能"; __"只要...就"__ 是"达成必然"。
        画线后, 如果前半像 __必然成立__ 的条件 (这里"多吃有营养的食物"是确定能做到的), 用 **只要...就**。
        > "如果...就" leaves the action as a hypothetical (maybe will, maybe won't). "只要...就" treats the action as something within reach, so the result is certain. When the first half is something the speaker definitely CAN do, use **只要...就**.

  # ─── Q11-Q12 Section Opener ───────────────────────────────
  - title: "Q11-Q12: Sentence Completion (完成句子) — 评分 / Scoring (4 分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      Q11-Q12 给半句话, 让你选另一半完成逻辑。4 个选项**只有 1 个逻辑对**。
      关系类型可以是**因果 / 转折 / 时间 / 评价 / 决定 / 提议** — 不只是情绪。
      Q11-Q12 give half a sentence; pick the half that completes the
      logic. The relationship can be **causation / contrast / time /
      evaluation / decision / suggestion** — not just emotion.
    bullets:
      - |-
        **核心方法 — 读半句, 先判断"关系类型", 再看 4 个选项哪个吻合。**
        Read the half-sentence, identify the relationship type, then
        match against the 4 options.
      - |-
        **因果 (CAUSATION)** — 原因/努力/行为 → 结果/情绪/评价
        例: "经过许多年的努力, ___" → 成功的结果
        例: "小英做事很负责, ___" → 大家赞成她当班长
        例: "___, 我感到非常委屈" → 不公平的事
      - |-
        **转折 / 矛盾 (CONTRAST)** — 前半 ↔ 后半 意思相反
        例: "事情都已经解决了, ___" → "别再放在心上"
      - |-
        **时间 / 过程 (TIME)** — 时间流逝 → 里程碑或感慨
        例: "时间过得真快, ___" → "我们快毕业了"
      - |-
        **描述 → 评价 (EVALUATION)** — 形容 → 大众反应
        例: "老师讲的故事生动有趣, ___" → "同学们听得津津有味"
      - |-
        **决定 → 解释 (DECISION)** — 突发情况 → 改计划
        例: "志文突然有事不能来, ___" → "我只好自己去"
      - |-
        **提议 → 行动 (SUGGEST)** — 条件铺垫 → 邀请/行动
        例: "___, 我们就参加这项比赛好吗?" → 条件 / 同意

  # ─── Q11-Q12 Worked Example ───────────────────────────────
  - title: "Q11-Q12 解题示范 — PSLE 2024 真题"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      PSLE 2024 Q11 + Q12 — 用 "看半句的情绪/方向, 选完整逻辑" 的方法:
      PSLE 2024 Q11 and Q12 — match each fragment's tone/direction:
    bullets:
      - |-
        **Q11 (2024):** "______, 那是我__最开心__的__一天__。"
        **What we're looking for**: a **single specific past event** that was the speaker's happiest day — needs to be concrete, completed, and joyful (the 那是 and 一天 anchor it as one recalled day).
        **MCQ options**:
        (1) ~~爸爸很想带全家人出国旅行~~ — "Dad really wants to take the family abroad" → a future wish, not a remembered event ✗
        (2) ~~同学们在讨论明天一起看戏~~ — "Classmates are discussing watching a show tomorrow" → future planning, not the happiest day itself ✗
        (3) ~~我决定从今天起去公园跑步~~ — "I decided to start running in the park from today" → a decision / new habit, not an event ✗
        (4) **老师带我们全班去海边野餐** — "Teacher took our whole class on a beach picnic" → past, specific, collective, joyful ✓
        > "**Our teacher took the whole class on a beach picnic** — that was my happiest day."
      - |-
        **Q12 (2024):** "__忙了一个星期__, ______。"
        **What we're looking for**: a **reaction to a busy week** — most natural is craving rest / anticipating the weekend (the 忙了 + 一个星期 sets up "fatigue + week's end").
        **MCQ options**:
        (1) ~~爸爸每天都去公司上班~~ — "Dad goes to the office every day" → describes a routine, doesn't follow from "after a busy week" ✗
        (2) **大家都盼望周末的到来** — "Everyone looks forward to the weekend arriving" → captures the rest-anticipation reaction ✓
        (3) ~~休息是为了走更远的路~~ — "Rest is so you can walk a further path" → generic proverb, no link to a specific busy week ✗
        (4) ~~工作总是堆成一座小山~~ — "Work always piles up into a small mountain" → another stress description, doesn't continue the thought ✗
        > "**After a busy week**, everyone looks forward to the weekend arriving."
      - |-
        **关键秘诀**: 先在半句里**给情绪词、时间词、指代词画线**, 再用画线词推后/前半的方向 (积极/消极/期待/失望), 最后看 4 个选项里哪个匹配画线的方向。
        > Underline the emotion words, time markers, and back-references in the given half first. Use them to predict whether the missing half should be positive / negative / anticipating / disappointed. Then pick the option that matches that direction.

  # ─── Q26-Q29 Section Opener ───────────────────────────────
  - title: "Q26-Q29: Dialogue Completion (完成对话) — 评分 / Scoring (8 分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      Q26-Q29 是 4 个空, 每空 2 分, 共 8 分。词库有 8 个短句, 你填数字 1-8。
      8 个短句往往属于 **8 种对话功能**之一 — 看上下文找匹配。
      Q26-Q29: 4 blanks × 2 marks = 8 total. Word bank has 8 short
      phrases; fill digits 1-8. The 8 phrases usually belong to 8
      DIFFERENT conversational functions — match by context.
    bullets:
      - |-
        **8 种对话功能** (词库里几乎一定有这几类):
        > **8 conversational functions** (the word bank almost always contains examples from each):
      - |-
        {第一种是 }**① 表示感谢**:{比如}谢谢您 / 太感谢了{。}
        > **① Thanking** — e.g. "Thank you" / "Many thanks."
      - |-
        {第二种是 }**② 表示道歉 / 解释**:{像是}对不起 / 我没有故意 / 实在很抱歉{。}
        > **② Apologising / explaining** — e.g. "Sorry" / "I didn't mean to" / "I'm really sorry."
      - |-
        {第三种是 }**③ 提议 / 邀请**:{例如}不如 ___ / 你要不要 ___{。}
        > **③ Suggesting / inviting** — e.g. "Why don't we ___" / "Would you like to ___"
      - |-
        {第四种是 }**④ 拒绝 / 推辞**:{比如}不用了 / 我不太方便{。}
        > **④ Declining / refusing** — e.g. "No thanks" / "It's not really convenient for me."
      - |-
        {第五种是 }**⑤ 答应 / 同意**:{像是}好的 / 我答应你{。}
        > **⑤ Agreeing / accepting** — e.g. "OK" / "I promise you."
      - |-
        {第六种是 }**⑥ 表示惊讶**:{例如}真没想到 / 真的吗{。}
        > **⑥ Expressing surprise** — e.g. "Didn't expect that" / "Really?"
      - |-
        {第七种是 }**⑦ 安慰 / 鼓励**:{比如}别担心 / 你一定可以{。}
        > **⑦ Comforting / encouraging** — e.g. "Don't worry" / "You can do it."
      - |-
        {最后第八种是 }**⑧ 总结 / 决定**:{像是}那就这么决定 / 看来 ___{。}
        > **⑧ Concluding / deciding** — e.g. "Let's go with that" / "It looks like ___"

  # ─── Q26-Q29 Strategy ────────────────────────────────────
  - title: "Q26-Q29 解题秘诀 — 看上下文 3 步走"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      完成对话的"3 步法":
      Dialogue completion in 3 steps:
    callout: >-
      **技巧和完成句子完全一样: Read the whole passage and the sentence before and after the blank, decide what logically should go in there. If unsure, work through the other options to cross them out first.**
    bullets:
      - |-
        {首先是}**第 1 步**: {你需要去}读 4 个空的**前一句**和**后一句**, {从而}推断空里要表达什么"功能"{。}
        > **Step 1**: Read the **sentence before** and the **sentence after** each of the 4 blanks. Use them to work out what conversational function the blank needs to perform.
      - |-
        {接下来是}**第 2 步**: {你需要}在 8 个词库短句里找对应功能的那一句{。}
        > **Step 2**: In the 8-phrase word bank, find the one phrase that matches that function.
      - |-
        **第 3 步**: 把数字填进空里。**已用过的数字打勾**, 避免重复
        > **Step 3**: Write the number into the blank. **Tick off the number you've used** so you don't reuse it.
      - |-
        **关键陷阱**: 8 个短句中**只有 4 个用得上** (题目只有 4 个空)。
        多出 4 个是干扰项 — 别因为某句"听起来对"就乱选。
        > **Key trap**: Only **4 of the 8 phrases will be used** (there are only 4 blanks). The extra 4 are distractors — don't pick a phrase just because it "sounds right" in isolation.
      - |-
        {最后还有一个}**加分点**: {当这}4 个数字填完后, {最好}把对话从头读一遍, {用来}检查是否流畅。
        > **Bonus tip**: After all 4 numbers are filled in, read the whole dialogue from start to finish to check that it flows naturally.

  # ─── Q26-Q29 Worked Example ───────────────────────────────
  - title: "Q26-Q29 解题示范 — 用 3 步法"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      简化示例: 词库 8 句 (功能见上一张), 对话有 4 个空。用 3 步法逐个解。
      Simplified example: word bank has 8 sentences (functions
      above), dialogue has 4 blanks. Apply the 3-step method.
    bullets:
      - |-
        **对话**:
        小华: 听说你周末要去__爬山__？ ← 在上一句里画线: __爬山__ (活动), __？__ (问号 = 问句)
        小明: 是啊, **(26) ______**。 ← 空在 __"是啊"__ 之后, 表示要先回答, 再接话
        > **Dialogue**:
        > Xiaohua: I heard you're going **mountain climbing** this weekend? ← Underline in the previous line: __mountain climbing__ (activity), __?__ (question mark — it's a question)
        > Xiaoming: Yes, **(26) ______**. ← The blank comes after "Yes" — first acknowledge, then continue the thought
      - |-
        **关键 — 上一句的"画线词"决定下一空的功能**:
        画 __？__ → **问句 → 答句 + 邀请**
        画 __陈述句句号__ → **陈述 → 同意 / 反驳**
        画 __感叹号 !__ → **惊讶 → 安慰 / 同感**
        画 __"那我们"__ / __"不如"__ → **建议 → 接受 / 拒绝**
        > **Key — the underlined word in the previous sentence tells you what function fits the next blank**:
        > Underline __?__ → **question → answer + invitation**
        > Underline __statement period__ → **statement → agree / push back**
        > Underline __!__ → **exclamation → comfort / sympathise**
        > Underline __"那我们" / "不如"__ → **suggestion → accept / decline**
        先识别上句的标点和语气, 再到词库里挑功能对得上的句子。

