keyConcepts:

  # ─── Welcome ───────────────────────────────────────────────
  - title: 欢迎来到《Sentence Completion》— 一项技能, 16 分
    mascotImage: /master-class/chinese-mcq-1/panda-welcome.png
    body: >-
