# Master Class: PSLE 华文 — Sentence Completion (关联词 + 完成句子 + 完成对话)
# --------------------------------------------------------------
# 涵盖 PSLE 华文 Booklet B 的 16 分:
#   - Q9-Q10  (4m):  关联词 (connectors — single + paired)
#   - Q11-Q12 (4m):  完成句子 (pick the half-sentence that completes logic)
#   - Q26-Q29 (8m):  完成对话 (word-bank dialogue cloze, digit 1-8)
#
# All three test ONE skill: matching the LOGIC of two parts of a
# sentence/dialogue. Connectors and dialogue have small fixed pools
# — memorise once, score every year.
#
# Source: PSLE Chinese 2016-2025 actual questions + model answers.

