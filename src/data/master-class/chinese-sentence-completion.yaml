keyWords:
  - { word: 关联词, definition: "Connector — links two clauses logically. Includes single connectors (由于, 如果, 自从) and paired connectors (不但…而且, 虽然…但是). Small fixed pool (~26 forms)." }
  - { word: 完成句子, definition: "Sentence Completion — given half a sentence, pick the other half that completes the logical relationship. Tests cause-effect, contrast, time, agreement reasoning." }
  - { word: 完成对话, definition: "Dialogue Completion — word-bank cloze where you fill in digit 1-8 from an 8-phrase bank into 4 dialogue blanks. Functions tested: thanks, apology, suggest, decline, agree, surprise, comfort, conclude." }
  - { word: 因果关系, definition: "Cause-effect relationship — signaled by 因为/由于/所以 / 既然/那么. The most common connector type tested." }
  - { word: 让步关系, definition: "Concession relationship — 'even though X, still Y'. Signaled by 虽然/尽管/不管/无论/即使/即便. Second most common in PSLE." }

subTopics:
  - id: q9-q10-connectors
    label: Q9-Q10 关联词
    description: "Single connectors (Q9) and paired connectors (Q10). Small fixed pool of ~26 forms. Tests cause-effect, condition, contrast, concession, time, addition relationships."
    slideIdx: 1
  - id: q11-q12-completion
    label: Q11-Q12 完成句子
    description: "Pick the half-sentence that completes the logic. 8 common patterns: reason→emotion, effort→outcome, time→milestone, suggest→action, contradiction, behavior→consequence, description→evaluation, decision→explanation."
    slideIdx: 5
  - id: q26-q29-dialogue
    label: Q26-Q29 完成对话
    description: "Word-bank dialogue cloze. 8-phrase bank with 4 blanks; fill digit 1-8. 8 conversational functions: thanks, apology, suggest, decline, agree, surprise, comfort, conclude. 3-step method: identify function from context → match phrase → fill digit."
    slideIdx: 7
