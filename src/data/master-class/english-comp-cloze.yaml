# Master Class: PSLE English — Comprehension Cloze
# --------------------------------------------------------------
# 15 blanks. 15 marks. No word bank — you read the passage and
# pick the EXACT word that fits.
#
# Headlines from 6 years of PSLE Comp Cloze (2019-2024):
#   - About 5-6 blanks are VERBS (most common). The tense rule
#     trips up half the class.
#   - 2-3 blanks are LINKING WORDS (but / so / although / despite).
#   - 2-3 blanks are COLLOCATIONS — fixed phrases like "such as",
#     "make sure", "for a change", "a sense of belonging".
#   - 2-3 blanks are PREPOSITIONS (with / among / before / by).
#   - 1-2 blanks are SPECIFIC NOUNS (lyrics, hesitation, recipes,
#     consequences). The vocabulary one — hardest to fake.
#
# The "no word bank" version of cloze. The 10-12 yr old needs to
# (a) read the WHOLE sentence + the one before and after,
# (b) check tense/agreement, (c) check spelling.

slug: english-comp-cloze
subject: english
level: P5-P6
topicLabel: Comprehension Cloze
title: "PSLE English — Comprehension Cloze (15 marks)"

stats:
  headline: >-
    Comprehension Cloze = 15 marks. 15 blanks. No word bank.
    Most blanks are VERBS, LINKING WORDS, or COLLOCATIONS — once
    you know the patterns, half the marks become easy.

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Comprehension Cloze (15 marks)"
    mascotImage: /master-class/grammar-mcq-1/panda-welcome.png
    body: >-
      Comp Cloze is the section with the long passage and 15 blanks.
      You write ONE word in each blank — no word bank given. Each
      blank = 1 mark. Spelling counts. Tense counts. Plural/singular counts.
    bullets:
      - |-
        **What blanks usually test** (across 6 years of PSLE):
        -- **Verbs** (most common — ~5-6 blanks)
        -- **Linking words** (but / so / although / despite — ~2-3 blanks)
        -- **Collocations** — "always-together" phrases (~2-3 blanks)
        -- **Prepositions** (with / among / before — ~2-3 blanks)
        -- **Specific nouns / adjectives** (the vocab ones — ~1-2 blanks)
      - |-
        **The 3 rules to win:**
        ① Read the WHOLE sentence first (and the one before + after).
        ② Match the form — tense, plural, capital letter at start.
        ③ Spell it right. A correct word wrongly spelt = 0 marks.

  # ─── Slide 1: The 4-step method ─────────────────────────────
  - title: "The 4-step method — every blank, same routine"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Don't just stare at the blank. Run THESE 4 steps every time.
      It feels slow at first — gets fast after 10 blanks.
    bullets:
      - |-
        **Step 1 — Read the whole sentence + 1 before + 1 after.**
        Most blanks need context that's NOT in the same sentence.
      - |-
        **Step 2 — Decide what KIND of word the blank wants.**
        Look at the word right before and right after.
        - "to ____" → verb (base form)
        - "is/was ____" → verb (-ing or -ed) OR adjective
        - "a/an/the ____" → noun
        - "____ the rain, …" → linking word (despite/in spite of)
        - "____ this, …" → linking word at the start of a sentence
      - |-
        **Step 3 — Match the FORM.**
        - Past or present? (Check verbs around the blank.)
        - Singular or plural? (Check the subject.)
        - Capital letter? (Is it the first word of the sentence?)
      - |-
        **Step 4 — Spell it right and re-read aloud.**
        Read the full sentence with your answer slotted in.
        If it sounds wrong, change it.

  # ─── Slide 2: What type of word? — quick triggers ──────────
  - title: "What type of word does the blank want?"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Before you write anything, look at the words RIGHT NEXT TO
      the blank. They give you the type. Use this cheat sheet:
    bullets:
      - |-
        **🔵 VERB — when the blank is right after one of these:**
        -- **to ___**  (base form) → "She forgot to **lock** the door."
        -- **subject + ___** → "The boy **kicks** the ball."
        -- **is / was / are / were + ___**  (-ing or -ed) → "She was **running**." / "It was **broken**."
        -- **have / has / had + ___**  (past participle) → "I have **finished**."
        -- **can / could / would / should / must + ___**  (base) → "He could **swim**."
      - |-
        **🟢 NOUN — when the blank is right after one of these:**
        -- **a / an / the + ___** → "the **answer**"
        -- **adjective + ___** → "a happy **family**"
        -- **preposition + ___** → "with **patience**" / "in **spite** of"
        -- **of + ___** → "a sense of **belonging**" / "a piece of **advice**"
      - |-
        **🟡 PREPOSITION — when the blank fits one of these:**
        -- **___ + noun phrase** → "**with** my friends" / "**on** the table"
        -- **verb + ___**  (phrasal verb) → "look **after**" / "give **up**" / "pay **off**"
        -- common slots: **at / on / in / by / with / for / about / from / of**
      - |-
        **🔴 LINKING WORD — when you see these signals:**
        -- **Start of sentence + comma + a full sentence**: "**However**, she tried again." / "**Despite** the rain, …"
        -- **A clear contrast / cause / addition** between two ideas in the passage.
        -- Common: **but / so / however / although / despite / because / and / besides**.
      - |-
        **🟣 COLLOCATION (fixed phrase) — when you see one of these patterns:**
        -- **make / do / take / have / pay / give + ___** → "**make** a decision", "**do** homework", "**pay** attention"
        -- **a sense of ___** → "a sense of **belonging**", "a sense of **direction**"
        -- **in / on / for / by + ___ + of/the** → "**in** front of", "**on** purpose", "**for** a change"
        🧠 Can't be guessed — it's a phrase the writer assumes you've SEEN before. Build a list from your reading.

  # ─── Slide 3: Pattern A — Verbs (most common type) ───────────
  - title: "Pattern A — Verbs (tense is the trap)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      About 1 in 3 blanks is a VERB. Picking the right WORD is
      step 1; picking the right TENSE is step 2 — and step 2 is
      where most marks are lost.
    bullets:
      - |-
        **Tense clues come from the OTHER verbs in the passage:**
        -- If the passage is in PAST (walked, said, was, were) → the blank verb is past too.
        -- If it's in PRESENT (walks, says, is, are) → use present.
        Don't switch tense just for the blank.
      - |-
        **Singular vs plural** matters when the verb is present:
        ✓ The boys **walk** to school.   (plural subject → base verb)
        ✓ The boy **walks** to school.   (singular subject → +s)
        ✗ The boy **walk** to school.
      - |-
        **-ed vs -ing** — easy to mix up:
        -- **-ed** = passive / past ("the door was opened" / "she opened it")
        -- **-ing** = active in progress / noun-like ("she was opening" / "opening the door is hard")
        Common PSLE testing: "is _____ed by" (passive) vs "is _____ing" (progressive).
      - |-
        **Irregular past forms** — the spelling trap:
        bring → **brought** · catch → **caught** · think → **thought** · grow → **grew**
        teach → **taught** · seek → **sought** · fight → **fought** · feel → **felt**
        If you write "bringed" instead of "brought" → 0 marks.

  # ─── Slide 3: Pattern B — Linking words ──────────────────────
  - title: "Pattern B — Linking words (but / so / although / despite)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Linking words show the RELATIONSHIP between two ideas. The
      trick is to spot which relationship before guessing the word.
    bullets:
      - |-
        **Contrast — when the two ideas go in opposite directions:**
        -- **but / yet** (joins two clauses): "She studied, **but** failed."
        -- **although / though / even though** (start of clause): "**Although** she studied, she failed."
        -- **despite / in spite of** (+ noun phrase): "**Despite** her hard work, she failed."
        -- **however / nevertheless** (start of new sentence, with comma).
      - |-
        **Reason / result — when one idea causes the other:**
        -- **because / since / as** (+ clause): "He missed the bus **because** he overslept."
        -- **due to / owing to** (+ noun phrase): "**Due to** the rain, the match was cancelled."
        -- **so / therefore / hence**: "It rained, **so** the match was cancelled."
      - |-
        **Addition — when ideas add up:**
        -- **and / also / besides / in addition / moreover** ("She likes maths. **Besides**, she likes science.")
      - |-
        **Time / sequence:**
        -- **before / after / once / when / while / until**: "**Once** you finish, you can leave."
      - |-
        **PSLE trap:** the blank at the START of a sentence
        needs a CAPITAL letter. "despite" → "Despite". Easy
        to forget. Always reread your final answer.

  # ─── Slide 4: Pattern C — Collocations ──────────────────────
  - title: "Pattern C — Collocations (words that 'travel together')"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Collocations = words English speakers always use TOGETHER.
      You can't guess these from grammar — you've just got to
      know them. PSLE picks them because they tell adults apart
      from kids who read widely.
    bullets:
      - |-
        **Verb + noun pairs** (must memorise):
        -- **make** a decision · **make** sure · **make** sense · **make** an effort
        -- **take** a chance · **take** action · **take** part · **take** turns
        -- **pay** attention · **pay** a visit · **pay** the price
        -- **have** fun · **have** a chance · **have** an effect
        -- **do** homework · **do** your best · **do** harm
        Common trap: students write "**make** homework" — that's not English. It's "**do** homework".
      - |-
        **"A sense of ____"** — fixed phrase:
        a sense of **belonging** · a sense of **achievement** · a sense of **direction**
        a sense of **humour** · a sense of **responsibility** · a sense of **purpose**
      - |-
        **"For a ____"** / **"In ____ of"** / **"On the ____"** patterns:
        -- for a **change** / for a **while** / for a **moment**
        -- in **front** of / in **favour** of / in **terms** of / in **search** of
        -- on the **way** / on the **other** hand / on **purpose**
      - |-
        **Phrasal verbs you SEE in PSLE:**
        -- **meet** up · **cut** down · **look** after · **give** up · **put** off
        -- **come** across · **bring** up · **carry** out · **figure** out
        Build the habit: when you READ stories, note any 2-word verb you see.

  # ─── Slide 5: Worked example — spotting the clues ───────────
  - title: "Worked example — spotting the clues"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Here's a short passage with 3 blanks. Cover the answers below,
      try first, then read how each clue points to the answer.
    bullets:
      - |-
        **The passage**
        Mei Lin **had been training** for the school marathon for three months. Every morning, before the sun **___(1)___**, she **would jog** around the park near her house. **___(2)___** the long hours of practice, she **did not feel** tired. Her hard work finally **paid ___(3)___** when she **crossed** the finish line first.
      - |-
        **Blank (1)  →  "rose"**
        🟡 **"had been training"** + **"would jog"** in the same paragraph  →  passage is PAST tense. So the missing verb is past too.
        🟡 The blank comes right after **"the sun ___"**  →  must be a VERB describing what the sun does.
        🟡 "The sun ___" before someone goes jogging in the morning  →  meaning is "the sun came up" → **"rose"**.
        ⚠️ Irregular form: rise → **rose** → risen.  NOT "rised".
      - |-
        **Blank (2)  →  "Despite"**
        🟡 Comma after the blank phrase + a FULL SENTENCE follows  →  LINKING WORD slot at the start of the sentence.
        🟡 "long hours of practice" **vs** **"did not feel tired"**  →  these two ideas CONTRAST  →  pick a contrast word (despite / although / however).
        🟡 The blank is followed by **"the long hours of practice"** — a NOUN PHRASE (no subject + verb).
            • "Although" needs a clause → ✗ wrong.
            • "Despite" + noun phrase → ✓ right.
        ⚠️ Capital letter — it's the FIRST word of the sentence.
      - |-
        **Blank (3)  →  "off"**
        🟡 The blank sits between **"paid ___"** and **"when…"**  →  it's the second half of a PHRASAL VERB.
        🟡 Meaning of the sentence: "Her training was rewarded — she finished first."  →  the fixed phrase that means "effort rewarded" is **"pay OFF"**.
        🟡 Re-read in context: "Her hard work finally paid **off** when she crossed the finish line first."  →  flows naturally. ✓
        ⚠️ This one can't be reasoned out from grammar — it's a collocation you have to know from reading.

  # ─── Slide 6: Try it — Verbs & Linkers ──────────────────────
  - title: "Try it — Verbs & Linkers"
    mascotImage: /master-class/grammar-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "Verb tense match"
        stem: |-
          Read the sentence:
          "Last night, Mary walked to the park, sat on a bench, and ____ the children playing."
          Which word fits the blank?
        options:
          - watches
          - watch
          - watched
          - watching
        correctAnswer: 3
        explanation: >-
          The verbs around the blank are in past tense (walked, sat). The blank should match — "watched" (past). Option 1 is present tense; option 2 is base form; option 4 is the -ing form, which would need "was" in front. Always scan the other verbs in the same sentence first.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png
      - label: "Linking word — contrast"
        stem: |-
          Read the sentence:
          "____ the heavy rain, the children continued their football match."
          Which word fits the blank?
        options:
          - Because
          - Although
          - Despite
          - However
        correctAnswer: 3
        explanation: >-
          Two clues. (1) The two ideas contrast (heavy rain vs continuing the match). So it's a contrast word, not "Because". (2) The blank is followed by "the heavy rain" — a NOUN PHRASE, not a clause. "Although" needs a clause (subject + verb): "Although it rained heavily." "Despite" takes a noun phrase: "Despite the heavy rain." "However" needs a comma + a full sentence after, not just a noun phrase.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png

  # ─── Slide 6: The golden check + common traps ───────────────
  - title: "The golden check — read it in context"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Before you move on to the next blank, do THIS one thing — it
      catches more mistakes than anything else. Then watch out for
      the 4 traps below.
    bullets:
      - |-
        **⭐ THE most important check** (do this on EVERY blank):
        After you write your answer, READ THREE SENTENCES out loud (in your head if it's exam time):
        ① the sentence **before** the blank
        ② the sentence **with** the blank (your answer slotted in)
        ③ the sentence **after** the blank
        If the three sentences read smoothly together — meaning makes sense, ideas connect, tenses match — your answer is right. If anything sounds awkward or breaks the flow, change it.
      - |-
        **Trap 1 — Spelling.**
        "occured" (wrong) vs **"occurred"** (right). "definately" vs **"definitely"**.
        "alot" is NEVER a word — it's always **"a lot"** (two words).
        Right word + wrong spelling = 0 marks. Re-read every answer.
      - |-
        **Trap 2 — Capital letter at the start of a sentence.**
        If the blank is the FIRST word of a sentence, capitalise it.
        ✗ "despite the rain…"   ✓ "Despite the rain…"
      - |-
        **Trap 3 — Wrong tense even when you picked the right word.**
        "grow" vs "grew" vs "grown" vs "growing" — read the OTHER verbs to decide. Don't just pick whichever sounds nicest.
      - |-
        **Trap 4 — Plurality / -s on the verb.**
        Singular subject → +s on the present-tense verb.
        ✓ "She walks." · ✗ "She walk."
        ✓ "The boys walk." · ✗ "The boys walks."

  # ─── Slide 7: Try it — Collocations & Traps ─────────────────
  - title: "Try it — Collocations & Traps"
    mascotImage: /master-class/grammar-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "Collocation — verb + noun"
        stem: |-
          Read the sentence:
          "The teacher asked the class to ____ their best in the exam tomorrow."
          Which word fits the blank?
        options:
          - make
          - have
          - take
          - do
        correctAnswer: 4
        explanation: >-
          "**Do** your best" is the fixed phrase — like "do your homework". English uses "do" with these effort/duty words, not "make". "Make" goes with decisions / mistakes / effort ("make an effort"). "Take" goes with chances / actions. "Have" goes with feelings or experiences. The trick is just memorising these from reading.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png
      - label: "Singular vs plural verb"
        stem: |-
          Read the sentence:
          "The list of names ____ very long, which makes it hard to read."
          Which word fits the blank?
        options:
          - are
          - is
          - were
          - be
        correctAnswer: 2
        explanation: >-
          Tricky one. The SUBJECT of the verb is "the list" (singular), NOT "names". "Of names" just describes what kind of list. Singular subject + present tense → "is". The rest of the sentence is in present ("makes it hard"), so we stay in present. PSLE loves this trap — they put a plural noun in between a singular subject and its verb to confuse you.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png

