commonMistakes: []

keyWords:
  - { word: "comprehension cloze", definition: "The fill-in-the-blank passage with 15 blanks and NO word bank. Each blank = 1 mark = 15 marks total. Spelling, tense, plural-singular all count." }
  - { word: "linking word", definition: "Words that connect ideas: but, so, although, because, despite, however. The blank's neighbours tell you which RELATIONSHIP is needed — contrast, reason, addition, time." }
  - { word: "collocation", definition: "Words that always travel together — 'do homework' (not 'make homework'), 'a sense of belonging', 'pay attention', 'in spite of'. Can't be guessed from grammar; must be memorised from wide reading." }
  - { word: "tense match", definition: "When the passage is in past tense, the blank verb is past too. Scan the verbs around the blank — they tell you which tense to use. Mixing tenses = 0 marks even if the word is right." }
  - { word: "phrasal verb", definition: "Two-word verbs like 'meet up', 'cut down', 'give up', 'look after'. The second word changes the meaning of the first. PSLE tests these when the small word goes missing — fill in 'up', 'down', 'after' etc." }
  - { word: "preposition fight", definition: "When your chosen word needs a DIFFERENT preposition than the one already in the passage. 'Had FROM a serious injury' is broken; 'suffered FROM' is the fixed pair. The read-aloud test catches this — if the three sentences don't flow, change your word." }

subTopics:
  - id: verbs
    label: Verbs (tense, agreement)
    description: "Most common cloze type. Match the tense to other verbs in the passage. Watch singular vs plural agreement and irregular past forms (brought, caught, grew)."
    slideIdx: 3
  - id: linkers
    label: Linking words
    description: "But / so / although / despite / however. Decide which relationship the blank shows (contrast / reason / addition / time) before guessing the word."
    slideIdx: 4
  - id: collocations
    label: Collocations
    description: "Fixed phrases — 'do homework', 'make sense', 'a sense of belonging'. Can't be reasoned out; must be memorised from reading. Highest-leverage thing to drill."
