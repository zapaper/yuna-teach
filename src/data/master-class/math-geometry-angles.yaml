keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Geometry: Angles & Shape Properties"
    mascotImage: /master-class/patterns/panda-welcome.png
    body: >-
      Geometry questions test the same 5 patterns over and over. Each
      one has a standard sequence of rules to apply. Learn the
      sequence per pattern, and the angle-chase becomes mechanical.
    bullets:
      - "**Pattern A** — Angle basics: straight line, vertically opposite, angles at a point. Watch for the 180° vs 360° reflex-angle trap."
      - "**Pattern B** — Parallel lines: alternate (Z, equal), co-interior (C, sum to 180°), corresponding (F, equal)."
      - "**Pattern C** — Quadrilateral hides an isosceles triangle (the most common heavy-mark shape, 12 of 19 heavy Qs in PSLE 2016-2025)."
      - "**Pattern D** — Two shapes glued together: spot the hidden isosceles + use rhombus / parallelogram opposite-angle rules to angle-chase across the shared vertex."
      - "**Pattern E** — Folded paper: same trick as Pattern D, except the hidden triangle is equilateral (folding preserves side length)."

  # ─── Slide 1: Pattern A — Angle basics ───────────────────────
  - title: "Pattern A — Angle basics (the 1-2 mark bread-and-butter)"
    mascotImage: /master-class/patterns/panda-teaching-action.png
    diagramImage: /master-class/math-geometry-angles/pattern-a.jpeg
    body: >-
      15 one-mark + 28 two-mark angle basics across PSLE 2016-2025 —
      about 70 marks total. Pick the right rule for the shape
      configuration you're looking at, do the arithmetic, done.
    bullets:
      - "**Angles on a straight line = 180°.** Two lines meeting where one continues straight through."
      - "**Vertically opposite angles are EQUAL.** Two lines cross forming an X — angles across from each other are equal."
      - "**Angles at a point = 360°.** Three or more lines meeting at the same vertex."
      - "**Right angles = 90°.** The small square in the diagram is the giveaway."
      - "**The 180° vs 360° reflex-angle trap (real PSLE 2020 Q23):** ABC is equilateral, ∠x is the BIG (reflex) angle around point A. Students automatically subtract from 180° and get 55°. The correct rule is 360° (angles at a point): ∠x = 360° − 60° − 65° = 235°."
      - "First question to ask: *is this angle on a straight line, across an X-cross, around a point, or inside a shape?* Pick the rule BEFORE the arithmetic."

  # ─── Slide 2: Pattern B — Parallel lines ─────────────────────
  - title: "Pattern B — Parallel lines (3 rules)"
    mascotImage: /master-class/patterns/panda-teaching-differences.png
    diagramImage: /master-class/math-geometry-angles/pattern-b.jpeg
    body: >-
      Whenever the question says "AB is parallel to CD", three angle
      rules unlock. Pick the right one for the Z / C / F shape you see
      between the parallel lines.
    bullets:
      - "**Alternate angles (Z-shape) are EQUAL.** Look for a Z-shape between the parallel lines — angles on OPPOSITE sides of the transversal."
      - "**Co-interior angles (C-shape) SUM TO 180°.** Look for a C-shape — angles on the SAME side of the transversal."
      - "**Corresponding angles (F-shape) are EQUAL.** Two angles in the same position relative to where each parallel line meets the transversal."
      - "**Worked example (real PSLE 2017 Q27, 2 marks):** ABCD is a parallelogram. AED and BFC are straight lines. ∠DEF = 108°, ∠BFA = 90°. Find ∠AFE."
      - "Step 1: ∠CFE = 180° − 108° = 72° (co-interior, DE // CF — they're parallel sides of the parallelogram)."
      - "Step 2: ∠AFE = 180° − 90° − 72° = **18°** (angles on a straight line BFC, where ∠BFA = 90°)."

  # ─── Slide 3: Pattern C — Quadrilateral hides an Isosceles ──
  - title: "Pattern C — Quadrilateral hides an Isosceles (most-tested)"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    diagramImage: /master-class/math-geometry-angles/pattern-c.jpeg
    body: >-
      The most common heavy geometry pattern (12 of 19 four-mark+
      questions in PSLE 2016-2025). Equal-side marks INSIDE a named
      quadrilateral → spot the isosceles triangle → use base angles +
      triangle sum 180°.
    bullets:
      - "**Trap 1:** trapeziums in PSLE are USUALLY NOT isosceles. Only claim base angles equal when the equal-side mark is stated."
      - "**Trap 2:** \"AB = AC = CD\" doesn't make ABC equilateral — only the named pairs are equal."
      - "**Worked example (real PSLE 2021 QP2-13, 4 marks):** ABCD is a trapezium with AB // DC. AFB and EFC are straight lines, AE = EB, ∠EBC = 94°. Find ∠AEF."
      - "Step 1: ∠EAB = 180° − 94° = 86° (co-interior, AE // BC — using parallel sides AB // DC, with EF as transversal)."
      - "Step 2: ∠EBA = ∠EAB = 86° (isosceles triangle, AE = EB → base angles equal)."
      - "Step 3: ∠AEB = 180° − 86° − 86° = 8° (sum of angles in triangle AEB)."
      - "Step 4: ∠AEF = 180° − 8° = **172°** (angles on a straight line AFB)."

  # ─── Slide 4: Pattern D — Two-shape glue ─────────────────────
  - title: "Pattern D — Two shapes glued together (rhombus + parallelogram)"
    mascotImage: /master-class/patterns/panda-teaching-subpatterns.png
    diagramImage: /master-class/math-geometry-angles/pattern-d.jpeg
    body: >-
      Look out for the hidden isosceles triangle. Then chain the
      rhombus + parallelogram opposite-angle rules (opposite angles
      equal; adjacent angles sum to 180°).
    bullets:
      - "**Worked example (real PSLE 2016 QP2-7, 4 marks — part (b)):** ABCD is a parallelogram, DEFG is a rhombus, CDE is a straight line. ∠ABC = 51°, ∠GAD = 25°, ∠FGE = 35°. Find ∠AGF."
      - "Step 1: ∠GEF = ∠FGE = 35° (base angles of an isosceles triangle — rhombus side EF = side GF)."
      - "Step 2: ∠GFE = 180° − 35° − 35° = 110° (sum of angles in triangle EGF)."
      - "Step 3: ∠GDE = ∠GFE = 110° (opposite angles of a rhombus)."
      - "Step 4: ∠CDA = ∠CBA = 51° (opposite angles of a parallelogram)."
      - "Step 5: ∠ADG = 180° − 51° − 110° = 19° (angles on a straight line CDE)."
      - "Step 6: ∠AGD = 180° − 25° − 19° = 136° (sum of angles in triangle ADG)."
      - "Step 7: ∠DGE = (180° − 110°) ÷ 2 = 35° (base angles of isosceles triangle DEG — diagonal of rhombus splits it into two equal halves)."
      - "Step 8: ∠AGF = 360° − 136° − 35° − 35° = **154°** (angles at a point G)."

  # ─── Slide 5: Pattern E — Folded paper ──────────────────────
  - title: "Pattern E — Folded paper (same trick, but equilateral)"
    mascotImage: /master-class/patterns/panda-teaching-nth-term.png
    diagramImage: /master-class/math-geometry-angles/pattern-e.jpeg
    body: >-
      Folding preserves side lengths — the folded side equals the
      original side. This often creates a hidden EQUILATERAL triangle
      (3 sides equal → all 60°). Then use the original shape's 90°
      corners to finish.
    bullets:
      - "**Worked example (real PSLE 2025 Q14, 2 marks):** Square PQRS. Line GH divides the paper into two equal parts. Paper is folded so corners P and Q meet at point E on GH. Which statements are true: A. ∠MRE = 30°, B. ∠RMG = 105°, C. RSE is equilateral?"
      - "Step 1: ER = ES = RS (folding preserves side length — P went to E, so ER = PR = RS; similarly ES = QS = RS)."
      - "→ RSE is an equilateral triangle, so **statement C is true**."
      - "Step 2: ∠ERH = 60° (angle of an equilateral triangle, since ∠ERS = 60° within the square's right angle ∠SRH)."
      - "Step 3: ∠MRE = (90° − 60°) ÷ 2 = **15°** (NOT 30°, so statement A is false)."
      - "Step 4: In triangle MRH: 180° − 90° − 15° = 75°."
      - "Step 5: ∠RMG = 180° − 75° = **105°** (angles on a straight line), so **statement B is true**."
      - "**Answer: B and C only.**"

  - title: "Let's get some practice!"
    mascotImage: /master-class/patterns/panda-cta.png
    body: >-
      Time to put it together. This quiz pulls real PSLE-style
      geometry questions across all 5 patterns.
    bullets:
      - "**10 MCQ + 5 OEQ** — a mix across angle basics, parallel lines, quadrilateral-isosceles, two-shape glue, and folded paper."
      - "After you submit, the AI looks at where you went wrong and suggests a follow-up focused quiz on just those patterns."
      - "Mistakes auto-saved — we'll come back to them in 1 week."
