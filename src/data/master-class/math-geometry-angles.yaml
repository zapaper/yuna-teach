keyWords:
  - { word: "angles on a straight line", definition: "Two angles sharing a straight line as their boundary sum to 180°. Most common geometry rule — appears in almost every PSLE Paper 2 angle question." }
  - { word: "angles at a point", definition: "Angles meeting at a single vertex sum to 360°. Used when the angle asked is the BIG (reflex) angle going around the outside of a shape." }
  - { word: "vertically opposite angles", definition: "When two lines cross to form an X, the angles across from each other are EQUAL. Look for the X-cross in the figure." }
  - { word: "alternate angles", definition: "Z-shape between two parallel lines. The two angles on OPPOSITE sides of the transversal are EQUAL." }
  - { word: "co-interior angles", definition: "C-shape between two parallel lines. The two angles on the SAME side of the transversal SUM TO 180°." }
  - { word: "isosceles triangle", definition: "A triangle with TWO sides equal. The two BASE angles (across from the equal sides) are EQUAL." }
  - { word: "equilateral triangle", definition: "A triangle with all THREE sides equal. All 3 angles are 60°. Use as a 'free anchor' whenever it appears in a figure." }
  - { word: "rhombus", definition: "A 4-sided shape with all 4 sides equal. Opposite angles are equal. Adjacent angles sum to 180°. Diagonals bisect at 90°." }
  - { word: "parallelogram", definition: "A 4-sided shape with both pairs of opposite sides parallel. Opposite sides equal, opposite angles equal, adjacent angles sum to 180°." }

