# Master Class: PSLE Math — Geometry (Angles & Shape Properties)
# ---------------------------------------------------------------
# Pure angle / quadrilateral / triangle / parallel-lines / folded-paper
# patterns. 3D solids + composite-area / cube nets are NOT here —
# those live in their own master classes (math-painted-cube and
# math-combined-figure-area).
#
# Built from analysis of 68 pure-angle questions across PSLE 2016-2025.
# Coverage:
#   - 15 one-mark, 28 two-mark — bread-and-butter basics (~70 marks total)
#   - 13 four-mark + 5 five-mark "killer" OEQs (~75 marks total)
#
# Five trap patterns covered:
#   A. Angle basics — straight line / vertically opposite / 180 vs 360
#   B. Parallel lines — alternate vs co-interior (rule-naming is the mark)
#   C. Quadrilateral-hides-Isosceles — 12 of 19 heavy Qs
#   D. Two-shape glue — equilateral / rhombus / square stuck together
#   E. Folded paper — reflection creates equal angles + sides
#
# Slide flow (9 slides):
#   0  Welcome             — 5 patterns + reason-writing habit
#   1  Pattern A: Angle basics + 180 vs 360 trap
#   2  Pattern B: Parallel lines (alternate vs co-interior)
#   3  Pattern C: Quadrilateral hides an Isosceles triangle
#   4  Pattern D: Two-shape glue (angle-chase across a vertex)
#   5  Pattern E: Folded paper geometry
#   6  The 5-mark killer skeleton — stack 3+ angle facts
#   7  Top 6 traps
#   8  Practice CTA

