topicLabel: 阅读理解 OEQ
title: "PSLE 华文 — 写作套话 (Q33 + Q40)"

stats:
  headline: >-
    PSLE 华文 Q33 (写作 4 分) + Q40 (意见 4 分) = 8 分。题目每年都变,
    但格式和"套话"基本相同。背熟套话, 套上去就有分。

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: 欢迎来到《写作套话》— Q33 + Q40 (8 分稳拿)
    mascotImage: /master-class/chinese-mcq-1/panda-welcome.png
    body: >-
      Q33 和 Q40 都是"模板题"。意思是: 题目年年换, 但**写法和句式
      高度重复**。背熟一套"万能套话", 就能直接用上去。
      Welcome — Q33 (writing, 4m) and Q40 (opinion, 4m) are
      template-based. Topics change each year, but the SENTENCE
      PATTERNS repeat. Memorise the "set pieces" and slot them in.
    bullets:
      - |-
        **Q33: 短文写作 (4 分)** — 写给谁？10 年统计:
        电邮 **44%** (4x) ｜ 手机短信 **44%** (4x) ｜ 便条 **11%** (1x)
        Q33 short-form writing — 10-year breakdown:
        Email **44%** ｜ SMS **44%** ｜ Note **11%**
      - |-
        **Q40: 个人意见 (4 分)** — 近 4 年只考 2 种题型:
        (a) 你同意吗？**几乎每年都考** ｜ (b) 是怎样的人？**偶尔考**
        Q40 opinion — last 4 years only have 2 formats:
        (a) Do you agree? **almost every year** ｜
        (b) What kind of person? **occasional**
        (其他题型如"比较" / "如果你是" / "解释" — 近 4 年极少见)
        (Other formats — compare / hypothetical / explain — rare in
        recent years)
      - |-
        **方法**: 记住"模板 + 套话", 题目一变只换关键词
        Strategy: memorise the template + stock phrases, swap key words
    callout: >-
      下面所有套话都是从 PSLE 真题 2016-2025 的"标准答案"里挑出来的。
      All phrases below come from PSLE official model answers 2016-2025.

  # ─── Q33: Anatomy of the writing task ────────────────────────
  - title: "Q33: Short Note (短文写作) — 模板 5 步走"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      Short Note 永远是给某人写电邮、短信或便条, 告诉对方关于一个活动的事。
      每一篇都按这 5 步写, 不会出错。
      Short Note is always writing to someone about an event/notice.
      Use these 5 steps every time.
    bullets:
      - |-
        **1. 问候 / 称呼** — "X, 你好!" / "X:"
        Greeting — "Hi X!" or "X:"
      - |-
        **2. 起因** — 我看到 / 我已经报名 / 我想邀请你
        Hook — "I saw…" / "I just signed up…" / "I want to invite you…"
      - |-
        **3. 详情** — 时间、地点、活动内容 (从通告抄重点)
        Details — date, place, activity (lift from the notice)
      - |-
        **4. 理由** — 为什么这件事对对方有好处
        Reason — why the recipient should care
      - |-
        **5. 结尾** — 号召行动 + "祝身体健康"
        Closing — call to action + sign-off
    callout: >-
      做题前先在草稿纸上写下这 5 步, 然后每一步填一句话, 不会漏。
      Sketch the 5 steps on rough paper first; fill in one sentence each.

  # ─── Q33 Marking Breakdown ──────────────────────────────────
  - title: "评分 — 5 步对应 2 分语言 + 2 分内容"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      Short Note 总分 4 分。把上一张的 5 步对应到评分:
      **① 问候 + ② 起因 + ⑤ 结尾 = 语言 2 分**;
      **③ 详情 + ④ 理由 = 内容 2 分** (4 个 0.5)。
      Short Note = 4 marks. Mapping the 5 steps to the marking:
      **Steps 1+2+5 (greeting + hook + closing) → 2 LANGUAGE marks.**
      **Steps 3+4 (details + reasons) → 2 CONTENT marks (4 × 0.5).**
    bullets:
      - |-
        **语言 2 分** = 步骤 ①②⑤ 写得齐全 + 通顺
        Language 2m = steps 1+2+5 (greeting / hook / closing) are present
        and smooth. Skip the sign-off, wrong greeting, abrupt ending →
        language marks docked.
      - |-
        **内容 2 分** = 步骤 ③④ 里**抄出 4 个具体事实**, 每个 0.5 分
        Content 2m = lift 4 specific facts from steps 3+4 — each fact
        worth 0.5. Vague paraphrasing doesn't score.
      - |-
        **4 个 0.5 永远是这几类的某 4 个组合:** WHEN (时间) / WHERE (地点)
        / WHAT (做什么) / WHY (为什么) / HOW (怎么做、多少钱)
        The four 0.5s are always some combo of: WHEN / WHERE / WHAT / WHY / HOW
      - |-
        **2024 真题:** ① 10 月 28 日回学校 (WHEN ✓0.5) ② 表演舞蹈 (WHAT ✓0.5)
        ③ 参观照片展览 (WHAT ✓0.5) ④ 了解母校 (WHY ✓0.5)
        2024 model: date + activity 1 + activity 2 + reason
      - |-
        **2025 真题:** ① 11 月 29 日十点到三点 (WHEN ✓0.5) ② 在东海岸海滩 (WHERE ✓0.5)
        ③ 学习保护环境 (WHY ✓0.5) ④ 了解小海龟 (WHY ✓0.5)
        2025 model: time + place + reason 1 + reason 2
      - |-
        **2023 真题:** ① 10 月 7 日之前 (WHEN ✓0.5) ② 网站报名 (HOW ✓0.5)
        ③ 收费 20 元 (HOW/COST ✓0.5) ④ 报名时付费 (WHEN ✓0.5)
        2023 model: deadline + how + cost + when to pay
      - |-
        **历史说明:** PSLE 官方从 2023 年开始才公开标 (0.5) 标记。
        2016-2022 年没有公开细标, 但评分标准 (2m + 2m) 是一致的。
        Note: PSLE has only published per-fact (0.5) annotations since 2023.
        Older years used the same 2m+2m rubric but without itemised breakdowns.
    callout: >-
      **拿满分两件事:** ①③④ 把题目问到的每个**详情和理由**都答全 → 拿 2 分内容 ✓
      ②①⑤ 把**问候 + 起因 + 结尾**按格式写好 → 拿 2 分语言 ✓
      **Full-marks recipe — two things:** (1) answer EVERY detail and
      reason the question asks for → bank 2 content marks. (2) write the
      greeting + hook + closing properly per format → bank 2 language marks.

  # ─── Q33 步骤 ① + ② 开头 (问候 + 起因) ─────────────────────
  - title: "步骤 ①② — 开头 (问候 + 起因)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      开头 = **问候 + 起因**, 两句话搞定。这两步**不给内容分, 但写不好扣语言分**。
      Opening = **greeting + hook**, two sentences max. These two
      steps don't carry CONTENT marks, but skipping/messing them
      DOCKS the 2 language marks.
    bullets:
      - |-
        **① 问候 — 用名字直接称呼:**
        Step 1 — greet by name:
        **小文,** / **国文表哥:** / **妈妈:** / **外婆,**
        Xiaowen, / Cousin Guowen: / Mom: / Grandma,
      - |-
        **② 起因 — 一句话讲明"我为什么写这封信":**
        Step 2 — one sentence stating why you're writing:
      - |-
        (邀请类) **我想邀请你一起 ___。**
        (Invite) I want to invite you to ___.
      - |-
        (分享类) **我好兴奋, 因为我刚报名参加了"___"活动。**
        (Share) I'm excited because I just signed up for "___".
      - |-
        (提醒类) **明天我们要去 ___, 我想提醒你 ___。**
        (Remind) Tomorrow we're going to ___, I want to remind you ___.
      - |-
        (请求类) **请帮我 ___。**  *(便条向爸妈求帮忙)*
        (Ask) Please help me ___. *(notes asking parents for help)*
      - |-
        (推荐类) **您知道吗？就算 ___, 您也能 ___。**
        (Recommend) Did you know? Even if ___, you can still ___.
    callout: >-
      开头超过 2 句话 = 浪费时间。直接 1 句问候 + 1 句起因 → 跳到详情和理由。
      More than 2 sentences in the opening = wasted time. 1 greeting +
      1 hook → jump straight to details + reasons (where the marks live).

  # ─── Q33 步骤 ③ Details (with concrete date/time examples) ──
  - title: "步骤 ③ — 详情 (时间、地点、活动) — 内容 1 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      详情 = 从通告里抄出**具体事实**。每个事实 0.5 分。下面分别给你
      **时间、地点、活动**的写法模板:
      Details = lift SPECIFIC facts from the notice. Each fact = 0.5 mark.
      Below are write-out templates for time / place / activity:
    bullets:
      - |-
        **时间 (WHEN) 写法 — PSLE 标答最爱的格式:**
        Time format — PSLE's favourite patterns:
        **X 月 X 日** (date) — e.g. 11 月 29 日, 10 月 28 日
        **上午 / 下午 X 点** (am/pm) — e.g. 上午十点, 下午三点
        **上午 X 点到下午 X 点** (span) — e.g. 上午十点到下午三点
        **X 月 X 日之前** (before / deadline) — e.g. 10 月 7 日之前
        **每个星期 X** (every X) — e.g. 每个星期五上午九点到十点
      - |-
        **地点 (WHERE) 写法:**
        Place format:
        **在 ___ (地点) 举行 / 举办。** — e.g. 在东海岸海滩举行 (2025)
        **在 ___ 集合。** — e.g. 在交通公园门口集合 (2018)
      - |-
        **活动 (WHAT) 写法 — 把"做什么"写清楚:**
        Activity format — make "what we'll do" concrete:
        **可以 ___, 还可以 ___。** — e.g. 可以表演舞蹈, 还可以参观展览 (2024)
        **将提供 ___。** — e.g. 将提供各种各样的故事书 (2017)
      - |-
        **完整句式 (一句话装下时间+地点+活动):**
        Full pattern (one sentence with time+place+activity):
        **这个活动将在 X 月 X 日 上午/下午 X 点, 在 ___ 举行。**
        The activity will be held on [date] at [time] at [place].
      - |-
        **报名 / 费用 (HOW) 写法:** **报名的方法是 ___**, **收费是 X 元**, **需在 ___ 付费**
        Registration / cost: "the way to register is ___", "fee is X dollars", "pay by ___"
    callout: >-
      通告里 80% 的信息都可以**直接抄**进作文。这是合法的"抄答案"!
      80% of the info from the notice can be COPIED into your answer.
      Lifting from the notice is the official strategy.

  # ─── Q33 步骤 ④ Reason (with examples) ─────────────────────
  - title: "步骤 ④ — 理由 (为什么参加) — 内容 1 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      理由 = 解释**为什么对方应该关心**。每个理由 0.5 分。下面给你 3 种最常用的写法:
      Reasons = explain WHY the recipient should care. Each reason
      = 0.5 mark. 3 most-used patterns below:
    bullets:
      - |-
        **写法 1: "不仅能 ___, 也能 ___。" (双理由, PSLE 最爱)**
        Pattern 1: "Not only can …, but also …" (double reason — PSLE favourite)
        例: 我不仅能学习保护环境, 也能了解小海龟出生的条件 (2025)
        Ex: "I can not only learn to protect the environment, but also
        understand sea turtle hatching" (2025 model)
      - |-
        **写法 2: "因为 ___, 所以 ___。" (单理由, 直白)**
        Pattern 2: "Because …, so …" (single reason — direct)
        例: 因为这是一项有意义的活动, 所以我想报名参加。
        Ex: "Because this is a meaningful activity, I want to register."
      - |-
        **写法 3: 个人化的理由 (针对收件人)**
        Pattern 3: personalised reason (tailored to the recipient)
        例: 你一向喜欢看书, 这个"阅读角落"将提供各种书籍 (2017)
        Ex: "You've always liked reading — this 'reading corner' will
        provide all kinds of books" (2017 model)
      - |-
        **写给长辈时的额外套话:**
        Bonus phrases when writing to elders:
        **我们都希望您有健康的身体。** — We all hope you stay healthy.
        **这是一项非常有意义的活动。** — This is a very meaningful activity.
      - |-
        **加分关联词:**
        Bonus connectors:
        **不仅 ___, 也 ___** / **不但 ___, 还 ___** / **不只 ___, 而且 ___**
        "Not only X, but also Y" — three interchangeable forms.
    callout: >-
      "不仅 ___, 也 ___"几乎每年都出现 — 它一句话就拿 2 个 0.5 分。背熟!
      "Not only … but also …" appears almost every year — it earns TWO
      0.5 marks in a single sentence. Memorise it.

  # ─── Q33 步骤 ⑤ Closing (with format-by-format breakdown) ───
  - title: "步骤 ⑤ — 结尾 (3 种格式, 一定要写对)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      结尾**格式因写信类型而不同**。写错格式 = 扣语言分。
      看 PSLE 真题里 3 种格式的差异:
      Closing format DEPENDS on the type of letter. Wrong format =
      language marks docked. The 3 formats from PSLE actual papers:
    bullets:
      - |-
        **格式 A — 电邮 (Email) [2017, 2020, 2021, 2025]:**
        Format A — Email:
        最后一句 (号召行动) — e.g. 待我参加活动后再跟你分享！
        Last sentence (call to action)
        **祝** *(空一行)*
        **身体健康** *(缩进, 单独一行)*
        **[你的名字]** *(单独一行)*
        Wishing / good health / [your name] — each on its own line.
      - |-
        **格式 B — 短信 (SMS) [2018, 2019, 2022, 2024]:**
        Format B — SMS:
        最后一句直接结尾 — e.g. 您要记得收看哦！(2022) / 快快行动吧！(2019)
        Final sentence ends the message — no formal sign-off.
        **没有"祝身体健康", 也没有单独签名。**
        NO "祝 / 身体健康", NO separate sign-off line.
      - |-
        **格式 C — 便条 (Note) [2023]:**
        Format C — Note:
        最后一句结尾 — e.g. 请您一定要在 ___ 之前报名。
        **[你的名字]** *(单独一行)*
        **[日期]** *(单独一行, e.g. 10 月 3 日)*
        **[时间]** *(单独一行, e.g. 晚上 9 点)*
        Name / Date / Time — each on its own line, like a memo footer.
      - |-
        **3 种格式的"号召行动"句式 (任选 1 句, 放在结尾前):**
        Call-to-action phrases (pick one, place BEFORE the sign-off):
        **机不可失, 记得 ___。** Don't miss this — remember to ___.
        **快快行动吧！** Hurry, take action!
        **我们 X 月 X 日一起去吧！** Let's go together on [date]!
        **您要记得 ___ 哦！** *(对长辈)* Remember to ___! (to elder)
    callout: >-
      看题目里给你的"格式提示":
      电邮有"发件人/收件人/主题" → 用电邮格式。
      短信只有称呼 → 用短信格式。
      便条会说"留下一张便条" → 用便条格式。
      Read the question's format hint: email has sender/recipient/subject,
      SMS just has a greeting, note says "leave a note" — match the format.

  # ─── Q33 Worked Example ────────────────────────────────────
  - title: "解题示范 — 2024 年校庆短信 (标出 4 × 0.5)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      题目: 写短信给毕业的邻居小文, 邀请他回学校庆祝校庆 50 周年。
      下面把 5 步模板 + 4 × 0.5 内容分都标出来:
      Prompt: Write SMS to neighbour about school's 50th anniversary.
      Below: 5-step template + 4×0.5 content points labelled:
    bullets:
      - |-
        **① 问候 (语言分):** 小文, 今年是我们学校建校 50 周年...
        Greeting (language mark): "Xiaowen, this year is our school's 50th anniversary…"
      - |-
        **② 起因 (语言分):** 学校欢迎已经毕业的同学回到学校一起庆祝。**我想邀请你一起回校庆祝。**
        Hook (language mark): "I want to invite you to celebrate together."
      - |-
        **③ 详情 (内容 0.5 + 0.5):** 我和你都喜欢跳舞, 我们可以**在 10 月 28 日那天一起回学校 [WHEN ✓0.5]**, **在校庆晚会上表演舞蹈 [WHAT ✓0.5]**。
        Details (2 × 0.5): "Oct 28" [WHEN] + "perform at the gala" [WHAT]
      - |-
        **④ 理由 (内容 0.5 + 0.5):** 当天, **我们还可以去参观学校的历史照片展览 [WHAT ✓0.5]**, **了解我们的母校 [WHY ✓0.5]**。
        Reason (2 × 0.5): "visit the photo exhibition" [another WHAT] + "to learn about our alma mater" [WHY]
      - |-
        **⑤ 结尾 (语言分):** (短信简短, 一句号召语就好)
        Closing (language mark): SMS is brief — a single call-to-action sentence is enough
      - |-
        **总分: 4 × 0.5 = 2 分内容 ✓ + 5 步格式 = 2 分语言 ✓ = 4 分满分**
        Total: 4 × 0.5 = 2 content marks + 5-step structure = 2 language marks = 4 ✓
    callout: >-
      你的写作长度不是关键, **4 个 0.5 + 5 步格式齐全**才是关键。
      简短的好答案比啰嗦的差答案分数高。
      Length isn't what scores — having all four 0.5s + the 5-step structure is. A short, clean answer beats a long, sloppy one.

  # ─── Q33 Practice ──────────────────────────────────────────
  - title: 试一试 — 选最佳开头
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2025 风格 — 写给表哥分享清理海滩活动"
        stem: |-
          题目: 写电邮给表哥, 分享你刚报名参加的"清理海滩活动"。
          下面 4 个开头哪一个**最贴近 PSLE 标答风格**？
        options:
          - 表哥, 关于清理海滩活动, 我有话想说。
          - 国文表哥, 你好！我好兴奋, 因为我刚报名参加了"清理海滩活动"。
          - 嗨, 表哥, 海滩活动你知道吗？
          - 国文哥, 学校要我们去清理海滩。
        correctAnswer: 2
        explanation: >-
          标答开头格式是: **称呼 + "你好"+ 兴奋 / 起因句**。"我刚报名参加了 ___"
          是标答最常用的起因句。其他选项都太随意或缺少模板要素。
          Model answer format: greeting + "你好" + excited/hook sentence.
          "我刚报名参加了…" is the most-used opening in PSLE answers.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "结尾 — 哪一句最像 PSLE 标答？"
        stem: |-
          一封写给外婆推荐"慢慢动起来"运动短片的短信, 结尾用哪句话**最好**？
        options:
          - 外婆, 拜拜。
          - 希望您喜欢看。
          - 外婆, 我们都希望您有健康的身体, 所以您要记得收看短片和做运动哦！
          - 这就是我想说的。
        correctAnswer: 3
        explanation: >-
          PSLE 2022 真题标答原句。结尾要做到两件事: 关心对方 + 催促行动。
          "我们都希望您有 ___" + "您要记得 ___ 哦"是高频套句。
          PSLE 2022 model answer. Closing must do two things: show care +
          urge action. "We all hope you…" + "remember to …!" is the
          stock pattern for letters to elders.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
    callout: >-
      Short Note 拿满分的秘诀: 5 步模板 + 套话 + 抄通告里的详情。
      Full-marks recipe: 5-step template + stock phrases + lift details.

  # ─── Q40: Question Types ───────────────────────────────────
  - title: "Q40: Comprehension Conclusion (阅读理解 OEQ 收尾题) — 2 种主要问法"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      近 4 年 (2022-2025) Comprehension Conclusion (4 分) 只考 2 种题型,
      每种的"答题套路"不同。把这 2 个练熟, 就能稳拿 4 分。
      Last 4 years (2022-2025) Comprehension Conclusion (4m) has used
      ONLY 2 formats. Master these 2 templates → solid 4 marks.
    bullets:
      - |-
        **格式 (a): 你同意吗？** (2022, 2023, 2024, 2025 — **几乎每年都考**)
        **Format (a) — Do you agree?** (2022, 2023, 2024, 2025 — **almost every year**)
        例: "你认为他这么做对吗？" / "你同意 X 的做法吗？" / "如果你是 X, 你还会 ___ 吗？"
        Examples: "Was he right to…?" / "Do you agree with X's approach?"
        / "If you were X, would you still…?" (all variations of yes/no + why)
      - |-
        **格式 (b): X 是怎样的人？** (2021 — **偶尔考, 但 2017 也考过**)
        **Format (b) — What kind of person is X?** (2021 — **occasional**, also 2017)
        例: "卖花的阿姨是个怎样的人？从哪里看出？"
        Example: "What kind of person is the flower-shop lady? How do you know?"
      - |-
        **其他罕见题型** (10 年里只各出过 1-2 次, 不用深练):
        **Other rare formats** (each appeared only 1-2 times in 10 years —
        don't spend study time on these):
        • 比较类: "X 和 Y, 谁更 ___?" (2018)
        • 解释类: "这种方式指的是什么? 为什么 ___?" (2020)
        Compare-type / Explain-type — if these appear, use the same
        "(1) per specific point" rule.
    callout: >-
      看到题目先问自己: "这是 (a) 同意吗 还是 (b) 怎样的人？" 然后套对应模板。
      First question to ask: "Is this (a) agree-or-not OR (b) what-kind-of-person?"
      then apply the matching template.

  # ─── Q40: Marking convention ──────────────────────────────
  - title: "评分 — 每个要点 (1) 分, 共 4 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      标答里你会看到 (1)(1)(1)(1) 这样的标记 — 每一个**具体、明确的要点**
      给 1 分。共 4 个要点 = 4 分满分。
      Model answers show (1)(1)(1)(1) marks — each SPECIFIC, CLEAR point
      earns 1 mark. Four points = full 4 marks.
    bullets:
      - |-
        **格式 (a) — 你同意吗？** 4 个要点是:
        **(1) 表态** + **(1) 理由 1** + **(1) 理由 2** + **(1) 理由 3 / 额外角度**
        Format (a) Agree — four points:
        position + reason 1 + reason 2 + reason 3 / extra angle
      - |-
        **格式 (b) — 是怎样的人？** 4 个要点是:
        **(1) 性格词 1** + **(1) 性格词 2** + **(1) 具体行为证据 1** + **(1) 具体行为证据 2**
        Format (b) Character — four points:
        trait 1 + trait 2 + specific evidence 1 + specific evidence 2
      - |-
        **2025 真题 (格式 a 例子):** 我同意妈妈教育孩子的方法 (1)。
        把做好事和放糖果连接, 让孩子愿意主动帮忙 (1)。这样不仅能减少吵架,
        还能让他们学会关心家人 (1)。用"圣诞老人会来"作为鼓励, 让过程变得有趣又有效 (1)。
        2025 model (Format a): position + mechanism + outcome + bonus angle.
      - |-
        **2021 真题 (格式 b 例子):** 卖花的阿姨是个**慷慨**(1)且**好心**(1)的人。
        虽然小男孩给的钱不够 (1), 但她还是每年自掏腰包帮他送花 (1)。
        2021 model (Format b): 2 traits + 2 passage-evidence points.
    callout: >-
      规律: 每个要点必须**具体**。"他是好人" (X 0 分) vs "他慷慨且好心" (✓ 1 分)。
      Rule: each point must be SPECIFIC. "He is good" (0 marks) vs
      "He is generous and kind-hearted" (1 mark).

  # ─── Q40: Universal template ──────────────────────────────
  - title: "通用模板 — 4 句话 = 4 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      格式 (a) 和 (b) 都可以用同一个 4 句话模板, 只换内容词:
      Both Format (a) and (b) use the SAME 4-sentence skeleton — just
      swap the content words:
    bullets:
      - |-
        **第 1 句 (1 分): 立场** — "我同意" / "我不认同" / "我认为他是 ___ 的人"
        Sentence 1 (1m): take a stance — "I agree" / "I think he is ___"
      - |-
        **第 2 句 (1 分): 主要理由 / 第一个证据** — 引文中具体情节 + 评价
        Sentence 2 (1m): main reason / first evidence — cite passage + evaluate
      - |-
        **第 3 句 (1 分): 第二个证据 / 进一步说明** — 用 "另外" / "再说" / "因为"
        Sentence 3 (1m): second evidence / deeper reasoning — use connectors
      - |-
        **第 4 句 (1 分): 总结 / 个人方案** — 用 "因此" / "我希望" / "我会"
        Sentence 4 (1m): wrap-up / personal action — use "therefore" / "I hope" / "I would"
    callout: >-
      不要写超过 5 句话。多写没分; 少写丢分; **每句一个 (1) 分**最稳。
      Don't exceed 5 sentences. Aim for ONE (1) mark per sentence.

  # ─── Q40 Set Piece 1: Stating Position ─────────────────────
  - title: "套话 ① — 表态 (同意/不同意/评价)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      开头要直接表态, **不要绕弯子**。3 种最常见的开头:
      Open with a direct stance — don't wander. 3 most-common starters:
    bullets:
      - |-
        **我同意 / 我赞成 ___ 的做法。**
        I agree with / I support ___'s approach.
      - |-
        **我不认同 / 我不赞成 ___ 的做法。**
        I disagree with / I don't support ___'s approach.
      - |-
        **我认为 / 我觉得 ___ 是 ___ 的人。**
        I think / I feel ___ is a ___ kind of person.
      - |-
        **如果我是 ___, 我会 / 不会 ___。**
        If I were ___, I would / wouldn't ___.
      - |-
        **通过 ___ , 我认为他们是 ___ 的人。**
        Based on ___, I think they are ___ kind of people.
    callout: >-
      第一句就把立场说清楚 = 拿到第 1 分。
      State the stance in sentence 1 → bank the first mark.

  # ─── Q40 Set Piece 2: Character Traits — POSITIVE ──────────
  - title: "套话 ② — 正面性格词 (背熟 12 个就够)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      "X 是怎样的人？" 题目你只需要 12 个正面词就够用。背熟英文意思,
      下次看到题目就能秒选。
      For "what kind of person?" questions, just 12 positive trait
      words cover most cases. Memorise the English meaning — when
      a question arrives, you can match instantly.
    bullets:
      - |-
        **慷慨** (kāng kǎi) — 大方, 不吝啬
        **GENEROUS** — gives freely, not stingy
      - |-
        **善良 / 好心** (shàn liáng / hǎo xīn) — 心地好
        **KIND / KIND-HEARTED** — good of heart
      - |-
        **宽容大量** (kuān róng dà liàng) — 不计较别人的错
        **TOLERANT / MAGNANIMOUS** — doesn't hold grudges
      - |-
        **懂得体谅别人** (dǒng dé tǐ liàng bié rén) — 理解他人的难处
        **CONSIDERATE** — understands others' difficulties
      - |-
        **孝顺** (xiào shùn) — 对父母好
        **FILIAL** — devoted to parents
      - |-
        **有爱心** (yǒu ài xīn) — 关爱他人和动物
        **LOVING / CARING** — cares for others and animals
      - |-
        **诚实** (chéng shí) — 不说谎
        **HONEST** — doesn't lie
      - |-
        **勇敢** (yǒng gǎn) — 不怕困难
        **BRAVE** — unafraid of hardship
      - |-
        **聪明** (cōng míng) — 头脑灵活
        **CLEVER / SMART** — quick-thinking
      - |-
        **温柔** (wēn róu) — 说话和动作都很轻柔
        **GENTLE** — soft in speech and action
      - |-
        **乐于助人 / 助人为乐** (lè yú zhù rén / zhù rén wéi lè) — 喜欢帮助别人
        **LOVES TO HELP OTHERS** — finds joy in helping
      - |-
        **有责任感** (yǒu zé rèn gǎn) — 做事认真负责
        **RESPONSIBLE** — takes duties seriously
    callout: >-
      考试时不用全部用上, 选 1-2 个最贴近角色行为的就够。
      In the exam you don't need to use all of them — pick 1-2 that
      best match the character's actions.

  # ─── Q40 Set Piece 3: Negative Character Traits ─────────────
  - title: "套话 ③ — 评价人物 (反面性格)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      碰到批评型问题, 用这些"负面评价词":
      For criticism-type questions, use these negative trait phrases:
    bullets:
      - |-
        **傲慢无礼** / **看不起他人**
        Arrogant and rude / looks down on others
      - |-
        **以金钱至上**
        Puts money above all else
      - |-
        **不肯原谅别人** / **不体谅别人**
        Won't forgive others / inconsiderate
      - |-
        **不尊重孩子的兴趣和选择**
        Doesn't respect the child's interests and choices
      - |-
        **强迫 ___ 做不喜欢的事**
        Forces ___ to do what they don't like
    callout: >-
      负面评价用 4 字成语效果最好, 比"他不好"高级很多。
      4-char negative idioms read way more polished than "he is bad".

  # ─── Q40 Set Piece 4: Citing Evidence ──────────────────────
  - title: "套话 ④ — 引用证据 (从文中找理由)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      光"表态"还不够, 必须从文中找证据支持。这些套句把证据"串"进答案:
      Position alone isn't enough — back it up with passage evidence
      using these stitch phrases:
    bullets:
      - |-
        **从 X 可以看出 ___。**
        From X we can see that ___.
      - |-
        **这说明了 ___。** / **这让我们看出 ___。**
        This shows that ___ / This lets us see ___.
      - |-
        **比如 / 例如, X ___。**
        For example, X ___.
      - |-
        **虽然 X, 但是 Y。**
        Although X, but Y.
      - |-
        **即使 X, 也 Y。**
        Even if X, also Y.
      - |-
        **因为 ___, 所以 ___。**
        Because ___, therefore ___.
    callout: >-
      每一处证据用 "从 X 可以看出 ___" 包起来, 评分老师一眼就看到要点。
      Wrap each piece of evidence in "From X we can see…" — examiners spot the point instantly.

  # ─── Q40 Set Piece 5: Wrap-up Connectors ───────────────────
  - title: "套话 ⑤ — 收尾 + 加分关联词"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      最后一句要"扣题": 重申立场或下结论。多用关联词显得有逻辑。
      Final sentence circles back to your stance. Connectors add polish.
    bullets:
      - |-
        **因此 / 所以, 我 ___。**
        Therefore / so, I ___.
      - |-
        **这样不仅能 ___, 还能 ___。**
        This way you can not only ___, but also ___.
      - |-
        **由此可见, ___。**
        From this we can see that ___.
      - |-
        **我希望我的 X 是 ___ 的人。** (适用于"还会把他当朋友吗"型)
        I hope my X is the kind of person who ___. (for "would you still…" qs)
      - |-
        **答案合理即可** — PSLE 允许各种合理观点, 同意和不同意**都可以得满分**, 关键看理由是否合理。
        PSLE accepts ANY reasonable stance — agree OR disagree both score
        full marks if reasoning holds.
    callout: >-
      Comprehension Conclusion 没有"标准答案", 只有"标准结构"。立场可以选, 但套话要规范。
      Comprehension Conclusion has no "correct" stance — only a "correct"
      structure. Pick either side, but use the phrasing.

  # ─── Q40 格式 (a) "你同意吗？" — Worked Example ─────────────
  - title: "格式 (a) — '你同意吗?' (标出 (1)(1)(1)(1) 评分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      格式 (a) 评分规律: **(1) 表态 + (1)(1)(1) 三个不同的理由 = 4 分**。
      "结论"不另算分 — 必须**多加一个理由**才有第 4 分。
      Format (a) scoring: (1) Position + (1)(1)(1) three distinct
      reasons = 4 marks. A pure restatement at the end earns 0 marks —
      the "wrap-up" must ADD a NEW POINT to score.
    bullets:
      - |-
        **PSLE 2025 真题:** 你同意文中妈妈教育孩子的方法吗？(4 分)
        Question: Do you agree with the mom's teaching method? (4m)
      - |-
        **文章摘要 (中文):** 妈妈让吵架的两个哥哥相亲相爱: 每做一件好事,
        就放一颗糖果进瓶子里。瓶子装满了, "圣诞老人"才会来。
        Summary: Mom got fighting brothers to be loving — for each
        good deed, a candy in the jar. When full, "Santa" will come.
      - |-
        **(1) 第 1 句 — 表态:** 我同意妈妈教育孩子的方法。
        (1) Sentence 1 — Position: I agree with the mom's method.
      - |-
        **(1) 第 2 句 — 理由 ① (机制 / 怎么起作用):** 把做好事和放糖果连接起来,
        会让孩子更愿意主动帮忙, 也能让他们觉得有成就感。
        (1) Sentence 2 — Reason 1 (mechanism): Linking good deeds to
        candy makes kids willingly help and feel achievement.
      - |-
        **(1) 第 3 句 — 理由 ② (结果 / 带来什么好处, 用"不仅 ___ 还 ___"):**
        这样不仅能减少两兄弟吵架, 还能让他们学会关心家人。
        (1) Sentence 3 — Reason 2 (outcome, use "not only…but also"):
        Not only reduces fighting, but also teaches caring for family.
      - |-
        **(1) 第 4 句 — 理由 ③ (额外角度, 不要只是"重复立场"):**
        用"圣诞老人会来"作为鼓励, 也让整个过程变得有趣又有效。
        (1) Sentence 4 — Reason 3 (bonus angle, NOT just restating
        position): Using "Santa will come" makes the process fun and
        effective.
      - |-
        **⚠️ 结论的陷阱:** 如果第 4 句只是"所以我同意" — 0 分。必须**多加一个新点**。
        ⚠️ Conclusion trap: if sentence 4 is just "so I agree" → 0 marks.
        Must add a NEW reasoning point. The connector "不仅 …, 还 …" or
        "用 …, 也 …" is the typical signal of "I'm adding one more point".
    callout: >-
      4 句话 = 1 表态 + 3 理由 = 4 分。**每句一个独立的理由, 不重复。**
      4 sentences = 1 position + 3 reasons = 4 marks. Each sentence
      MUST be a distinct reason — don't repeat or just restate.

  # ─── Q40 格式 (b) "X 是怎样的人?" — Worked Example ──────────
  - title: "格式 (b) — 'X 是怎样的人?' (标出 (1)(1)(1)(1) 评分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      格式 (b) 评分规律: **(1) 性格词 1 + (1) 性格词 2 + (1) 证据 1 + (1) 证据 2**。
      性格词必须**和文章中心 / 寓意一致** — 不能随便挑一个适合的。
      Format (b) scoring: (1) trait 1 + (1) trait 2 + (1) evidence 1 +
      (1) evidence 2 = 4 marks. Traits MUST match the passage's MORAL —
      not just any positive word that loosely fits.
    bullets:
      - |-
        **PSLE 2021 真题:** 卖花的阿姨是个怎样的人？从哪里可以看得出来？(4 分)
        Question: What kind of person is the flower-shop lady? Where do you see it?
      - |-
        **文章摘要 (中文):** 小男孩去花店买兰花送给老师, 钱不够。卖花的阿姨
        没说什么, 在接下来好几年都自掏腰包, 帮小男孩送花给老师, 完成他的心愿。
        Summary: A boy buys orchids for teacher; not enough money. The
        flower-lady silently funds the delivery every year, fulfilling
        his wish.
      - |-
        **第 1 步 — 看文章寓意:** 这篇文章的中心是"善良 / 帮助他人"
        Step 1 — read the passage's MORAL: "kindness / helping others"
      - |-
        **第 2 步 — 选 12 个性格词里和寓意最近的 1-2 个:** 慷慨 + 好心
        (从"正面性格词"卡片里选, 不是凭空想!)
        Step 2 — pick 1-2 traits from the 12-trait deck that match the
        moral. Generous (慷慨) + kind-hearted (好心). **Pick from the
        memorised deck — don't invent words.**
      - |-
        **(1)(1) 第 1 句 — 性格词:** 卖花的阿姨是个 **慷慨**(1) 且 **好心**(1) 的人。
        (1)(1) Sentence 1 — name TWO traits: She is generous + kind-hearted.
      - |-
        **(1)(1) 第 2 句 — 证据 (必须用文中具体行为):**
        虽然小男孩给她的钱不够 (1), 但她还是在每年的教师节自掏腰包,
        帮小男孩送花给李老师, 完成小男孩的心愿 (1)。
        (1)(1) Sentence 2 — Evidence with SPECIFIC passage behaviours:
        Even though the boy didn't have enough money, she paid out of
        her own pocket every Teacher's Day to deliver flowers.
      - |-
        **⚠️ 性格词的陷阱:** 写"好"、"善"、"不错" — 0 分。
        必须用 12 个具体性格词之一: 慷慨 / 善良 / 宽容大量 / 懂得体谅别人 / 孝顺 / 有爱心 /
        诚实 / 勇敢 / 聪明 / 温柔 / 乐于助人 / 有责任感。
        ⚠️ Trait trap: writing "good" / "nice" → 0 marks. Must use one
        of the 12 specific traits: GENEROUS / KIND / TOLERANT /
        CONSIDERATE / FILIAL / LOVING / HONEST / BRAVE / CLEVER /
        GENTLE / HELPFUL / RESPONSIBLE.
    callout: >-
      性格题 = 2 性格词 + 2 具体证据。性格词必须**对应文章寓意**, 不能"看脸挑词"。
      Character questions = 2 traits + 2 specific evidence. Traits must
      MATCH the passage's overall moral — don't pick traits based on
      surface impressions.

  # ─── Q40 Practice 1 — with passage scaffold ────────────────
  - title: 试一试 — 2024 小袋鼠强迫练拳
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "题目 + 文章重点都给你, 选最贴近 PSLE 标答的开头"
        stem: |-
          **文章重点 (中文):** 袋鼠爸妈强迫小袋鼠练拳。袋鼠不喜欢练拳, 他想学魔术。
          外公看出小袋鼠很委屈, 把他带回家, 让他学魔术。妈妈最后明白了, 让小袋鼠
          追逐自己的兴趣。
          **题目:** 小袋鼠的父母坚持要他练拳。你同意他们的做法吗？为什么？(4 分)
          下面哪个开头**最贴近 PSLE 标答风格**？
        options:
          - 我觉得袋鼠爸妈不太好, 因为他们太凶了。
          - 我不认同他们的做法。他们应该尊重孩子的兴趣和选择, 而不是逼他们做不愿做的事。
          - 这件事很难说, 因为父母也是为孩子好。
          - 袋鼠爸妈错了, 不应该打孩子。
        correctAnswer: 2
        explanation: >-
          PSLE 2024 标答原句。要点: ① 直接表态 ("我不认同") ② 给出原则性理由
          ("应该尊重 ___ 而不是 ___")。其他选项太口语化或缺少 4 字句结构。
          PSLE 2024 official answer. Key moves: ① direct stance ② principled
          reason using "should respect … rather than …". Other options are
          too colloquial or missing the 4-char structure.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "继续这道题 — 接下来该用哪句套话？"
        stem: |-
          你已经写了 "我不认同他们的做法。" 接下来题目还问: "如果你的父母要求你
          做不喜欢的事, 你会怎么做？" 接下来该用哪一句**最像标答**？
        options:
          - 我会跟他们吵架, 让他们知道我不开心。
          - 我会偷偷不做, 让他们以为我做了。
          - 我会用平和的语气表达自己的感受, 说明为什么不喜欢做这件事。
          - 我没办法, 只能听他们的。
        correctAnswer: 3
        explanation: >-
          PSLE 2024 标答原句。要点: 用"平和的语气""表达自己的感受""说明为什么"
          三个高级短语, 同时不顶撞父母。这就是 PSLE 喜欢的"成熟孩子"答法。
          PSLE 2024 official answer. Key phrases: "calm tone", "express my
          feelings", "explain why" — mature, non-confrontational tone.
          This is the "model student" voice PSLE rewards.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
    callout: >-
      你不用读全文。文中重点都给你了, 你只要选/套对的套话就行。
      You didn't have to read the passage — relevant facts handed to you.
      Just pick the right set piece.

  # ─── Q40 Practice 2 — agree, character trait ───────────────
  - title: 再试一题 — 2025 妈妈的糖果瓶教育
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "收尾句 — 哪一句最像 PSLE 标答？"
        stem: |-
          **文章重点 (中文):** 妈妈让两个吵架的哥哥相亲相爱: 每做一件好事, 就放一颗
          糖果进瓶子里。瓶子装满了, "圣诞老人"才会来。哥哥们不再吵架, 还会一起讨论
          怎么帮助家人。
          **题目:** 你同意文中妈妈教育孩子的方法吗？试加以说明。(4 分)
          你已经写了: "我同意妈妈教育孩子的方法。把做好事和放糖果连接起来, 会让孩子
          愿意主动帮忙。" 收尾该用哪一句？
        options:
          - 反正最后两个哥哥变好了。
          - 这样不仅能减少吵架的次数, 还能让他们学会关心家人。
          - 我也觉得糖果很好吃。
          - 我喜欢圣诞老人。
        correctAnswer: 2
        explanation: >-
          PSLE 2025 标答风格。"这样不仅能 ___, 还能 ___" 是 Comprehension Conclusion 最爱的收尾关联词。
          能多带一个要点 + 显出逻辑层次。其他选项要么离题, 要么不像答题。
          PSLE 2025 style. "This way you can not only … but also …" is THE
          favourite closing connector — adds one more point AND signals logic.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
    callout: >-
      Short Note + Comprehension Conclusion 加起来 8 分。背熟套话, 直接套, 不用临场组织语言。
      Short Note + Comprehension Conclusion = 8 marks total. Memorise the
      phrases, slot them in — no improvisation needed under exam stress.

  # ─── Q40 Practice 3 — English → Chinese trait recall ────────
  - title: 性格词测试 — 看英文写中文
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    body: >-
      答"是怎样的人？"题的关键是: 看到英文意思能马上写出中文词。
      下面 3 道反向小测试:
      For "what kind of person?" questions, the key skill is: when you
      see an English meaning, instantly recall the Chinese word.
      3 reverse-recall quizzes:
    interactiveQuiz:
      - label: "GENEROUS — 中文是哪一个？"
        stem: |-
          想形容卖花的阿姨"自掏腰包帮小男孩送花" → 应该用哪个 4 字词？
          To describe the flower-shop lady who paid out of her own
          pocket to deliver flowers — which Chinese trait fits best?
          (English: GENEROUS)
        options:
          - 慷慨
          - 严格
          - 难为情
          - 退缩
        correctAnswer: 1
        explanation: >-
          慷慨 = generous (PSLE 2021 标答用词)。"严格" = strict, "难为情" =
          embarrassed, "退缩" = shrink back — 都不是 "generous"。
          慷慨 = generous (PSLE 2021 official answer). 严格 = strict, 难为情
          = embarrassed, 退缩 = shrink back — none mean "generous".
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "CONSIDERATE / TOLERANT — 中文是哪一个？"
        stem: |-
          想形容好朋友"原谅我犯的错, 不计较" → 哪个组合最贴近 PSLE 标答？
          To describe a friend who forgives my mistake and doesn't
          hold a grudge — which Chinese combo matches PSLE style?
          (English: TOLERANT + CONSIDERATE)
        options:
          - 严格、认真
          - 宽容大量、懂得体谅别人
          - 聪明、机灵
          - 孝顺、勇敢
        correctAnswer: 2
        explanation: >-
          宽容大量 (tolerant / magnanimous) + 懂得体谅别人 (considerate) —
          PSLE 2023 标答完全用这两个词。其他选项性格对, 但和"原谅、不计较"
          的场景不匹配。
          PSLE 2023 model answer uses exactly these two. Other options
          name real traits but don't match the "forgive + don't hold
          grudges" scene.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "ARROGANT — 中文是哪一个？"
        stem: |-
          想形容用 50 元让小孩下水沟拾手链, 还用钱看不起人的男女 → 用什么词？
          To describe a couple who threw $50 to make a child fetch
          their bracelet from a drain, looking down on poorer people
          — which Chinese trait fits?
          (English: ARROGANT + RUDE)
        options:
          - 慷慨好心
          - 孝顺有礼
          - 傲慢无礼
          - 乐于助人
        correctAnswer: 3
        explanation: >-
          傲慢无礼 = arrogant and rude (PSLE 2017 标答原词)。其他选项都是
          正面词, 用在这里就反了。
          傲慢无礼 = arrogant + rude (PSLE 2017 model answer). The other
          three options are POSITIVE traits — using them here flips the
          meaning.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
    callout: >-
      平时拿性格词卡练: 蒙住中文一边, 看英文回想中文。能 3 秒内回想 = 考场上就能用。
      Practice habit: cover the Chinese side of the trait cards, see
      English → recall Chinese in 3 seconds. That's exam-ready speed.

