# Master Class: PSLE 华文 — 写作套话 (Q33 + Q40 Set Pieces)
# --------------------------------------------------------------
# 涵盖 PSLE 华文 Booklet B 两道高分题:
#   - Q33 (4 分): 短文写作 — 电邮 / 短信 / 便条 / 通知
#   - Q40 (4 分): 个人意见 — 同意/不同意 + 评价人物 + 举例说明
#
# 共 8 分。这两道题每年题目都换, 但格式和"套话"基本一样。
# 把这些"套话"背熟, 写作和意见题就稳了。
#
# Bilingual: Chinese phrases above, English translation below.
# Source: PSLE Chinese 2016-2025 model answers.

slug: chinese-oeq-setpieces
subject: chinese
level: P5-P6
topicLabel: 阅读理解 OEQ
# Stem-classifier mode — both Q33 (短文写作) and Q40 (个人意见) sit
# under syllabusTopic "阅读理解 OEQ", so a hand-coded stem classifier
# (src/lib/master-class/classify-oeq-setpieces.ts) routes each
# candidate into the right bucket. Without this, the picker would
# pull two Q33s by chance — the actual bug the user hit.
paperLevels: [PSLE, P6]
title: "PSLE 华文 — 写作套话 (Q33 + Q40)"

stats:
  headline: >-
    PSLE 华文 Q33 (写作 4 分) + Q40 (意见 4 分) = 8 分。题目每年都变,
    但格式和"套话"基本相同。背熟套话, 套上去就有分。

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: 欢迎来到《写作套话》— Q33 + Q40 (8 分稳拿)
    mascotImage: /master-class/chinese-mcq-1/panda-welcome.png
    body: >-
      Q33 和 Q40 都是"模板题"。意思是: 题目年年换, 但**写法和句式
      高度重复**。背熟一套"万能套话", 就能直接用上去。
      Welcome — Q33 (writing, 4m) and Q40 (opinion, 4m) are
      template-based. Topics change each year, but the SENTENCE
      PATTERNS repeat. Memorise the "set pieces" and slot them in.
    bullets:
      - |-
        **Q33: 短文写作 (4 分)** — 写给谁？10 年统计:
        电邮 **44%** (4x) ｜ 手机短信 **44%** (4x) ｜ 便条 **11%** (1x)
      - |-
        **Q40: 个人意见 (4 分)** — 10 年统计 (其中 2024 一题分两部分,
        前半 A 后半 B 各算一半):
        **(a) 你同意吗？60%** ｜ **(b) 是怎样的人？30%**
      - |-
        **方法**: 记住"模板 + 套话", 题目一变只换关键词

  # ─── Q33: Anatomy of the writing task ────────────────────────
  - title: "Q33: Short Note (短文写作) — 模板 5 步走"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      Short Note 永远是给某人写电邮、短信或便条, 告诉对方关于一个活动的事。
      每一篇都按这 5 步写, 不会出错。
      Short Note is always writing to someone about an event/notice.
      Use these 5 steps every time.
    bullets:
      - |-
        {第一步是}**1. 问候 / 称呼** — {比如写上}"X, 你好!" / {或者简单的}"X:"{。}
      - |-
        {第二步要写明}**2. 起因** — {你可以说}我看到 / 我已经报名 / {或者}我想邀请你{。}
      - |-
        {第三步是提供}**3. 详情** — {包括}时间、地点、活动内容 {，这些可以直接}(从通告抄重点){。}
      - |-
        {第四步要给出}**4. 理由** — {解释一下}为什么这件事对对方有好处{。}
      - |-
        {最后一步是}**5. 结尾** — {记得加上}号召行动 + {比如}"祝身体健康"{这样的客套话。}
      - |-
        {顺便提一下这里的}**评分:** {其中}步骤 ③+④ = {占了}**2 分内容** {，也就是}(4 × 0.5 个事实) · {而}步骤 ①+②+⑤ = {占了}**2 分语言**{。}

  # ─── Q33 步骤 ① + ② 开头 (问候 + 起因) ─────────────────────
  - title: "步骤 ①② — 开头 (问候 + 起因)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      开头 = **问候 + 起因**, 两句话搞定。这两步**不给内容分, 但写不好扣语言分**。
      Opening = **greeting + hook**, two sentences max. These two
      steps don't carry CONTENT marks, but skipping/messing them
      DOCKS the 2 language marks.
    bullets:
      - |-
        **① 问候 — 用名字直接称呼:**
        **小文,** / **国文表哥:** / **妈妈:** / **外婆,**
      - |-
        {接下来是}**② 起因 — {也就是用}一句话讲明"我为什么写这封信":**
      - |-
        {如果是}(邀请类){，你可以写：} **我想邀请你一起 ___。**
      - |-
        {如果是}(分享类){，可以说：} **我好兴奋, 因为我刚报名参加了"___"活动。**
      - |-
        {遇到}(提醒类){，就写：} **明天我们要去 ___, 我想提醒你 ___。**
      - |-
        (请求类) **请帮我 ___。**  *(便条向爸妈求帮忙)*
      - |-
        {最后是}(推荐类){，你可以这样开头：} **您知道吗？就算 ___, 您也能 ___。**

  # ─── Q33 步骤 ③ Details (with concrete date/time examples) ──
  - title: "步骤 ③ — 详情 (时间、地点、活动) — 内容 1 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      详情 = 从通告里抄出**具体事实**。每个事实 0.5 分。下面分别给你
      **时间、地点、活动**的写法模板:
      Details = lift SPECIFIC facts from the notice. Each fact = 0.5 mark.
      Below are write-out templates for time / place / activity:
    bullets:
      - |-
        **时间 (WHEN):** **在 X 月 X 日 上午/下午 X 点到 X 点**
        例 (2025): 在 11 月 29 日上午十点到下午三点
      - |-
        **地点 (WHERE):** **在 ___ 举行**
        例 (2025): 在东海岸海滩举行
      - |-
        **活动 (WHAT):** **可以 ___, 还可以 ___**
        例 (2024): 可以表演舞蹈, 还可以参观历史照片展览
      - |-
        **报名 / 费用 (HOW):** **报名的方法是 ___**, **收费是 X 元**
        例 (2023): 上网站 www.xgyishu.com 报名, 收费 20 元

  # ─── Q33 步骤 ④ Reason (with examples) ─────────────────────
  - title: "步骤 ④ — 理由 (为什么参加) — 内容 1 分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      理由 = 解释**为什么对方应该关心**。每个理由 0.5 分。下面给你 3 种最常用的写法:
      Reasons = explain WHY the recipient should care. Each reason
      = 0.5 mark. 3 most-used patterns below:
    bullets:
      - |-
        **写法 1: "不仅能 ___, 也能 ___。" (双理由, PSLE 最爱)**
        例: 我不仅能学习保护环境, 也能了解小海龟出生的条件 (2025)
      - |-
        **写法 2: "因为 ___, 所以 ___。" (单理由, 直白)**
        例: 因为这是一项有意义的活动, 所以我想报名参加。
      - |-
        **写法 3: 个人化的理由 (针对收件人)**
        例: 你一向喜欢看书, 这个"阅读角落"将提供各种书籍 (2017)
      - |-
        **写给长辈时的额外套话:**
        **我们都希望您有健康的身体。** — We all hope you stay healthy.
        **这是一项非常有意义的活动。** — This is a very meaningful activity.
      - |-
        **加分关联词:**
        **不仅 ___, 也 ___** / **不但 ___, 还 ___** / **不只 ___, 而且 ___**

  # ─── Q33 步骤 ⑤ Closing (with format-by-format breakdown) ───
  - title: "步骤 ⑤ — 结尾 (3 种格式, 一定要写对)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      结尾**格式因写信类型而不同**。写错格式 = 扣语言分。
      看 PSLE 真题里 3 种格式的差异:
      Closing format DEPENDS on the type of letter. Wrong format =
      language marks docked. The 3 formats from PSLE actual papers:
    bullets:
      - |-
        **格式 A — 电邮 (Email) [2017, 2020, 2021, 2025]:**
        待我参加活动后再跟你分享！
        祝
        身体健康
        [你的名字]
      - |-
        **格式 B — 短信 (SMS) [2018, 2019, 2022, 2024]:**
        您要记得收看哦！
        (无签名)
      - |-
        **格式 C — 便条 (Note) [2023]:**
        请您一定要在 ___ 之前报名。
        [你的名字]
        [日期]
        [时间]
      - |-
        **号召行动句 (任选一句, 放在落款前):**
        机不可失, 记得 ___。/ 快快行动吧！/ 我们 X 月 X 日一起去吧！/ 您要记得 ___ 哦！

  # ─── Q33 Worked Example ────────────────────────────────────
  - title: "解题示范 — 2024 年校庆短信 (标出 4 × 0.5)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      题目: 写短信给毕业的邻居小文, 邀请他回学校庆祝校庆 50 周年。
      下面把 5 步模板 + 4 × 0.5 内容分都标出来:
      Prompt: Write SMS to neighbour about school's 50th anniversary.
      Below: 5-step template + 4×0.5 content points labelled:
    bullets:
      - |-
        **① 问候 (语言分):** 小文, 今年是我们学校建校 50 周年...
      - |-
        **② 起因 (语言分):** 学校欢迎已经毕业的同学回到学校一起庆祝。**我想邀请你一起回校庆祝。**
      - |-
        **③ 详情 (内容 0.5 + 0.5):** 我和你都喜欢跳舞, 我们可以**在 10 月 28 日那天一起回学校 [WHEN ✓0.5]**, **在校庆晚会上表演舞蹈 [WHAT ✓0.5]**。
      - |-
        **④ 理由 (内容 0.5 + 0.5):** 当天, **我们还可以去参观学校的历史照片展览 [WHAT ✓0.5]**, **了解我们的母校 [WHY ✓0.5]**。
      - |-
        **⑤ 结尾 (语言分):** (短信简短, 一句号召语就好)
      - |-
        **总分: 4 × 0.5 = 2 分内容 ✓ + 5 步格式 = 2 分语言 ✓ = 4 分满分**

  # ─── Q40 section opener: 2 formats + scoring ──────────────
  - title: "Q40: Comprehension Conclusion (阅读理解 OEQ 收尾题) — 2 种格式 + 评分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      近 4 年只考 2 种格式。每一个**具体、明确的要点** = 1 分。共 4 个要点 = 4 分满分。
      Last 4 years has used 2 formats only. Each SPECIFIC, CLEAR point = 1 mark.
      4 points = full 4 marks.
    bullets:
      - |-
        **格式 (a): 你同意吗？(~60%)** — 4 个要点:
        **(1) 表态** + **(1) 理由 1** + **(1) 理由 2** + **(1) 理由 3 / 额外角度**
      - |-
        **格式 (b): X 是怎样的人？(~30%)** — 4 个要点:
        **(1) 性格词 1** + **(1) 性格词 2** + **(1) 证据 1** + **(1) 证据 2**
    callout: >-
      规律: 每个要点必须**具体**。"他是好人" (X 0 分) vs "他慷慨且好心" (✓ 1 分)。
      Rule: each point must be SPECIFIC. "He is good" (0 marks) vs
      "He is generous and kind-hearted" (1 mark).

  # ─── Q40 Format (a): Template ─────────────────────────────
  - title: "格式 (a) — 你同意吗？(Do You Agree?) — 评分 / Scoring (4 句话 = 4 分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      格式 (a) 用 4 句话, 每句 1 分:
      Format (a) uses 4 sentences, 1 mark each:
    bullets:
      - |-
        {你的}**第 1 句 (1 分): {必须表明}立场** — {比如写 }"我同意" / {或者 }"我不认同"{。}
      - |-
        {接着，}**第 2 句 (1 分): {用来写}理由 1** — {你需要结合}引文中具体情节 + {加上你的}评价{。}
      - |-
        {然后，}**第 3 句 (1 分): {写}理由 2** — {建议}用 "另外" / {、}"再说" / {或者 }"因为"{来连接。}
      - |-
        {最后，}**第 4 句 (1 分): {写}理由 3 / {或者}额外角度** — {可以}用 "这样不仅 ___ 还 ___"{的句型来总结。}

  # ─── Q40 Format (a): Worked Example with real PSLE key ────
  - title: "你同意吗？解题示范 (Do You Agree? — Worked Example) — PSLE 2025 真题 + 官方评分"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-pinyin.png
    body: >-
      **下面是 PSLE 2025 真题的官方标答 (含每个 (1) 标记)。**
      文章摘要: 妈妈让吵架的两个哥哥相亲相爱 — 每做一件好事就放一颗糖果进瓶子,
      瓶子装满了"圣诞老人"才会来。
      题目: 你同意文中妈妈教育孩子的方法吗？(4 分)
      **Below: PSLE 2025 official model answer with the actual (1)(1)(1)(1) marks.**
      Summary: Mom got fighting brothers to be loving — each good deed
      adds a candy; when jar is full, "Santa" comes.
      Question: Do you agree with the mom's teaching method? (4 marks)
    bullets:
      - |-
        **(1) 第 1 句 — 立场:** 我同意妈妈教育孩子的方法。
      - |-
        **(1) 第 2 句 — 理由 1 (机制):** 把做好事和放糖果连接起来, 会让孩子更愿意主动帮忙, 也能让他们觉得有成就感。
      - |-
        **(1) 第 3 句 — 理由 2 (结果, 用"不仅 ___ 还 ___"):** 这样不仅能减少两兄弟吵架, 还能让他们学会关心家人。
      - |-
        **(1) 第 4 句 — 理由 3 (额外角度):** 用"圣诞老人会来"作为鼓励, 也让整个过程变得有趣又有效。
      - |-
        {这样一来，}**总分: {就是四个一分相加，}(1)+(1)+(1)+(1) = 4 分** ✓{，轻松拿满分。}
      - |-
        **⚠️ 陷阱:** 第 4 句不能只是"所以我同意" — 必须多加一个新点。

  # ─── Q40 Format (b): Section Header + Scoring ────────────
  - title: "格式 (b) — X 是怎样的人？(What Kind of Person?) — 评分 / Scoring (4 分)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      格式 (b) 关键: **指出性格 + 至少 2 个文中理由 + 扣回性格 = 4 分**。
      Format (b) recipe: **state trait + at least 2 reasons from
      passage + link back to trait = 4 marks**.
    bullets:
      - |-
        **(1 分) 性格词** — 一句话指出 X 是怎样的人 (列 1-2 个词都只算 1 分)
        套句: "X 是个 **___ 且 ___** 的人。"
      - |-
        **(至少 2 分) 文中具体证据** — 必须是文章里**具体的行为**
        套句: "虽然 ___, 但 ___。另外, ___ 。"
      - |-
        **(1 分) 扣回性格** — 用证据收尾, 重申他是 ___ 的人
        套句: "**由此可见**, X 真的是个 ___ 的人。"
      - |-
        {最后要记住一点}**关键: 性格词必须**和文章寓意一致**, {绝对}不能"看脸挑词"。

  # ─── Q40 Format (b): Positive trait deck ───────────────────
  - title: "格式 (b) — 12 个正面性格词 (POSITIVE traits)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-vocab.png
    body: >-
      "X 是怎样的人？" 题目你只需要 12 个正面词就够用。背熟英文意思,
      下次看到题目就能秒选。
      For "what kind of person?" questions, just 12 positive trait
      words cover most cases. Memorise the English meaning — when
      a question arrives, you can match instantly.
    bullets:
      - |-
        {第一个是}**慷慨** — {意思是}大方, 不吝啬 · {英文是 }GENEROUS{。}
      - |-
        {第二个是}**善良 / 好心** — {代表}心地好 · {英文叫 }KIND-HEARTED{。}
      - |-
        {第三个是}**宽容大量** — {也就是}不计较别人的错 · {英文是 }MAGNANIMOUS / FORGIVING{。}
      - |-
        {第四个是}**懂得体谅别人** — {意思是能}理解他人的难处 · {英文叫 }CONSIDERATE{。}
      - |-
        {第五个是}**孝顺** — {也就是}对父母好 · {英文是 }FILIAL{。}
      - |-
        {第六个是}**有爱心** — {指}关爱他人和动物 · {英文叫 }LOVING / CARING{。}
      - |-
        {第七个是}**诚实** — {也就是}不说谎 · {英文是 }HONEST{。}
      - |-
        {第八个是}**勇敢** — {意思是}不怕困难 · {英文叫 }BRAVE{。}
      - |-
        {第九个是}**聪明** — {代表}头脑灵活 · {英文是 }CLEVER{。}
      - |-
        {第十个是}**温柔** — {指}说话和动作都很轻柔 · {英文叫 }GENTLE{。}
      - |-
        {第十一个是}**乐于助人 / 助人为乐** — {意思是}喜欢帮助别人 · {英文是 }HELPFUL{。}
      - |-
        {最后是}**有责任感** — {也就是}做事认真负责 · {英文叫 }RESPONSIBLE{。}

  # ─── Q40 Format (b): Negative trait deck ─────────────────
  - title: "格式 (b) — 反面性格词 (NEGATIVE traits)"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-idiom.png
    body: >-
      碰到批评型问题 (如 PSLE 2017 "傲慢的男女"), 用这些**反面性格词**:
      For criticism-type questions (e.g. PSLE 2017 arrogant couple),
      use these NEGATIVE trait words:
    bullets:
      - |-
        {第一个是}**傲慢无礼** — {意思是}看不起人, 不礼貌 · {也就是英文的}ARROGANT & RUDE{。}
      - |-
        {第二个是}**以金钱至上** — {指的是}把钱看得比一切都重要 · {英文叫作}MONEY-OBSESSED{。}
      - |-
        {第三个是}**看不起他人** — {也就是}觉得别人不如自己 · {对应英文的}CONDESCENDING{。}
      - |-
        {还有}**不肯原谅别人** — {形容一个人}心胸狭窄 · {英文是}UNFORGIVING{。}
      - |-
        {第五个是}**不体谅别人** — {也就是}不考虑他人感受 · {英文叫}INCONSIDERATE{。}
      - |-
        {接下来是}**自私** — {意思是}只想着自己 · {也就是}SELFISH{。}
      - |-
        {最后是}**强迫别人 / 不尊重别人的选择** — {指的是}把自己的想法强加给别人 · {英文可以说}CONTROLLING / DISRESPECTFUL{。}

  # ─── Q40 格式 (b) "X 是怎样的人?" — Worked Example ──────────
  - title: "X 是怎样的人？解题示范 (What Kind of Person? — Worked Example) — PSLE 2021 卖花阿姨"
    mascotImage: /master-class/chinese-mcq-1/panda-teaching-character.png
    body: >-
      文章摘要: 小男孩去花店买兰花送给老师, 钱不够。卖花的阿姨没说什么,
      在接下来好几年都自掏腰包, 帮小男孩送花给老师, 完成他的心愿。
      题目: 卖花的阿姨是个怎样的人？从哪里可以看得出来？(4 分)
      Summary: A boy buys orchids for teacher; not enough money. The
      flower-lady silently funds the delivery every year, fulfilling his wish.
      Question: What kind of person is the flower-shop lady? How do you know? (4m)
    bullets:
      - |-
        **第 1 步 — {首先}看文章寓意:** {我们能看出阿姨很}善良 /{或者说喜欢}帮助他人{。}
      - |-
        **第 2 步 — {接着我们要}从 12 {个}性格词里挑 1-2 个最贴近寓意的:** {这里选了}慷慨 + 好心{。}
      - |-
        {答题时，能拿}**(1 分){的} 第 1 句 — {直接写出}性格词:** 卖花的阿姨是个**慷慨且好心**的人。
      - |-
        {接着拿}**(1 分){的} 第 2 句 — {写出}证据 ①:** 虽然小男孩给的钱不够, 但她还是自掏腰包帮他送花。
      - |-
        {再拿}**(1 分){的} 第 3 句 — {写出}证据 ②:** 另外, 她坚持每年的教师节都帮小男孩, 完成他的心愿。
      - |-
        {最后拿}**(1 分){的} 第 4 句 — {总结并}扣回性格:** **由此可见**, 卖花的阿姨真的是个慷慨又好心的人。
      - |-
        {这样一来，}**总分: 1 {分性格词} + 2 {分证据} + 1 {分总结} = 4 分** ✓{，轻松拿满分。}
      - |-
        **⚠️ 性格词的陷阱:** 写"好"、"善"、"不错" — 0 分。
        必须用 12 个具体性格词之一。

  # ─── Q40 Practice — English → Chinese trait recall ────────
  - title: 性格词测试 — 看英文写中文
    mascotImage: /master-class/chinese-mcq-1/panda-thinking.png
    body: >-
      答"是怎样的人？"题的关键是: 看到英文意思能马上写出中文词。
      下面 2 道反向小测试:
      For "what kind of person?" questions, the key skill is: when you
      see an English meaning, instantly recall the Chinese word.
      2 reverse-recall quizzes:
    interactiveQuiz:
      - label: "CONSIDERATE / TOLERANT — 中文是哪一个？"
        stem: |-
          想形容好朋友"原谅我犯的错, 不计较" → 哪个组合最贴近 PSLE 标答？
          To describe a friend who forgives my mistake and doesn't
          hold a grudge — which Chinese combo matches PSLE style?
          (English: TOLERANT + CONSIDERATE)
        options:
          - 严格、认真
          - 宽容大量、懂得体谅别人
          - 聪明、机灵
          - 孝顺、勇敢
        correctAnswer: 2
        explanation: >-
          宽容大量 (tolerant / magnanimous) + 懂得体谅别人 (considerate) —
          PSLE 2023 标答完全用这两个词。其他选项性格对, 但和"原谅、不计较"
          的场景不匹配。
          PSLE 2023 model answer uses exactly these two. Other options
          name real traits but don't match the "forgive + don't hold
          grudges" scene.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png
      - label: "ARROGANT — 中文是哪一个？"
        stem: |-
          想形容用 50 元让小孩下水沟拾手链, 还用钱看不起人的男女 → 用什么词？
          To describe a couple who threw $50 to make a child fetch
          their bracelet from a drain, looking down on poorer people
          — which Chinese trait fits?
          (English: ARROGANT + RUDE)
        options:
          - 自私
          - 不肯原谅别人
          - 傲慢无礼
          - 不体谅别人
        correctAnswer: 3
        explanation: >-
          傲慢无礼 = arrogant and rude (PSLE 2017 标答原词) — 抓住了"看不起穷人"
          这个核心。其他三个选项都是反面词, 但和这个具体场景不对路:
          自私只强调"为自己", 不肯原谅别人是关于"心胸狭窄记仇",
          不体谅别人比"傲慢"轻得多。
          傲慢无礼 = arrogant + rude (PSLE 2017 model answer) — captures
          the "look down on poorer people" essence. The other three ARE
          negative traits, but don't fit this exact scene: 自私 only
          stresses "for self", 不肯原谅别人 is about grudges, and
          不体谅别人 is milder than arrogance.
        mascotCorrect: /master-class/chinese-mcq-1/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-1/panda-wrong.png

