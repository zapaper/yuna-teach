commonMistakes: []

keyWords:
  - { word: 套话, definition: "Set pieces — fixed phrases / sentence patterns that work across many topics. Memorise once, use many times." }
  - { word: 起因句, definition: "Hook sentence — tells the reader WHY you're writing. Usually sentence 2 of Q33." }
  - { word: 落款, definition: "Sign-off — closing phrase + your name at the end of formal letters and emails. '祝身体健康' + name is the standard." }
  - { word: 表态, definition: "State your position — first sentence of Q40 answer. Must be DIRECT, not hedged." }
  - { word: 关联词, definition: "Connector — links sentences logically (因此, 所以, 不仅…还). Q40 model answers use one in nearly every sentence." }
  - { word: 个人意见, definition: "Personal opinion — Q40's question type. PSLE accepts either stance; what's marked is structure + reasoning, not which side you pick." }

