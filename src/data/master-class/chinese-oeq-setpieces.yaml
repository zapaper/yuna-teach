# Master Class: PSLE 华文 — 写作套话 (Q33 + Q40 Set Pieces)
# --------------------------------------------------------------
# 涵盖 PSLE 华文 Booklet B 两道高分题:
#   - Q33 (4 分): 短文写作 — 电邮 / 短信 / 便条 / 通知
#   - Q40 (4 分): 个人意见 — 同意/不同意 + 评价人物 + 举例说明
#
# 共 8 分。这两道题每年题目都换, 但格式和"套话"基本一样。
# 把这些"套话"背熟, 写作和意见题就稳了。
#
# Bilingual: Chinese phrases above, English translation below.
# Source: PSLE Chinese 2016-2025 model answers.

