commonMistakes: []

keyWords:
  - { word: "internal transfer", definition: "When stuff moves from one party to another within the problem (not out of the problem). TOTAL stays constant — add the BEFORE quantities and use that as your fixed total. Includes give-and-take problems." }
  - { word: "give-and-take doubling", definition: "When A gives $X to B, the GAP between them changes by $2X (one loses while the other gains). Add before-gap and after-gap, divide by 2 to find the transfer. Still Pattern A — TOTAL is unchanged." }
  - { word: "constant difference", definition: "When the SAME amount is added to or removed from both parts of a ratio, the difference between them stays the same. Match the old-difference to the new-difference in units to solve." }
  - { word: "anchor quantity", definition: "The thing in the problem that never changes. Find it first — it becomes your fixed reference for solving for everything else." }
  - { word: "equalise the ratios", definition: "When two parallel situations share an equal TOTAL but have different ratios (e.g. 1:5 and 1:2), scale them to a common part-total (LCM of denominators) BEFORE comparing or adding. Trying to add ratios directly without equalising gives wrong answers." }
  - { word: "weight-difference shortcut", definition: "When two parties have equal total COUNTS but different MIXES (e.g. coins of different denominations), the weight difference = (diff in count of one type) × (weight difference per item). No need to compute individual totals." }

