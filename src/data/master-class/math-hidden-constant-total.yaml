commonMistakes: []

keyWords:
  - { word: "internal transfer", definition: "When stuff moves from one person/box to ANOTHER person/box in the same problem (not out of the problem). Total stays constant — add the BEFORE quantities and use that as your fixed total." }
  - { word: "constant difference", definition: "When the SAME amount is added to or removed from both parts of a ratio, the difference between them stays the same. Solve by matching the difference in the new ratio to the difference in the old ratio." }
  - { word: "give-and-take swing", definition: "In transfers between two people, every $1 moved changes the GAP between them by $2 (one loses, the other gains). Add the before-gap and after-gap together, then divide by 2 to find the transfer." }
  - { word: "anchor quantity", definition: "The thing in the problem that never changes. Find it first — it becomes your fixed reference for solving for everything else." }
  - { word: "equal-total scaling", definition: "When two parallel situations share an equal total but have different ratios (e.g. Box 1 = 1:5, Box 2 = 1:2, same total), scale the ratios so their totals match before comparing or adding." }

subTopics:
  - id: internal-transfer
    label: Pattern A — Internal transfer
    description: "Stuff moves from one party to another within the problem. TOTAL is constant. Add before-quantities, then apply the after-ratio to that fixed total."
    slideIdx: 2
  - id: equal-removal
    label: Pattern B — Equal change to both
    description: "Same amount added/removed from both parts. DIFFERENCE is constant. Match the old-difference to the new-difference in units."
    slideIdx: 3
  - id: give-and-take
    label: Pattern C — Give-and-take swap
    description: "One person gives to another. The gap changes by 2 × transfer (one loses while the other gains). Add before-gap + after-gap, divide by 2."
    slideIdx: 4
  - id: one-constant
    label: Pattern D — One quantity unchanged
    description: "Only one of the two parts is affected. The other is your anchor. Solve for total-change from the part that did move."
    slideIdx: 6
  - id: equal-total-scaling
    label: Pattern E — Parallel cases, equal total
    description: "Two situations with equal totals but different ratios. Scale both ratios to a common total before comparing or adding."
    slideIdx: 6
