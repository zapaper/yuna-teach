# Master Class: PSLE Math — Hidden Constant Total Trap
# -----------------------------------------------------
# Problems where a TOTAL, DIFFERENCE, or one quantity is secretly
# unchanged through a transfer / give-away / equal removal. The trap:
# students treat the ratios as if everything is changing.
#
# Five patterns covered:
#   A. Internal transfer    → TOTAL is constant
#   B. Equal change to both → DIFFERENCE is constant
#   C. Give-and-take swap   → DIFFERENCE shifts by 2 per unit
#   D. One quantity unchanged → use the unchanged quantity as the anchor
#   E. Parallel cases tied by equal total → scale ratios to match
#
# Slide flow (10 slides):
#   0  Welcome              — what's a hidden constant
#   1  3-question check     — the routine for every "before/after" problem
#   2  Pattern A: Internal transfer (Sally & Ting worked example)
#   3  Pattern B: Equal removal     (Susan's beads worked example)
#   4  Pattern C: Give-and-take     (Ken & Lisa worked example)
#   5  Try it — A & B (2 MCQs)
#   6  Pattern D & E — two more variations (Liz stickers, Seng stars)
#   7  Top 5 traps
#   8  Try it — C & D (2 MCQs)
#   9  Start practising! (CTA)
#
# Filler words in {curly-braces} are SPOKEN in the TTS narration but
# hidden from the rendered slide — same convention as grammar-mcq-1.

slug: math-hidden-constant-total
subject: math
level: P5-P6
topicLabel: Hidden Constant Total
title: "PSLE Math — Hidden Constant Total Trap"

stats:
  headline: >-
    Many PSLE word problems hide an invariant: a TOTAL, a DIFFERENCE,
    or one quantity that secretly never changes. Spot the invariant
    and the problem becomes a 2-line ratio solve. Miss it and you
    end up chasing the wrong unknown.

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Hidden Constant Total"
    mascotImage: /master-class/patterns/panda-welcome.png
    body: >-
      Some word problems describe stamps being given away, money
      moving between people, or beads being removed from a box. Your
      brain wants to redo the ratios from scratch — but usually, ONE
      thing in the problem never changes. Find that invariant first.
    bullets:
      - |-
        **The 4 most common invariants {to look for}:**
        -- 🔵 **TOTAL stays the same** — {happens when }one person gives to another (internal transfer){.}
        -- 🟢 **DIFFERENCE stays the same** — {happens when }both quantities grow or shrink by the SAME amount{.}
        -- 🟠 **DIFFERENCE doubles per unit** — {happens in }give-and-take swaps {where one person's gain is the other's loss.}
        -- 🟣 **ONE quantity stays the same** — {happens when }the problem only acts on the OTHER quantity{.}
      - |-
        {Each pattern has its own clue word. So }On the next slide{ — } the **3-question check** that figures out WHICH invariant the problem is hiding.

  # ─── Slide 1: The 3-question check ──────────────────────────
  - title: "The 3-question check — every before/after problem"
    mascotImage: /master-class/patterns/panda-teaching-action.png
    body: >-
      Before you draw any model or write any ratio, run these 3
      questions on the problem. They take 15 seconds and they tell
      you which pattern (A, B, C, D, or E) you're facing.
    bullets:
      - |-
        {Question }**Q1 — Where does the stuff GO?**
        -- {If it goes from one person/box to }**another person/box in the SAME problem** → {it's an }**internal transfer** → **TOTAL is constant** (Pattern A){.}
        -- {If it goes }**out of the problem entirely** (eaten, thrown away, sold) → {the }**total drops** — {check Q2 next.}
      - |-
        {Question }**Q2 — How much was removed from EACH part?**
        -- {If }**the same amount** {was removed from both — }**DIFFERENCE is constant** (Pattern B){.}
        -- {If only ONE part lost or gained — the }**OTHER part is the constant** (Pattern D){.}
      - |-
        {Question }**Q3 — Is it a give-and-take SWAP?**
        -- {Watch for }"A gave $X to B" → {one loses what the other gains. The }**difference moves by 2 × $X** {per dollar transferred — } (Pattern C){.}
      - |-
        💡 {If the problem describes }TWO separate situations {with a phrase like }"the total number of X is the same in both"{ — that's }**Pattern E** {(scale the ratios so the totals match).}

  # ─── Slide 2: Pattern A — Internal transfer ──────────────────
  - title: "Pattern A — Internal transfer (TOTAL is constant)"
    mascotImage: /master-class/patterns/panda-teaching-differences.png
    body: >-
      Clue words: "gave some to", "transferred", "moved from … to".
      The stuff doesn't leave the problem — it just moves sides. So
      add the BEFORE quantities once and use that as your fixed total.
    bullets:
      - |-
        **📝 Worked example {from PSLE}:**
        Sally had **40 stamps**, Ting had **32 stamps**.
        {Then, }Sally gave some to Ting.
        {Afterwards, the ratio of Sally to Ting was }**1 : 2**.
        {How many stamps did Ting have in the end?}
      - |-
        **{Step 1 — Spot the invariant.}**
        Stamps went from Sally to Ting → internal transfer → **TOTAL is fixed**{.}
        Total = 40 + 32 = **72 stamps**{ — that number doesn't change.}
      - |-
        **{Step 2 — Use the after-ratio on the FIXED total.}**
        After: 1 : 2 → 3 units = 72 → **1 unit = 24**{.}
        Ting (2 units) = **48 stamps**{.}
      - |-
        ⚠️ **Common wrong move:** {students compute }1 unit from 40+32 = 72 using the BEFORE numbers but then {forget to apply the AFTER ratio. Or they }solve as if Sally's 40 = some new unit count{ — neither works once stamps have moved.}

  # ─── Slide 3: Pattern B — Equal removal ──────────────────────
  - title: "Pattern B — Equal change to both (DIFFERENCE is constant)"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      Clue words: "equal number", "the same number of … and …",
      "removed [X] of each". When BOTH parts change by the SAME
      amount, the GAP between them stays exactly the same. That gap
      is your anchor.
    bullets:
      - |-
        **📝 Worked example {from PSLE}:**
        Susan had blue and red beads in the ratio **7 : 13**{.}
        {Then, }She removed an **equal number** of blue and red beads.
        The new ratio became **1 : 3**{.}
        {How many beads were removed of each colour?}
      - |-
        **{Step 1 — Spot the invariant.}**
        Equal number removed → blue and red both lose the same amount → **DIFFERENCE is fixed**{.}
        Before difference = 13u − 7u = **6 units** {(call these "old units")}
      - |-
        **{Step 2 — Match the difference in the new ratio.}**
        After: 1 : 3 → difference = 3p − 1p = **2 parts** {(call these "new parts")}
        Old 6 units = New 2 parts → **1 new part = 3 old units**{.}
        So after = 3u (blue) : 9u (red){.}
      - |-
        **{Step 3 — Solve.}**
        Blue removed = 7u − 3u = **4 units**.
        {(You can find the actual number if the question gives you a total or a specific amount.)}
      - |-
        ⚠️ **Common wrong move:** {students assume the TOTAL is constant — but beads were REMOVED from the box, so the total dropped. The }difference{ is what survived equal removal, not the total.}

  # ─── Slide 4: Pattern C — Give-and-take swap ─────────────────
  - title: "Pattern C — Give-and-take (DIFFERENCE shifts by 2 × transfer)"
    mascotImage: /master-class/patterns/panda-teaching-subpatterns.png
    body: >-
      Clue words: "gave $X to", "passed [stuff] to". The catch:
      when A gives $1 to B, A loses $1 AND B gains $1 — so the GAP
      between them shrinks (or grows) by **$2**, not $1. This is
      the most-missed mental model in P6.
    bullets:
      - |-
        **📝 Worked example:**
        Ken had **$15 more** than Lisa at first{.}
        {After, }Ken gave some money to Lisa.
        {Now, }Ken had **$21 less** than Lisa{.}
        {How much money did Ken give to Lisa?}
      - |-
        **⚠️ The trap {answer}:** $21 − $15 = $6{. Wrong. Why? Because that ignores the doubling effect.}
      - |-
        **{Step 1 — Track the total swing in the gap.}**
        Before: Ken was **+$15** ahead of Lisa.
        After: Ken was **−$21** behind Lisa.
        Total swing = 15 + 21 = **$36** {(both directions add up because the gap crossed zero).}
      - |-
        **{Step 2 — Divide by 2 because each dollar moves the gap by $2.}**
        Transfer = $36 ÷ 2 = **$18**{. That's how much Ken gave.}
      - |-
        💡 **{Why divide by 2?}** When Ken gives $1, his pile drops by $1 AND Lisa's pile rises by $1 → the gap changes by $2 per $1 transferred.

  # ─── Slide 5: Try it — Patterns A & B ────────────────────────
  - title: "Try it — Internal transfer & Equal removal"
    mascotImage: /master-class/patterns/panda-thinking.png
    interactiveQuiz:
      - label: "Pattern A — Internal transfer"
        stem: |-
          Ahmad had 60 marbles and Bala had 20 marbles. Ahmad gave some
          marbles to Bala. After that, the ratio of Ahmad's marbles to
          Bala's marbles was 3 : 5. How many marbles did Ahmad give to Bala?
        options:
          - "10"
          - "20"
          - "30"
          - "40"
        correctAnswer: 3
        explanation: >-
          Internal transfer → TOTAL is constant = 60 + 20 = 80.
          After: 3 : 5 → 8 units = 80 → 1 unit = 10. Ahmad now has
          3u = 30. He started with 60, so he gave 60 − 30 = 30 marbles.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png
      - label: "Pattern B — Equal removal"
        stem: |-
          A box had green and yellow buttons in the ratio 4 : 9. An equal
          number of green and yellow buttons were taken out. The new
          ratio became 1 : 3. If 15 green buttons were taken out, how
          many yellow buttons were left in the box?
        options:
          - "30"
          - "45"
          - "60"
          - "75"
        correctAnswer: 4
        explanation: >-
          Equal removal → DIFFERENCE is fixed.
          Before: 4u : 9u → difference = 5u.
          After: 1p : 3p → difference = 2p.
          So 5u = 2p, meaning 1p = 2.5u.
          Green left = 1p = 2.5u, so green removed = 4u − 2.5u = 1.5u = 15
          → 1u = 10. Yellow left = 3p = 7.5u = 75 buttons.
          (Check: start 40 : 90, remove 15 each → 25 : 75 = 1 : 3 ✓)
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png

  # ─── Slide 6: Patterns D & E ─────────────────────────────────
  - title: "Pattern D & E — two more variations to spot"
    mascotImage: /master-class/patterns/panda-teaching-nth-term.png
    body: >-
      Two less-common but still high-yield patterns. Once you can
      name them, they stop being scary.
    bullets:
      - |-
        🟣 **Pattern D — ONE quantity stays the same:**
        Clue: the problem only acts on ONE of the two parts.
        {For example: }"Liz had equal red and blue stickers. She gave away 2/3 of her RED stickers and some blue."
        {Here, the original red count is GONE — but if a different problem says only red changed, then }Blue { stays as your anchor. Treat it as a constant and the rest is one variable.}
      - |-
        🟠 **Pattern E — Two boxes, equal totals:**
        Clue: "the total number of X in Box 1 = total in Box 2".
        {For example: }Box 1 has gold : silver = **1 : 5**. Box 2 has **1 : 2**. {Totals are equal, so }scale the ratios so totals match{ — Box 1 has 6 parts, Box 2 has 3 parts → multiply Box 2 by 2 → both totals are 6 parts.}
      - |-
        💡 {The trick for Pattern E is }never compare ratios directly when they have different totals. {Always scale them to a }common total{ first — then comparisons are real.}

  # ─── Slide 7: Top 5 traps ────────────────────────────────────
  - title: "Top 5 traps to avoid"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      These are the most-missed mistakes in problems involving
      transfers, removals, and equalisation. Read them once before
      attempting your practice — they save 2–3 marks per paper.
    bullets:
      - |-
        ⚠️ **{Trap }1 — Treating an internal transfer like an external loss.**
        {If person A gave to person B, the stuff did NOT leave the problem. }Total stays constant{. Don't subtract.}
      - |-
        ⚠️ **{Trap }2 — Forgetting that "equal removal" preserves the DIFFERENCE, not the total.**
        {If the same number was taken from both parts, the }gap{ between them is fixed — not the total.}
      - |-
        ⚠️ **{Trap }3 — In give-and-take, dividing the swing by 1 instead of 2.**
        {Each $1 transferred moves the gap by $2 because one side loses while the other gains. Always divide the swing by 2.}
      - |-
        ⚠️ **{Trap }4 — Comparing two ratios without scaling them first.**
        {1 : 5 and 1 : 2 cannot be added or compared until you make their }totals match{ (Pattern E).}
      - |-
        ⚠️ **{Trap }5 — Using the BEFORE ratio with AFTER quantities (or vice versa).**
        {Mark your model clearly: }before-units and after-units are different sizes{. Don't mix them.}

  # ─── Slide 8: Try it — Patterns C & D ────────────────────────
  - title: "Try it — Give-and-take & One quantity constant"
    mascotImage: /master-class/patterns/panda-thinking.png
    interactiveQuiz:
      - label: "Pattern C — Give-and-take"
        stem: |-
          Ravi had $40 more than Siti at first. Ravi gave some of his
          money to Siti. After that, Siti had $20 more than Ravi.
          How much money did Ravi give to Siti?
        options:
          - "$20"
          - "$30"
          - "$40"
          - "$60"
        correctAnswer: 2
        explanation: >-
          Total swing in the gap = 40 + 20 = $60 (Ravi went from +40
          to −20). Each $1 transferred swings the gap by $2, so
          transfer = $60 ÷ 2 = $30.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png
      - label: "Pattern D — One quantity unchanged"
        stem: |-
          Mei Ling has 90 books in total — some are story books and
          the rest are reference books. She gave away 2/3 of her story
          books. She did not give away any reference books. After that,
          she had 50 books left. How many reference books does she have?
        options:
          - "10"
          - "20"
          - "30"
          - "40"
        correctAnswer: 3
        explanation: >-
          Reference books are the CONSTANT — they never changed.
          Books gone = 90 − 50 = 40, all story books. Those 40 are
          2/3 of her story books → story books = 60. Reference =
          90 − 60 = 30.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png

