# Master Class: PSLE Math — Hidden Constant Total Trap
# -----------------------------------------------------
# Problems where a TOTAL, DIFFERENCE, or one quantity is secretly
# unchanged through a transfer / give-away / equal removal — OR where
# two parties share the same TOTAL with different compositions.
#
# Five patterns covered:
#   A. Internal transfer        → TOTAL is constant
#                                  (includes give-and-take "difference shifts by 2 × transfer")
#   B. Equal change to both     → DIFFERENCE is constant
#   C. One quantity unchanged   → use the unchanged quantity as the anchor
#   D. Parallel cases, equal total → equalise the ratio totals before combining
#   E. Equal total, different mix  → diff in count × weight difference (Helen & Ivan coins)
#
# Slide flow (11 slides):
#   0  Welcome                    — what's a hidden constant
#   1  3-question check            — routine for every problem
#   2  Pattern A: Internal transfer (Sally & Ting + Ken & Lisa)
#   3  Pattern B: Equal removal     (Susan's beads)
#   4  Try it — A & B (2 MCQs)
#   5  Pattern C: One quantity unchanged (Mei Ling)
#   6  Pattern D: Equal total, equalise ratios
#   7  Pattern E: Equal total, weight difference (Helen & Ivan coins)
#   8  Top 5 traps
#   9  Try it — C / D / E (3 MCQs)
#  10  Start practising! (CTA)
#
# Filler words in {curly-braces} are SPOKEN in the TTS narration but
# hidden from the rendered slide — same convention as grammar-mcq-1.

slug: math-hidden-constant-total
subject: math
level: P5-P6
topicLabel: Hidden Constant Total
title: "PSLE Math — Hidden Constant Total Trap"

stats:
  headline: >-
    Many PSLE word problems hide an invariant: a TOTAL, a DIFFERENCE,
    or one quantity that secretly never changes — or two parties whose
    totals are secretly equal. Spot the invariant and the problem
    becomes a 2-line ratio solve. Miss it and you chase the wrong unknown.

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Hidden Constant Total"
    mascotImage: /master-class/patterns/panda-welcome.png
    body: >-
      Some word problems describe stamps being given away, money
      moving between people, or beads being removed from a box. Your
      brain wants to redo the ratios from scratch — but usually, ONE
      thing in the problem never changes. Find that invariant first.
    bullets:
      - |-
        **The 5 patterns {to watch for}:**
        -- 🔵 **Pattern A — TOTAL stays the same** — {happens when }one person gives to another (internal transfer){.}
        -- 🟢 **Pattern B — DIFFERENCE stays the same** — {happens when }both quantities grow or shrink by the SAME amount{.}
        -- 🟣 **Pattern C — ONE quantity stays the same** — {happens when }the problem only acts on the OTHER quantity{.}
        -- 🟠 **Pattern D — TWO situations share an EQUAL TOTAL** — {with }different ratios → equalise the totals first{.}
        -- 🔴 **Pattern E — EQUAL TOTAL but different MIX** — {classic coins / weights problem: }diff in one item × weight difference{.}
      - |-
        💡 **{Big insight:}** {"give-and-take" problems (e.g. "A gave $X to B, now A has $Y less than B") are just }Pattern A in disguise{ — the TOTAL is still constant. The "difference shifts by 2 × transfer" is the SAME unlock, framed differently.}
      - |-
        {On the next slide — } the **3-question check** {that figures out WHICH pattern the problem is hiding.}

  # ─── Slide 1: The 3-question check ──────────────────────────
  - title: "The 3-question check — every before/after problem"
    mascotImage: /master-class/patterns/panda-teaching-action.png
    body: >-
      Before you draw any model or write any ratio, run these 3
      questions on the problem. They take 15 seconds and they tell
      you which pattern (A, B, C, D, or E) you're facing.
    bullets:
      - |-
        {Question }**Q1 — Where does the stuff GO?**
        -- {If it moves from }one person/box to ANOTHER person/box {in the SAME problem → it's an }**internal transfer** → **TOTAL is constant** (Pattern A){. This includes give-and-take like "A gave $X to B."}
        -- {If it leaves the problem entirely (eaten, sold, removed) → }total drops{ — check Q2.}
      - |-
        {Question }**Q2 — How much was removed from EACH part?**
        -- {If }the SAME amount {was removed from both → }**DIFFERENCE is constant** (Pattern B){.}
        -- {If only ONE part lost or gained → }**THE OTHER is the constant** (Pattern C){.}
      - |-
        {Question }**Q3 — Are there TWO situations with equal totals?**
        -- {If two boxes / two people share }the same TOTAL{ but }different ratios{ → }**Pattern D** {— equalise the totals.}
        -- {If they share the same total count but }different mix {of items (coins, weights) → }**Pattern E** {— diff × weight-difference.}
      - |-
        💡 {Most PSLE problems fit }one and only one{ of A-E. Identify it first, write your equation second.}

  # ─── Slide 2: Pattern A — Internal transfer ──────────────────
  - title: "Pattern A — Internal transfer (TOTAL is constant)"
    mascotImage: /master-class/patterns/panda-teaching-differences.png
    body: >-
      The headline pattern. Clue words: "gave some to", "transferred",
      "moved from … to", "passed". The stuff doesn't leave the problem
      — it just moves sides. Add the BEFORE quantities once and use
      that as your fixed total. Includes give-and-take problems!
    bullets:
      - |-
        **📝 Worked example 1 {— after-ratio version}:**
        Sally had **40 stamps**, Ting had **32 stamps**.
        {Then, }Sally gave some to Ting.
        {Afterwards, the ratio of Sally to Ting was }**1 : 2**.
        {How many stamps did Ting have in the end?}
      - |-
        Total = 40 + 32 = **72 stamps** {— fixed by internal transfer.}
        After ratio: 1 : 2 → 3 units = 72 → 1 unit = **24**.
        Ting = 2 units = **48 stamps**{.}
      - |-
        **📝 Worked example 2 {— give-and-take version, SAME pattern}:**
        Ken had **$15 more** than Lisa{.}
        {Then, }Ken gave some money to Lisa.
        {Now, }Ken had **$21 less** than Lisa{.}
        {How much did Ken give?}
      - |-
        **{The give-and-take shortcut:}** {each $1 transferred shifts the gap by $2 (Ken loses $1, Lisa gains $1).}
        Total swing in gap = 15 + 21 = **$36** {(crossed zero from +15 to −21).}
        Transfer = 36 ÷ 2 = **$18**{.}
      - |-
        ⚠️ **{Common wrong moves:}** {(1) Treating the transfer as an external loss and shrinking the total — DON'T. (2) Computing $21 − $15 = $6 and stopping — IGNORES the doubling. Both errors miss that the TOTAL pile is conserved.}

  # ─── Slide 3: Pattern B — Equal removal ──────────────────────
  - title: "Pattern B — Equal change to both (DIFFERENCE is constant)"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      Clue words: "equal number", "the same number of … and …",
      "removed [X] of each". When BOTH parts change by the SAME
      amount, the GAP between them stays exactly the same. That gap
      is your anchor.
    bullets:
      - |-
        **📝 Worked example:**
        Susan had blue and red beads in the ratio **7 : 13**{.}
        {Then, }She removed an **equal number** of blue and red beads.
        The new ratio became **1 : 3**{.}
        If she removed **20 blue beads**, how many beads of each colour were there at first?
      - |-
        **{Step 1 — Spot the invariant.}**
        Equal removed → DIFFERENCE is fixed.
        Before difference = 13u − 7u = **6 units** {(old units).}
      - |-
        **{Step 2 — Match the difference in the new ratio.}**
        After: 1 : 3 → difference = 2 parts.
        6 old units = 2 new parts → **1 new part = 3 old units**.
        After ratio in old units: 3u (blue) : 9u (red){.}
      - |-
        **{Step 3 — Solve.}**
        Blue removed = 7u − 3u = **4 units** = 20 → **1 unit = 5**{.}
        Original blue = 7u = **35 beads**. Original red = 13u = **65 beads**{.}
        {(Check: 35 : 65 → remove 20 each → 15 : 45 = 1 : 3 ✓)}
      - |-
        ⚠️ **{Common wrong move:}** {students assume the TOTAL is constant — but beads were REMOVED, so total dropped. The }difference{ is what survived equal removal, not the total.}

  # ─── Slide 4: Try it — Patterns A & B ────────────────────────
  - title: "Try it — Internal transfer & Equal removal"
    mascotImage: /master-class/patterns/panda-thinking.png
    interactiveQuiz:
      - label: "Pattern A — Internal transfer"
        stem: |-
          Ahmad had 60 marbles and Bala had 20 marbles. Ahmad gave some
          marbles to Bala. After that, the ratio of Ahmad's marbles to
          Bala's marbles was 3 : 5. How many marbles did Ahmad give to Bala?
        options:
          - "10"
          - "20"
          - "30"
          - "40"
        correctAnswer: 3
        explanation: >-
          Internal transfer → TOTAL is constant = 60 + 20 = 80.
          After: 3 : 5 → 8 units = 80 → 1 unit = 10. Ahmad now has
          3u = 30. He started with 60, so he gave 60 − 30 = 30 marbles.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png
      - label: "Pattern B — Equal removal"
        stem: |-
          A box had green and yellow buttons in the ratio 4 : 9. An equal
          number of green and yellow buttons were taken out. The new
          ratio became 1 : 3. If 15 green buttons were taken out, how
          many yellow buttons were left in the box?
        options:
          - "30"
          - "45"
          - "60"
          - "75"
        correctAnswer: 4
        explanation: >-
          Equal removal → DIFFERENCE is fixed.
          Before: 4u : 9u → difference = 5u.
          After: 1p : 3p → difference = 2p.
          So 5u = 2p, meaning 1p = 2.5u.
          Green left = 1p = 2.5u, so green removed = 4u − 2.5u = 1.5u = 15
          → 1u = 10. Yellow left = 3p = 7.5u = 75 buttons.
          (Check: start 40 : 90, remove 15 each → 25 : 75 = 1 : 3 ✓)
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png

  # ─── Slide 5: Pattern C — One quantity unchanged ─────────────
  - title: "Pattern C — One quantity unchanged"
    mascotImage: /master-class/patterns/panda-teaching-subpatterns.png
    body: >-
      Clue: the problem only acts on ONE of the two parts. The OTHER
      part is your anchor — it never changes, so treat it as a constant.
    bullets:
      - |-
        **📝 Worked example:**
        Mei Ling has **90 books** in total — some story, the rest reference.
        She gave away **2/3 of her story books**.
        She did NOT give away any reference books.
        After that, she had **50 books left**{.}
        {How many reference books does she have?}
      - |-
        **{Step 1 — Spot the constant.}**
        Reference books = unchanged anchor.
        Books gone = 90 − 50 = **40, all story books**{.}
      - |-
        **{Step 2 — Reverse-engineer the missing original.}**
        40 story books = 2/3 of her story books → story books = **60**{.}
        Reference = 90 − 60 = **30 books**{.}
      - |-
        💡 **{The unlock:}** {because one part never moved, you only have ONE variable to solve — even though the problem mentions two quantities. Always identify the constant first, then the moving part is straightforward.}

  # ─── Slide 6: Pattern D — Equal total, equalise ratios ───────
  - title: "Pattern D — Equal total, different ratios (equalise!)"
    mascotImage: /master-class/patterns/panda-teaching-nth-term.png
    body: >-
      Clue: "the total in Box 1 equals the total in Box 2" or "both
      contain the same number of …". The two ratios have DIFFERENT
      part-totals (e.g. 1:5 = 6 parts, 1:2 = 3 parts), so you must
      SCALE one of them so their part-totals match.
    bullets:
      - |-
        **📝 Worked example:**
        Box A: red : blue beads = **1 : 5**{.}
        Box B: red : blue beads = **1 : 2**{.}
        Both boxes hold the **same total** number of beads.
        There are **30 red beads** in total across both boxes.
        {Find the total number of BLUE beads across both boxes.}
      - |-
        **{Step 1 — Find the part-totals.}**
        Box A → 1 + 5 = **6 parts**{.}
        Box B → 1 + 2 = **3 parts**{.}
        {These don't match — but the real totals do. So 6 parts in A = 3 parts in B by count. Scale.}
      - |-
        **{Step 2 — Equalise totals using LCM.}**
        LCM(6, 3) = 6. Box A is already 6 parts. Scale Box B by ×2 → **2 : 4** (now 6 parts){.}
      - |-
        **{Step 3 — Now per box (standard 6 parts):}**
        Box A: 1 red, 5 blue. Box B: 2 red, 4 blue.
        Combined: red = 1 + 2 = **3**, blue = 5 + 4 = **9**, total = 12 parts{.}
      - |-
        **{Step 4 — Use the given.}**
        3 parts red = 30 → 1 part = **10** → 9 parts blue = **90 blue beads**{.}
      - |-
        ⚠️ **{Common wrong move:}** {students add the ratios directly: 1+1 = 2 red, 5+2 = 7 blue, total 9 — wrong, because the two ratios have different part-sizes. Always equalise the totals first.}

  # ─── Slide 7: Pattern E — Equal total, weight difference ─────
  - title: "Pattern E — Equal total, different mix (weight trick)"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      Clue: "X and Y have the SAME number of coins (or marbles, etc.)
      but a DIFFERENT mix — one has more 50¢ coins, the other has more
      20¢ coins". Because totals are equal, the count of "extra heavy
      coins" on one side equals the "missing heavy coins" on the other.
      Shortcut: difference in count × weight-difference per coin.
    bullets:
      - |-
        **📝 Worked example {PSLE-style, Helen & Ivan coins}:**
        Helen and Ivan each have the **same total number of coins**.
        Helen has **8 more 50¢ coins** than Ivan.
        Each 50¢ coin weighs **3 g** more than each 20¢ coin.
        {Find the difference in total weight of their coins.}
      - |-
        **{Step 1 — Spot the swap.}**
        Same total count, but Helen has 8 EXTRA 50¢ coins.
        Because total counts match → Helen must have **8 FEWER 20¢ coins** than Ivan{ (the other denomination makes up the gap).}
      - |-
        **{Step 2 — Think of it as 8 "coin swaps".}**
        Each swap = Helen gets one MORE 50¢ coin instead of a 20¢ coin.
        Per swap weight gain = 3 g {(the weight difference per coin).}
      - |-
        **{Step 3 — Multiply.}**
        Weight difference = 8 × 3 = **24 g** {(Helen is heavier by 24 g).}
      - |-
        💡 **{Why this works:}** {because totals are equal, the only thing that matters is the DIFFERENCE in counts of one denomination. Multiply that difference by the per-coin weight difference. No need to find individual totals.}

  # ─── Slide 8: Top 5 traps ────────────────────────────────────
  - title: "Top 5 traps to avoid"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      The most-missed mistakes across hidden-constant problems. Read
      these once before practice — they save 2-3 marks per paper.
    bullets:
      - |-
        ⚠️ **{Trap }1 — Treating an internal transfer like an external loss.**
        {If person A gave to person B, the stuff did NOT leave the problem. }Total stays constant{. Don't subtract from the total.}
      - |-
        ⚠️ **{Trap }2 — Forgetting that "equal removal" preserves the DIFFERENCE, not the total.**
        {If the same number was taken from both parts, the }gap{ between them is fixed, not the total.}
      - |-
        ⚠️ **{Trap }3 — In give-and-take, dividing the swing by 1 instead of 2.**
        {Each $1 transferred moves the gap by $2 because one side loses while the other gains. Always divide the swing by 2.}
      - |-
        ⚠️ **{Trap }4 — Comparing two ratios without equalising their totals.**
        {1 : 5 and 1 : 2 cannot be added or compared until you scale them to the same part-total (Pattern D).}
      - |-
        ⚠️ **{Trap }5 — In weight-difference problems, computing individual totals when you don't need to.**
        {If totals are equal, the answer is just }diff in count × weight-diff per item{ — skip the full breakdown.}

  # ─── Slide 9: Try it — Patterns C, D, E ──────────────────────
  - title: "Try it — One constant, Equalise, Weight difference"
    mascotImage: /master-class/patterns/panda-thinking.png
    interactiveQuiz:
      - label: "Pattern C — One quantity unchanged"
        stem: |-
          Mei Ling has 90 books in total — some are story books and
          the rest are reference books. She gave away 2/3 of her story
          books. She did not give away any reference books. After that,
          she had 50 books left. How many reference books does she have?
        options:
          - "10"
          - "20"
          - "30"
          - "40"
        correctAnswer: 3
        explanation: >-
          Reference books are the CONSTANT — they never changed.
          Books gone = 90 − 50 = 40, all story books. Those 40 are
          2/3 of her story books → story books = 60. Reference =
          90 − 60 = 30.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png
      - label: "Pattern D — Equalise ratios"
        stem: |-
          Container P has red and green marbles in the ratio 1 : 3.
          Container Q has red and green marbles in the ratio 1 : 1.
          Both containers hold the same TOTAL number of marbles. If
          there are 6 red marbles in total across both containers, how
          many GREEN marbles are there in total?
        options:
          - "10"
          - "12"
          - "14"
          - "18"
        correctAnswer: 1
        explanation: >-
          P = 1+3 = 4 parts. Q = 1+1 = 2 parts. LCM = 4. Scale Q by ×2 → 2 : 2 (now 4 parts).
          Per standardised box: P has 1 red + 3 green; Q has 2 red + 2 green.
          Combined: red = 1+2 = 3 parts, green = 3+2 = 5 parts.
          3 parts red = 6 → 1 part = 2 → 5 parts green = 10.
          (Check: each container = 4 parts = 8 marbles. P = 2 red + 6 green; Q = 4 red + 4 green. Total red = 6 ✓, total green = 10 ✓.)
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png
      - label: "Pattern E — Weight difference"
        stem: |-
          Alvin and Brenda each have the same number of coins. Alvin
          has 12 more $1 coins than Brenda. Each $1 coin weighs 4 g
          more than each 50¢ coin. By how many grams is Alvin's pile
          heavier than Brenda's?
        options:
          - "12 g"
          - "16 g"
          - "48 g"
          - "60 g"
        correctAnswer: 3
        explanation: >-
          Same total count → Alvin's 12 extra $1 coins mean he has
          12 fewer 50¢ coins. That's 12 "coin swaps", each gaining 4 g.
          Weight difference = 12 × 4 = 48 g.
        mascotCorrect: /master-class/patterns/panda-correct.png
        mascotWrong: /master-class/patterns/panda-wrong.png

