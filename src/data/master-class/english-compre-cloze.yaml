# Master Class: PSLE English — Compre Cloze
# --------------------------------------------------------------
# Meta-skill: using sentence-level context clues to pick the
# correct word. Covers Vocabulary MCQ (4-option), Vocabulary
# Cloze MCQ (4-option), and Comprehension Cloze (write-the-word).
#
# Slide flow (10 slides total):
#   0  Welcome              — why context-reading bags 35-44% of marks
#   1  The 4-step method    — read whole sentence, highlight clue, predict, eliminate
#   2  Clue Type A          — Contrast words (but / however / although)
#   3  Clue Type B          — Cause / effect words (because / so / therefore)
#   4  Clue Type C          — Time + sequence words (finally / suddenly / gradually)
#   5  Try it — 2 MCQs      — Contrast / Cause / Time
#   6  Clue Type D          — Collocations (fixed word partners)
#   7  Trap patterns        — 3 common traps to dodge
#   8  Try it — 2 MCQs      — Collocations + trap detection
#   9  Start practising! (CTA → 15-Q mastery quiz)
#
# Bullets use {curly-brace filler words} that get spoken in the TTS
# narration but hidden from the rendered slide.

