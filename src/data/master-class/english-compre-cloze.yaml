    slideIdx: 2
  - id: cause-effect-clues
    label: Cause / effect clues (because / so / therefore)
    description: "Words that signal one idea caused the other. The blank is either the REASON or the OUTCOME — figure out which side of the cause-effect arrow it sits on first."
    slideIdx: 3
  - id: time-sequence-clues
    label: Time + sequence clues (finally / suddenly / gradually)
    description: "Words that pin down WHICH moment in the story the blank refers to. Tells you whether the verb should be quick (suddenly), slow (gradually), or end-of-sequence (finally)."
    slideIdx: 4
  - id: collocations
    label: Collocations (fixed word partners)
    description: "Words that always travel together — heavy rain, take advantage of, deep regret, give off. Can't be reasoned from grammar; must be memorised from reading. When all 4 options are synonyms, this is the clue type being tested."
