commonMistakes: []

keyWords:
  - { word: "context clue", definition: "A word in the sentence (or a neighbouring sentence) that gives away the answer. The 4 types are contrast (but/however/although), cause/effect (because/so/therefore), time/sequence (finally/suddenly/gradually), and collocation (fixed word partners like 'heavy rain')." }
  - { word: "contrast clue", definition: "Words that signal the answer is the OPPOSITE of what came before: but, however, although, while, yet, instead, despite. When you spot one next to a blank, flip the meaning of the earlier idea to predict the answer." }
  - { word: "cause and effect clue", definition: "Words that signal one idea CAUSED the other: because, since, as, due to, so, therefore, hence, as a result. The blank is either the REASON (cause) or the OUTCOME (effect) depending on which side of the trigger word it sits." }
  - { word: "time and sequence clue", definition: "Words that pin down WHICH MOMENT in the story the blank refers to: finally, eventually, suddenly, gradually, after, before, while. Tells you whether to pick a quick verb or a slow one, a starting action or a finishing action." }
  - { word: "collocation", definition: "Words that always travel together — 'heavy rain' (not 'strong rain'), 'take part' (not 'make part'), 'deep regret', 'bright sunshine'. Can't be reasoned from grammar; you have to know them from reading. PSLE tests these to separate wide readers from kids who don't read." }
  - { word: "4-step method", definition: "The routine for every context-clue question: (1) read the WHOLE sentence first, (2) highlight the clue word, (3) PREDICT the answer before looking at the options, (4) eliminate the traps. Step 3 is the most important — once you commit to a meaning, the wrong options can't trick you." }
  - { word: "grammar-fits trap", definition: "An option that slots in cleanly so the sentence sounds OK, but doesn't match the clue word's direction. Example: 'tired' after 'but ... tough' fits the grammar but ignores the contrast clue. Always ask: does my answer respect the clue word?" }
  - { word: "wrong-collocation trap", definition: "An option that means the right thing but breaks the locked-in word partner. Example: 'strong rain' means heavy rain, but English says 'heavy rain'. When all four options are synonyms, you're being tested on collocation — pick the one you've SEEN written before." }
  - { word: "paragraph contradiction trap", definition: "An option that works fine in the blank's sentence alone, but contradicts something said earlier in the passage. Dodge it by always reading the sentence BEFORE and AFTER the blank, not just the one with the blank in it." }

