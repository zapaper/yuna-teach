    bullets:
      - |-
        {You'll tackle a }**mix of 10 questions** {across all four patterns —} painted-cube counting, surface stacks, nets, {and }cut-volume{.}
      - |-
        {Any }Wrong answers {are }auto-saved {and }reviewed in 1 week{.}
      - |-
        {The }AI marks {your working step-by-step — } partial credit {if you used the right formula but slipped on arithmetic.}
