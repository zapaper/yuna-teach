    mascotImage: /master-class/patterns/panda-cta.png
    body: >-
      Mixed practice drawn from real PSLE-style cube problems —
      painted-cube counting, surface area of stacks, cube nets, and
      cut-cube volume. Trains the reflex of locating each small cube
