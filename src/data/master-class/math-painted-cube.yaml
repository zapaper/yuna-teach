commonMistakes: []

keyWords:
  - { word: "cube location rule", definition: "Where a small cube sits inside a painted big cube tells you how many faces are painted. Corner → 3 faces. Edge (not corner) → 2 faces. Face (not edge) → 1 face. Centre (interior) → 0 faces." }
  - { word: "n−2 trick", definition: "Subtract 2 from each dimension when counting interior cubes — one cube of outer layer comes off each of 6 sides. Centre cubes = (n−2)³ for a cube, (a−2)(b−2)(c−2) for a cuboid." }
  - { word: "6-views method", definition: "For an irregular cube stack, count the unit squares visible from each of the 6 views (top, bottom, front, back, left, right). Sum = total surface area. Captures every outward face exactly once." }
  - { word: "cube net rule", definition: "A valid cube net has exactly 6 squares with NO 2×2 block (4 squares sharing one corner). 11 valid hexominos exist. The 1-4-1, 2-3-1, and 3-3 staircase families cover most cases." }
  - { word: "glue-hides-2-faces", definition: "When two unit cubes are glued together, 2 faces become hidden (one from each cube). For irregular stacks, total visible = (cubes × 6) − (2 × glue contacts). The 6-views method is usually faster though." }

