# Master Class: PSLE English — Synthesis & Transformation Tricks
# --------------------------------------------------------------
# Short deck. 4 patterns: Concession, Cause, Condition, Reported
# Speech. Word-transformation was dropped — the others give better
# return per slide. Headline trap for D is the past-past backshift
# (had + past participle).

slug: english-synthesis-tricks
subject: english
level: P5-P6
# Extraction writes "Synthesis / Transformation" (slash). The MC name
# uses ampersand in the title for readability but the picker matches
# against the slash form to align with the bank.
topicLabel: Synthesis / Transformation
# Existing sub-topics (concession / cause / condition / reported-speech)
# are about pattern types, not buckets the picker needs to gate on —
# every PSLE synthesis question fits the deck's 4-pattern teaching.
noSubTopicFilter: true
paperLevels: [P5, P6, PSLE]
title: "PSLE English — Synthesis & Transformation Tricks (10 marks)"

stats:
  headline: >-
    Synthesis = 10 marks. PSLE rotates the same 4 grammar patterns
    every year. Learn the keyword-to-pattern map and the most common
    traps — full marks become straightforward.

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Synthesis & Transformation (10 marks)"
    mascotImage: /master-class/grammar-mcq-1/panda-welcome.png
    body: >-
      Synthesis asks you to REWRITE a sentence using a given keyword,
      keeping the meaning. 4 patterns cover the bulk of past PSLE
      questions. The hardest part isn't grammar — it's not changing
      meaning, tense, or adding info.
    bullets:
      - |-
        {Pattern }**A: Concession** — Although / Despite / In spite of{.}
      - |-
        {Pattern }**B: Cause** — Because / Due to / Owing to / Since{.}
      - |-
        {Pattern }**C: Condition** — If / Unless / Provided that{.}
      - |-
        {Pattern }**D: Reported Speech** — direct ↔ indirect, with backshift{.}
      - |-
        **The 3 rules of synthesis:**
        ① Don't change the meaning. ② Don't change the tense. ③ Don't add info.

  # ─── Slide 1: Pattern A — Concession ─────────────────────────
  - title: "Pattern A — Concession (Although / Despite)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Two contrasting ideas. The PSLE trap: students mix up the
      grammar after Although vs Despite.
    bullets:
      - |-
        **Although + CLAUSE** (subject + verb)
        ✓ Although **he was tired**, he kept working.
      - |-
        **Despite / In spite of + NOUN PHRASE**
        ✓ Despite **his tiredness**, he kept working.
        ✗ Despite **he was tired**, he kept working.
      - |-
        **Conversion** (Although → Despite): verb → noun/-ing, drop the subject.
        "Although it was raining" → "Despite the rain."

  # ─── Slide 2: Pattern B — Cause ──────────────────────────────
  - title: "Pattern B — Cause (Because / Due to)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Same clause-vs-noun split as Concession. PSLE drills both
      because they share the conversion trick.
    bullets:
      - |-
        **Because / Since / As + CLAUSE**
        ✓ Because **the bus broke down**, we were late.
      - |-
        **Due to / Owing to + NOUN PHRASE**
        ✓ Due to **the bus breakdown**, we were late.
        ✗ Due to **the bus broke down**, we were late.
      - |-
        **Conversion** (Because → Due to): same trick — verb → noun, drop subject.
        "Because she was sick" → "Due to her illness."

  # ─── Slide 3: Try it — Concession & Cause ────────────────────
  - title: "Try it — Concession & Cause"
    mascotImage: /master-class/grammar-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "Concession — Although → Despite"
        stem: |-
          Original: Although the weather was bad, the football match continued.
          Rewrite using "Despite". Which is correct?
        options:
          - Despite the weather was bad, the football match continued.
          - Despite the bad weather, the football match continued.
          - Despite the football match, the weather was bad.
          - Despite of the bad weather, the football match continued.
        correctAnswer: 2
        explanation: >-
          Despite takes a NOUN PHRASE. "The weather was bad" (clause)
          becomes "the bad weather". Note: "Despite of" is always
          wrong — just "Despite".
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png
      - label: "Cause — Because → Due to"
        stem: |-
          Original: Because the road was flooded, the bus could not pass.
          Rewrite using "Due to". Which is correct?
        options:
          - Due to the road was flooded, the bus could not pass.
          - Due to the flooded road, the bus could not pass.
          - Due to that the road was flooded, the bus could not pass.
          - Due to flooding the road, the bus could not pass.
        correctAnswer: 2
        explanation: >-
          Due to + noun phrase. "The road was flooded" → "the flooded
          road". Option 4 changes the meaning ("flooding the road"
          implies someone is doing the flooding).
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png

  # ─── Slide 4: Pattern C — Condition ──────────────────────────
  - title: "Pattern C — Condition (If / Unless)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Unless = "if not". When converting If → Unless, you must
      NEGATE the if-clause. Double negatives = the #1 trap.
    bullets:
      - |-
        **If + present, will + verb**
        ✓ If you hurry, you will catch the bus.
      - |-
        **Unless = If…not** — flip the negation!
        ✓ Unless you hurry, you will miss the bus.   (= If you don't hurry…)
        ✗ Unless you don't hurry, you will catch the bus.   (double negative)
      - |-
        **Conversion** (If → Unless): drop "not" if there is one, add "not" if there isn't.
        "If you don't study, you will fail" → "Unless you study, you will fail."

  # ─── Slide 5: Pattern D — Reported Speech ────────────────────
  - title: "Pattern D — Reported Speech (Direct ↔ Indirect)"
    mascotImage: /master-class/grammar-mcq-1/panda-teaching-tag.png
    body: >-
      Convert direct speech (with quotes) to indirect (no quotes).
      Headline rule: BACKSHIFT — when the reporting verb is past
      (said / told / asked), every tense moves one step further back.
      The biggest trap: past → **past perfect (had + past participle)**.
    bullets:
      - |-
        **Tense backshift table** (when reporting verb is past)
        -- present (am/is/are) → past (was/were)
        -- present continuous (am eating) → past continuous (was eating)
        -- **past (broke / went) → past perfect (had broken / had gone)**  ⚠️ the past-past trap
        -- present perfect (has done) → past perfect (had done)
        -- will → would   ·   can → could   ·   may → might
      - |-
        **⚠️ The past-past trap** (most-missed)
        Direct: "I **broke** the window," John said.
        ✗ John said that he **broke** the window.
        ✓ John said that he **had broken** the window.
        Past + past = ambiguous time order. Use past perfect for the earlier event.
      - |-
        **Pronoun & time/place shifts**
        -- I → he/she   ·   you → I/me   ·   we → they   ·   my → his/her
        -- today → that day   ·   **yesterday → the day before**
        -- tomorrow → the next day   ·   now → then
        -- here → there   ·   this → that   ·   these → those
      - |-
        **Questions** — use `asked if / whether`; drop "do/did"; statement order; no question mark.
        -- "Where do you live?" he asked. → He asked where I **lived**.
        -- "Are you coming?" she asked. → She asked **if** I **was** coming.
      - |-
        **Commands** — use `told [person] to + verb`.
        -- "Sit down!" the teacher said. → The teacher **told** us **to sit down**.

  # ─── Slide 6: Try it — Condition & Reported Speech ───────────
  - title: "Try it — Condition & Reported Speech"
    mascotImage: /master-class/grammar-mcq-1/panda-thinking.png
    interactiveQuiz:
      - label: "Unless negation trap"
        stem: |-
          Original: If you don't wear a raincoat, you will get wet.
          Rewrite starting with "Unless". Which is correct?
        options:
          - Unless you don't wear a raincoat, you will get wet.
          - Unless you wear a raincoat, you will not get wet.
          - Unless you wear a raincoat, you will get wet.
          - Unless you wear a raincoat, you will be wet.
        correctAnswer: 3
        explanation: >-
          "Unless" already means "if not", so DROP the "don't" when
          converting. "If you don't wear" → "Unless you wear". The
          main clause stays the same — don't add a second negative.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png
      - label: "Past-past trap"
        stem: |-
          Direct: "I lost my wallet yesterday," Tom said.
          Convert to reported speech. Which is correct?
        options:
          - Tom said that he lost his wallet yesterday.
          - Tom said that he had lost his wallet the day before.
          - Tom said that he has lost his wallet yesterday.
          - Tom said that he had lost his wallet yesterday.
        correctAnswer: 2
        explanation: >-
          Two backshifts must happen together: the verb "lost"
          (simple past) → "had lost" (past perfect), AND the time
          word "yesterday" → "the day before". Option 1 misses both.
          Options 3 and 4 catch one but not the other.
        mascotCorrect: /master-class/grammar-mcq-1/panda-correct.png
        mascotWrong: /master-class/grammar-mcq-1/panda-wrong.png

  # ─── Slide 7: Wrap-up CTA ───────────────────────────────────
  - title: "Start practising!"
    mascotImage: /master-class/grammar-mcq-1/panda-cta.png
    body: >-
      Mixed practice drawn from PSLE 2016-2025 Synthesis & Transformation.
      Covers all 4 patterns from the slides. Trains the reflex of
      checking "same tense, same info, same meaning" on every rewrite.
    bullets:
      - |-
        {You'll tackle }**15 questions** —{ a mix across } Concession, Cause, Condition, {and }Reported Speech{.}
      - |-
        {Any }Wrong answers {are }auto-saved, {and }reviewed in 1 week{.}
      - |-
        {The }AI marks {your answers }word-for-word —{ giving } partial credit if you almost got it but missed {the }tense/info{.}
    cta:
      label: Click here to start practice
      quizSpec:
        title: "Mastery: Synthesis & Transformation"
        mcq: 15
        oeq: 0

commonMistakes: []

keyWords:
  - { word: "concession", definition: "Two contrasting ideas joined: 'tired BUT kept going'. Keywords: Although + clause / Despite + noun phrase / In spite of + noun phrase. The grammar split (clause vs noun phrase) is the most common trap." }
  - { word: "cause clause vs cause phrase", definition: "Same grammar split as concession. Because/Since/As take a clause (subject + verb). Due to / Owing to take a noun phrase. Convert verb → noun + drop subject." }
  - { word: "unless", definition: "Means 'if...not'. When converting If → Unless, NEGATE the if-clause (drop 'not' or add 'not'). Double negatives are the #1 trap." }
  - { word: "backshift", definition: "In reported speech, when the reporting verb is past, every tense shifts one step further back: present → past, past → past perfect (had + past participle). Pronouns and time/place words shift too: yesterday → the day before, here → there." }
  - { word: "3 rules of synthesis", definition: "① Don't change the tense. ② Don't add info. ③ Don't change the meaning. Every rewrite must pass all three checks before you submit." }

