# Master Class: PSLE English — Synthesis & Transformation Tricks
# --------------------------------------------------------------
# 6 umbrella patterns rebuilt from the master pool tally (Nov 2025):
#   A  Linking Words           (Although / Because / If / In order to / etc.)
#   B  Reported Speech         (Direct ↔ Indirect, backshift)
#   C  Pair Words & Preference (Both/Either/Neither/Not only + Would rather/Prefer)
#   D  Participle Clauses      (Having + V-ed, Seeing, Upon arriving, Being)
#   E  Substitution & Inversion(Instead of, Except, Much to, Little did, No other)
#   F  Noun Patterns           (Relative who/whom/which/whose + Possessive's
#                              + Verb→Noun + Cleft "what X enjoys")

slug: english-synthesis-tricks
subject: english
level: P5-P6
# Extraction writes "Synthesis / Transformation" (slash). The MC name
# uses ampersand in the title for readability but the picker matches
# against the slash form to align with the bank.
topicLabel: Synthesis / Transformation
