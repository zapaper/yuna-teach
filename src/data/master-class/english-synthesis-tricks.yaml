commonMistakes: []

keyWords:
  - { word: "concession", definition: "Two contrasting ideas joined. Although + clause / Despite + noun phrase / In spite of + noun phrase. The clause-vs-noun-phrase split is the most common trap." }
  - { word: "unless", definition: "Means 'if...not'. When converting If → Unless, NEGATE the if-clause — drop or add 'not'. Double negatives are the #1 trap." }
  - { word: "in order to", definition: "Purpose linker. 'In order to + verb' (same subject in both halves) or 'So that + clause' (can have a different subject)." }
  - { word: "backshift", definition: "In reported speech with past reporting verb, every tense shifts one step back: present → past, past → past perfect (had + V-ed). Pronouns and time/place words shift too: yesterday → the day before, here → there." }
  - { word: "would rather", definition: "Compares two activities. Followed by BARE verbs: 'would rather X than Y' — no 'to' before Y and no -ing. Different from 'prefer' (uses V-ing) and 'preference' (uses 'for X over Y')." }
  - { word: "not only inversion", definition: "'Not only' at sentence start FORCES inversion: 'Not only DOES Sarah sing beautifully, but she also plays the piano well'. Forgetting 'does / did / has' costs the mark." }
  - { word: "negative inversion", definition: "Same flip as 'Not only' — after Little did / No other / No sooner / Hardly / Scarcely: starter + helper (does/did/has/had) + Subject + BASE verb." }
  - { word: "having + past participle", definition: "Joins two sequential actions where the first finishes before the second. 'Mary finished her homework. She went out' → 'Having finished her homework, Mary went out.' Possessives (his/her/their) stay unchanged." }
  - { word: "instead of + V-ing", definition: "Substitution. Replaces one action with another. MUST use -ing form (or a noun), never a bare verb or clause." }
  - { word: "much to + possessive + noun", definition: "Describes a reaction. 'Much to Gavin's delight…' The 's possessive is essential." }
  - { word: "who vs whom", definition: "who = subject (replaces he/she/they). whom = object (replaces him/her/them). Test: if you could substitute he/she → who; him/her → whom." }
  - { word: "verb to noun conversion", definition: "Change an action verb into a noun phrase: 'lost her phone' → 'the loss of her phone'; 'adjusted slightly' → 'made slight adjustments'; 'concluded' → 'came to a conclusion'. Common openers: made / came to / took / had a." }
  - { word: "3 rules of synthesis", definition: "① Don't change the meaning. ② Don't change the tense. ③ Don't add info." }

subTopics:
  - id: reported-speech
    label: Reported Speech (Direct ↔ Indirect)
    description: "Direct ↔ indirect. Backshift tenses one step (present → past, past → past perfect). Also shift pronouns and time words (yesterday → the day before). Past-past trap is the headline mistake."
    slideIdx: 2
  - id: subordinator
    label: Linking Words (Although / Because / If / In order to)
    description: "Combines concession (Although/Despite/No matter/However/But/While), cause (Because/Since/As/Due to/Owing to/So), condition (If/Unless/Provided/As long as) and purpose (In order to/So that). All share the clause-vs-noun-phrase conversion trick."
    slideIdx: 1
  - id: correlative-preference
    label: Pair Words & Preference
    description: "Pair words (Both/Either/Neither/Not only/As well as/Or) plus preference (Would rather/Prefer/Preference for). Headline trap: 'Not only' at sentence start FORCES inversion. 'Would rather' takes bare verbs."
    slideIdx: 4
  - id: participle-clauses
    label: Participle Clauses (Having / -ing)
    description: "Joins two actions by reducing the first into a participle. Forms: Having + V-ed (sequential), bare V-ing (concurrent — Seeing/Hearing), Upon/After/Before + V-ing (temporal), and Being + adjective (state)."
    slideIdx: 5
  - id: substitution-inversion
    label: Substitution & Inversion
    description: "Substitution (Instead of + V-ing, Except + noun, Much to + possessive). Inversion after a negative starter (Little did / No other / No sooner / Hardly): negative + helper + Subject + BASE verb. Same flip as 'Not only'."
    slideIdx: 7
  - id: noun-phrase
    label: Noun Patterns (Relative / Possessive / Verb→Noun)
    description: "Reshapes information about a noun. Relative clauses (who/whom/which/whose), possessive 's transformations (Sally's insincerity), and verb→noun conversions ('made slight adjustments', 'came to a conclusion'). The position rule and exact-spelling rule cost marks if missed."
    slideIdx: 8
