commonMistakes: []

keyWords:
  - { word: "concession", definition: "Two contrasting ideas joined: 'tired BUT kept going'. Keywords: Although + clause / Despite + noun phrase / In spite of + noun phrase. The grammar split (clause vs noun phrase) is the most common trap." }
  - { word: "cause clause vs cause phrase", definition: "Same grammar split as concession. Because/Since/As take a clause (subject + verb). Due to / Owing to take a noun phrase. Convert verb → noun + drop subject." }
  - { word: "unless", definition: "Means 'if...not'. When converting If → Unless, NEGATE the if-clause (drop 'not' or add 'not'). Double negatives are the #1 trap." }
  - { word: "in order to", definition: "Purpose linker. Used to explain WHY an action is taken. 'In order to + verb' (same subject in both halves) or 'So that + clause' (can have a different subject)." }
  - { word: "backshift", definition: "In reported speech, when the reporting verb is past, every tense shifts one step further back: present → past, past → past perfect (had + past participle). Pronouns and time/place words shift too: yesterday → the day before, here → there." }
  - { word: "would rather", definition: "Compares two activities. Followed by BARE verbs: 'would rather X than Y' (no 'to' before Y). 'Prefer' uses gerunds: 'prefer V-ing to V-ing'. 'Preference' uses 'for X over Y'." }
  - { word: "not only inversion", definition: "When 'Not only' starts the sentence, the verb INVERTS: 'Not only DOES Sarah sing beautifully, but she also plays the piano well'. Forgetting the 'does / did / has' costs 1 mark." }
  - { word: "negative inversion", definition: "After a negative starter (Little / No other / No sooner / Hardly / Scarcely), subject-verb order flips. Pattern: starter + helper (does/did/has/had) + subject + BASE verb. Same rule as Not only." }
  - { word: "having + past participle", definition: "Joins two actions where the first finishes before the second starts. Replaces 'Subject + did X. Then subject did Y' with 'Having + V-ed X, subject did Y'. Possessives in the original (his / her / their) must stay unchanged." }
  - { word: "bare -ing participle", definition: "Same idea as 'Having' but for ongoing actions or sensing. 'Hearing a loud noise, the boy looked up.' Use the bare V-ing form at the start; new subject comes in the second clause." }
  - { word: "instead of + V-ing", definition: "Substitution. Replaces one action with another. Must use -ing form (or a noun), NEVER a clause or bare verb. 'Instead of completing his homework, Ahmad watched TV.'" }
  - { word: "much to + possessive + noun", definition: "Describes a reaction. 'Much to Gavin's delight…' / 'Much to the team's disappointment…'. The 's possessive is essential — 'Gavin delight' is wrong." }
  - { word: "who vs whom", definition: "who = subject (replaces he/she/they) — 'who teaches us'. whom = object (replaces him/her/them) — 'whom we admire'. Test: if you could substitute 'he/she' use 'who'; if 'him/her' use 'whom'." }
  - { word: "verb to noun conversion", definition: "Change an action verb into a noun phrase. 'lost her phone' → 'the loss of her phone'. 'adjusted slightly' → 'made slight adjustments'. 'concluded' → 'came to a conclusion'. Common openers: made / came to / took / had a." }
  - { word: "3 rules of synthesis", definition: "① Don't change the tense. ② Don't add info. ③ Don't change the meaning. Every rewrite must pass all three checks before you submit." }

subTopics:
  - id: reported-speech
    label: Reported Speech (Direct ↔ Indirect)
    description: "Direct ↔ indirect. Backshift tenses one step (present → past, past → past perfect). Also shift pronouns and time words (yesterday → the day before). Past-past trap is the headline mistake."
    slideIdx: 2
  - id: subordinator
    label: Linking Words (Although / Because / If / In order to)
    description: "Combines concession (Although/Despite/No matter/However/But/While), cause (Because/Since/As/Due to/Owing to/So), condition (If/Unless/Provided/As long as) and purpose (In order to/So that). All share the clause-vs-noun-phrase conversion trick."
    slideIdx: 1
  - id: correlative-preference
    label: Pair Words & Preference
    description: "Pair words (Both/Either/Neither/Not only/As well as/Or) plus preference (Would rather/Prefer/Preference for). Headline trap: 'Not only' at sentence start FORCES inversion ('Not only DOES Sarah sing'). 'Would rather' takes bare verbs."
    slideIdx: 4
  - id: participle-clauses
    label: Participle Clauses (Having / -ing)
    description: "Joins two actions by reducing the first clause into a participle. Forms: Having + V-ed (sequential), bare V-ing (concurrent — Seeing/Hearing), Upon/After/Before + V-ing (temporal), and Being + adjective (state)."
    slideIdx: 5
  - id: substitution-inversion
    label: Substitution & Inversion
    description: "Substitution (Instead of + V-ing, Except + noun, Much to + possessive). Inversion after a negative starter (Little did / No other / No sooner / Hardly): negative + helper + Subject + BASE verb. Same flip as 'Not only'."
    slideIdx: 7
  - id: noun-phrase
    label: Noun Patterns (Relative / Possessive / Verb→Noun)
    description: "Reshapes information about a noun. Relative clauses (who/whom/which/whose), possessive 's transformations (Sally's insincerity), and verb→noun conversions ('made slight adjustments', 'came to a conclusion'). The position rule and exact-spelling rule cost marks if missed."
    slideIdx: 8
