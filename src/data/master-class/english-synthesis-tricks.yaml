keyWords:
  - { word: "concession", definition: "Two contrasting ideas joined: 'tired BUT kept going'. Keywords: Although + clause / Despite + noun phrase / In spite of + noun phrase. The grammar split (clause vs noun phrase) is the most common trap." }
  - { word: "cause clause vs cause phrase", definition: "Same grammar split as concession. Because/Since/As take a clause (subject + verb). Due to / Owing to take a noun phrase. Convert verb → noun + drop subject." }
  - { word: "unless", definition: "Means 'if...not'. When converting If → Unless, NEGATE the if-clause (drop 'not' or add 'not'). Double negatives are the #1 trap." }
  - { word: "active vs passive", definition: "Active: subject DOES the action ('the boy broke the window'). Passive: subject RECEIVES the action ('the window was broken by the boy'). Use was/were + past participle. Drop 'by X' if X is generic." }
  - { word: "3 rules of synthesis", definition: "① Don't change the tense. ② Don't add info. ③ Don't change the meaning. Every rewrite must pass all three checks before you submit." }

