# Master Class: PSLE English — Synthesis & Transformation Tricks
# --------------------------------------------------------------
# 6 umbrella patterns:
#   A  Linking Words           (Although / Because / If / In order to)
#   B  Reported Speech         (Direct ↔ Indirect, backshift)
#   C  Pair Words & Preference (Both/Either/Neither/Not only + Would rather)
#   D  Participle Clauses      (Having + V-ed, Seeing, Upon arriving, Being)
#   E  Substitution & Inversion(Instead of, Except, Much to, Little did)
#   F  Noun Patterns           (Relative + Possessive 's + Verb→Noun)

