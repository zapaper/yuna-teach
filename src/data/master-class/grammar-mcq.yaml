# ────────────────────────────────────────────────────────────────────
# KEY WORDS
# ────────────────────────────────────────────────────────────────────
keyWords:
  - { word: tag question, definition: "A short check at the end of a statement (isn't he? / shall we?) that mirrors the main verb and flips the polarity." }
  - { word: countable noun, definition: "A noun you can count: book/books, idea/ideas. Takes few/many/several." }
  - { word: uncountable noun, definition: "A noun that has no plural: water, advice, luck. Takes little/much/a great deal of." }
  - { word: reflexive pronoun, definition: "A pronoun that loops back to the subject: himself, herself, themselves. Use when subject = object." }
  - { word: relative pronoun, definition: "who / whom / whose / which — links a noun to a description (the boy who runs)." }
  - { word: gerund, definition: "The -ing form of a verb used as a noun (running, swimming). Comes after prepositions and certain verbs (enjoy, avoid)." }
  - { word: infinitive, definition: "The 'to + base' form (to go, to see). Used after verbs like want, hope, decide, plan." }
  - { word: bare infinitive, definition: "The base form WITHOUT 'to' (go, see). Used after causative verbs (let, make, help, watch)." }
  - { word: conditional inversion, definition: "Formal alternative to 'if X had…' — flip auxiliary and subject: 'Had X done…'" }
  - { word: subordinating conjunction, definition: "Connects a dependent clause to a main clause: since, although, when, unless, while." }

