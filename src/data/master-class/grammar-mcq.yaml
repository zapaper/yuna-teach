keyConcepts:

  # ─── INTRO ────────────────────────────────────────────────────────
  - title: Welcome to Grammar MCQ Mastery
    body: >-
      We'll cover the **six grammar rule families** that PSLE
      tests every single year. If you internalise these, the
      Grammar MCQ section becomes mostly mechanical.
    bullets:
      - |-
        **1. Tag questions** — "…, isn't he?" / "…, shall we?"
      - |-
        **2. Noun number rules** — subject-verb agreement + **few/little/many/much**
      - |-
        **3. Pronouns** — reflexive, possessive standalone, relative
      - |-
        **4. Verb forms** — gerund vs infinitive, causative bare infinitive
      - |-
        **5. Connectors & tenses** — **since / although / in spite of** + perfect tenses
      - |-
        **6. Idiomatic prepositions** — **congratulate on**, **robbed of**, **under the impression**
    callout: >-
      The pattern in PSLE Booklet A: **one question per rule**, in
      roughly the order above. Recognise the rule type from the
      options, then apply.

  # ─── 1. TAG QUESTIONS ────────────────────────────────────────────
  - title: "1: Tag questions — the mirror rule"
    body: >-
      A tag question is the little check at the end of a statement:
      **isn't he?**, **would she?**, **shall we?**
      The tag must **mirror** the verb/auxiliary of the main
      statement and **flip the polarity**.
    bullets:
      - |-
        **Step 1 — Find the main verb/auxiliary.** "She **has** been busy" → tag uses **has**. "He **gave up**" (past simple) → tag uses **did**.
      - |-
        **Step 2 — Flip the polarity.** Positive statement → **negative** tag ("She is busy, **isn't** she?"). Negative statement → **positive** tag ("He hasn't called, **has** he?").
      - |-
        **Step 3 — Match the pronoun.** "Tom" → **he**. "Mary" → **she**. "The team" → **it** (or **they** depending on context).
      - |-
        **Three special cases that catch most students:**
           • **"Let's"** → always **"shall we?"** (not "will we?")
           • **"I am"** → **"aren't I?"** (irregular)
           • **Negative-meaning words** (never, hardly, seldom, scarcely, nothing) make the statement NEGATIVE → use a **positive** tag

  - title: Worked examples — Tag questions
    bullets:
      - |-
        **Example A — PSLE 2023 Q1** (the "Let's" special case)
        "Let's play a game of hide-and-seek, ___?" my sister suggested.
        (1) shall we   (2) may we   (3) can we   (4) will we
           • "**Let's**" is a fixed idiom — the tag is ALWAYS **"shall we?"** (not "will we?" or "can we?")
           • **→ Option (1): shall we ✓**
      - |-
        **Example B — PSLE 2024 Q8** (the negative-stem polarity flip)
        "She **never ever** visits the museum, ___?" asked Mrs Lee.
        (1) hasn't she   (2) won't she   (3) does she   (4) will she
           • Verb "visits" = present simple → tag uses **do/does**, eliminates **hasn't / won't / will**.
           • "**never ever**" makes the statement NEGATIVE → tag flips to POSITIVE → **does she** (not **doesn't she**).
           • **→ Option (3): does she ✓**
    callout: >-
      **Mirror the verb, flip the polarity.** Watch for "never /
      hardly / seldom / scarcely" — they make the statement
      negative even though it doesn't contain **not**.

  # ─── 2. NOUN NUMBER RULES ────────────────────────────────────────
  - title: "2: Noun number — countable vs uncountable"
    body: >-
      English splits nouns into **countable** (you can count them:
      **3 books, 5 ideas**) and **uncountable** (you can't: **water,
      advice, luck**). Each takes a different family of quantifiers.
    bullets:
      - |-
        **Countable + plural:** **few, many, several, each, a number of, fewer**
      - |-
        **Uncountable:** **little, much, a great deal of, a large amount of, less**
      - |-
        **Either:** **some, any, enough, more, most, all**
      - |-
        **The treacherous "mass" nouns** — these LOOK countable but are uncountable:
           • **time, effort, trouble, advice, luck, news, information**
           • **equipment, furniture, luggage, money, knowledge, work**
        For these, always use **little / much / a great deal of**.
      - |-
        **"a great DEAL of" (uncountable)** vs **"a large NUMBER of" (countable)** — the noun **deal** attaches to uncountables, **number** to countables.

  - title: "2: Noun number — subject-verb agreement traps"
    body: >-
      The verb must match the subject's number. PSLE tests **four
      shapes** where the real subject isn't obvious.
    bullets:
      - |-
        **Plural-looking but singular**: **news, luggage, mathematics, athletics** → use **is / has**. Example: "The news **has** been circulating since yesterday."
      - |-
        **"The number of X" (singular)** vs **"A number of X" (plural)**. "**The** number of pupils **is** rising." vs "**A** number of pupils **are** absent."
      - |-
        **Interrupters with "as well as / except / together with":** The verb still matches the main subject. "Everyone, except Sanjay and Aidan, **has** handed in their homework."
      - |-
        **Gerund subjects** (verb +ing acting as noun) are always singular: "Reading different types of books **helps** me improve."
      - |-
        **"Neither X nor Y"** matches the noun CLOSEST to the verb. "Neither Jack **nor I** **am** going."

  - title: Worked examples — Noun number
    bullets:
      - |-
        **Example A — PSLE 2023 Q5** (uncountable quantifier)
        He must have ___ luck as he has won the top prize for the past two years.
        (1) many   (2) enough   (3) a great deal of   (4) a large number of
           • "luck" = UNCOUNTABLE → reject **many** (countable) and *a large **number** of* (countable).
           • Between **enough** and **a great deal of** → he won twice, so we need "a lot" not "just sufficient".
           • **→ Option (3): a great deal of ✓**
      - |-
        **Example B — PSLE 2024 Q9** (interrupter subject-verb agreement)
        Everyone, except Sanjay and Aidan, ___ in their homework.
        (1) hand   (2) handing   (3) has handed   (4) have handed
           • Subject = "Everyone" (singular indefinite pronoun). The "except Sanjay and Aidan" is an INTERRUPTER — it doesn't change the subject.
           • Singular subject → singular verb "**has** handed" (not **have** handed).
           • **→ Option (3): has handed ✓**
    callout: >-
      **Test the noun, ignore the interrupter.** For quantifiers,
      ask "can I count this?" first. For SVA, find the REAL subject
      and ignore phrases starting with **except / as well as /
      together with / along with**.

  # ─── 3. PRONOUNS ─────────────────────────────────────────────────
  - title: "3: Pronouns — three families to keep separate"
    body: >-
      Pronouns get tested in three forms; the trap is usually
      choosing the right form for the role in the sentence.
    bullets:
      - |-
        **Personal vs reflexive.** Use the reflexive form (**himself, herself, themselves, myself, yourself**) ONLY when the subject and object of the action are the SAME person.
           • ✓ "Mary ate the cake by **herself**." → Mary did + Mary ate alone (same person).
           • ✓ "Tom hurt **himself**." → Tom did + Tom got hurt (same person).
           • ✗ When the object is a DIFFERENT person, use a regular pronoun (him, her, them): "John gave the book to **her**" — not "to herself".
      - |-
        **Possessive — "his" / "her" vs "hers".** Two forms:
           • **Adjective form** (in front of a noun): *my, your, his, **her**, our, their* → "**her** car"
           • **Standalone form** (replaces the noun): *mine, yours, his, **hers**, ours, theirs* → "That car is **hers**."
           ⚠️ No apostrophe ever. "It's" = "it is". The possessive is "its".
      - |-
        **Relative pronouns:**
           • **who** — subject ("the boy **who** is running")
           • **whom** — object ("the boy to **whom** I gave the book")
           • **whose** — possessive ("the boy **whose** bag is missing")
           • **which** — things, not people
      - |-
        **Indefinite pronouns** like **everyone, anybody, nobody, someone** are always SINGULAR — they take **is / has** (not *are / have*).
           • ✓ "**Everyone** **is** here." → singular verb.
           • ✗ "Everyone **are** here." → wrong, plural verb.

  - title: Worked examples — Pronouns
    bullets:
      - |-
        **Example A — PSLE 2023 Q4** (relative possessive)
        Mrs Phua is someone ___ opinions I truly value.
        (1) who   (2) which   (3) whom   (4) whose
           • The blank comes right BEFORE "opinions" — the opinions BELONG to Mrs Phua → POSSESSIVE relative.
           • **who** (subject) ✗, **whom** (object) ✗, **which** (things only) ✗, **whose** (possessive) ✓
           • **→ Option (4): whose ✓**
      - |-
        **Example B — PSLE 2020 Q2** (reflexive — must match the SUBJECT)
        Trixie was tickled when she caught **Mr Loh** looking at his reflection in the mirror, smiling at ___.
        (1) her   (2) him   (3) herself   (4) himself
           • Who is doing the smiling? Mr Loh. Who is being smiled at? Also Mr Loh (his reflection). When the subject = object → REFLEXIVE.
           • Mr Loh is male → **himself** (not **herself**, which would match Trixie).
           • **→ Option (4): himself ✓**
    callout: >-
      **For relative pronouns**, substitute mentally — if "of him/
      her/them" fits, the answer is **whose**. **For reflexives**,
      identify WHO is doing the action — the reflexive must match
      that person, not the bystander.

  # ─── 4. VERB FORMS ───────────────────────────────────────────────
  - title: "4: Verb forms — gerund vs infinitive vs bare"
    body: >-
      The form of the SECOND verb in a sentence depends on what
      comes before it. Three main patterns to know.
    bullets:
      - |-
        **Verbs followed by GERUND (-ing):**
           enjoy, avoid, mind, consider, suggest, finish, dislike, **have trouble**, **have difficulty**, object to, look forward to, be used to
           → "Bella enjoys **interacting** with her neighbours."
      - |-
        **Verbs followed by INFINITIVE (to + base):**
           want, hope, decide, agree, plan, learn, refuse, manage, expect, seem
           → "Mohan seems **to have lost** weight."
      - |-
        **The PREPOSITION trap.** When "to" is a preposition (NOT the infinitive **to**), the next verb is a **gerund**:
           • *object **to** going**, **look forward **to** seeing*
           • *be used **to** working**, **be accustomed **to** doing*
           ⚠️ Students see "to" and pick the base form by reflex — that's wrong here.
      - |-
        **Causative / sensory verbs + BARE infinitive (no "to"):**
           let, make, help, watch, see, hear, witness, feel, notice
           → "Kamal **made** his baby sister **giggle**."
           → "Judy **witnessed** a boy **slip** the cards into his bag."

  - title: Worked examples — Verb forms
    bullets:
      - |-
        **Example A — PSLE 2021 Q7** (the "to + gerund" preposition trap)
        Tom **objected to** ___ on a camping trip as he did not like outdoor activities.
        (1) go   (2) going   (3) be going   (4) having gone
           • "object **to**" looks like the infinitive **to go** — but "to" here is a PREPOSITION.
           • Test: replace with a noun → "objected to **the trip**" ✓ → preposition confirmed.
           • Preposition + verb → **GERUND** (-ing form).
           • **→ Option (2): going ✓**
      - |-
        **Example B — PSLE 2022 Q5** (causative bare infinitive)
        Judy **witnessed** a boy ___ the game cards into his bag, so she reported it to the store manager.
        (1) slip   (2) slips   (3) slipped   (4) has slipped
           • "witness" is a SENSORY verb (like **see, watch, hear, notice**) — these take the **bare infinitive** (no "to", no "-ing", no past tense).
           • **→ Option (1): slip ✓**
    callout: >-
      **Two rules to remember:** "to + verb" can be EITHER an
      infinitive OR a preposition — test by trying a noun in its
      place. **Causative / sensory verbs** (let, make, help,
      see, watch, hear, witness, feel, notice) take the **bare base
      form** of the next verb.

  # ─── 5. CONNECTORS & TENSES ──────────────────────────────────────
  - title: "5: Connectors — cause / concession / time"
    body: >-
      Each connector signals a specific logical relationship.
      Read the SECOND clause to figure out which one fits.
    bullets:
      - |-
        **Cause:** **since, because, as, owing to, due to, because of, in response to**. → "**Since** the concert was cancelled, the organiser refunded us."
      - |-
        **Concession (contradiction)**: **although, even though, despite, in spite of**. The two clauses contradict. → "**In spite of** the continual support, the family is unable to make ends meet."
      - |-
        **Contrast:** **other than, on the other hand, whereas, but**. → "Li Shan does not eat seafood. **Other than** that, she will eat anything."
      - |-
        **Time:** **as soon as, when, while, before, after, until, by the time**. These often dictate the TENSE of the next clause.
      - |-
        **"In spite of / Despite"** must be followed by a NOUN or GERUND, not a clause. "In spite of **being late**" ✓, "In spite of **she was late**" ✗ (use "although" instead).

  - title: "5: Conditional inversion & perfect tense triggers"
    body: >-
      Some grammar questions test **tense triggers** — words that
      force a specific tense in the next clause.
    bullets:
      - |-
        **"Had + subject + past participle"** = formal inversion of "if X had…". → "**Had James put** the compass in his bag, we would not be lost" = "If James **had put** the compass in his bag…"
      - |-
        **"wish / if only" + past perfect** for regret. → "Muthu **wished** he **had heeded** his mother's advice."
      - |-
        **"since / for the past N"** + present perfect (continuous). → "The news **has been circulating** since yesterday."
      - |-
        **"by the end of [future time]"** + future perfect. → "By next year, my brother **will have become** a trained instructor."
      - |-
        **"No sooner had X done than Y…"** — past perfect + past simple, with inversion.

  - title: Worked examples — Connectors & tenses
    bullets:
      - |-
        **Example A — PSLE 2022 Q6** (concession connector — watch the contradiction)
        ___ the continual support from the villagers, the family is unable to make ends meet.
        (1) Amid   (2) Owing to   (3) In spite of   (4) With regard to
           • Clause 1 "continual support" is HELPFUL. Clause 2 "unable to make ends meet" is the OPPOSITE result.
           • Contradiction → CONCESSION connector → **In spite of** (or **despite**, **although**).
           • **Owing to** signals cause (wrong direction). **Amid** / **With regard to** don't match the meaning.
           • **→ Option (3): In spite of ✓**
      - |-
        **Example B — PSLE 2024 Q6** (conditional inversion)
        '___ James put the compass in his bag, we would not be lost in the forest,' grumbled Ai Ling.
        (1) Did   (2) Had   (3) Might   (4) Should
           • Consequence "**would not be lost**" = past conditional → protasis must be **past perfect**.
           • "If James had put" → drop **if** and invert → "**Had** James put".
           • Only **Had** triggers this past-perfect inversion. **Did** gives past simple; **Might/Should** don't form a valid conditional with the given consequence.
           • **→ Option (2): Had ✓**
    callout: >-
      **For connectors**, read the SECOND clause and ask "does it
      support or contradict the first?" — that picks cause vs
      concession. **For inversion**, the consequence ("would have
      / would be") tells you the protasis tense: "would have" →
      past perfect → **Had X done**.

  # ─── 6. IDIOMATIC PREPOSITIONS ───────────────────────────────────
  - title: "6: Idiomatic prepositions — fixed combinations"
    body: >-
      There's no rule — these are FIXED idioms you have to memorise.
      PSLE picks pairs where multiple options sound vaguely OK.
    bullets:
      - |-
        **Verb + preposition pairs** (commit these as a single chunk):
           • congratulate someone **on** something
           • accuse someone **of** something
           • blame X **for** Y
           • rob someone **of** something
           • suspect someone **of** something
           • depend / rely **on** someone
           • succeed **in** doing
      - |-
        **Idiomatic phrases with a fixed preposition:**
           • **under** the impression
           • **in** someone's face ("shut the door in her face")
           • **on** purpose, **on** time, **on** behalf of
           • **at** risk, **at** a loss, **at** stake
           • **by** accident, **by** chance, **by** mistake
           • **against** the current, **against** the rules
           • **out of** breath, **out of** stock
      - |-
        **Movement vs position:** **into** (movement) vs **in** (position). "He walked **into** the room" vs "He is **in** the room". Same for **onto / on**, **off of / off**.
      - |-
        **"X minutes into the game"** — "into" with a duration marks a point in time.

  - title: Worked examples — Idiomatic prepositions
    bullets:
      - |-
        **Example A — PSLE 2024 Q10** (verb + preposition fixed pair)
        The police officers were looking for the man who **robbed the tourists** ___ their possessions.
        (1) of   (2) for   (3) off   (4) with
           • Verb "rob" → fixed idiom **"rob someone OF something"**.
           • **for** (used with **blame**), **off** (slang), **with** (used with weapons) — all wrong.
           • **→ Option (1): of ✓**
      - |-
        **Example B — PSLE 2021 Q9** (idiomatic phrase preposition)
        As the guard was ___ the impression that the hall was empty, he locked it up, not realising that someone was still in it.
        (1) in   (2) on   (3) with   (4) under
           • "___ the impression" is a fixed phrase — the correct preposition is **"under"** (under the impression that…).
           • **in**, **on**, **with** don't combine with "impression" in this idiom.
           • **→ Option (4): under ✓**
    callout: >-
      **Memorise as chunks.** **rob someone OF, accuse someone OF,
      congratulate someone ON, blame someone FOR, under the impression,
      in someone's face, against the current, by accident.** Don't
      reason them out — they're fixed by usage.

