commonMistakes: []

keyWords:
  - { word: "7 characteristics of living things", definition: "Move, breathe, grow, reproduce, respond, need food/water, excrete. ALL must be true for an organism to be 'living'. The reproduce test is the sharpest single check." }
  - { word: "flow chart", definition: "A yes/no chart for identifying organisms. Strategy: start at top, answer one question, follow the arrow. Never skip ahead or read bottom-up." }
  - { word: "property vs use", definition: "Materials are tested by USE: what does the object need to do? Pick the property that fits, then the material. Designed-role beats general-truth answers on PSLE." }
  - { word: "heat conductor / insulator", definition: "Metals are good heat conductors (heat flows through). Wood, plastic, rubber are poor heat conductors (insulators — keep things cool to touch). Most PSLE handle/grip questions test this." }
  - { word: "fungi", definition: "Mushrooms, mould, yeast. ALIVE but NOT plants (no chlorophyll, can't photosynthesise). Reproduce by spores. PSLE trap word." }

