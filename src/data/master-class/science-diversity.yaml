# Master Class: PSLE Science — Diversity
# --------------------------------------------------------------
# Covers two big PSLE Science topics combined:
#   - Diversity of LIVING THINGS (classify organisms by characteristics)
#   - Diversity of MATERIALS (classify by properties + match to uses)
#
# Same underlying skill: classify by characteristics.
# Heavy on traps (fire is not living; mushroom is not a plant).
#
# Source: PSLE Science 2016-2025 patterns.

slug: science-diversity
subject: science
level: P5-P6
topicLabel: Diversity
title: "PSLE Science — Diversity (Living Things + Materials)"

stats:
  headline: >-
    Diversity = ~10-15 marks across living things + materials.
    PSLE tests the EDGE CASES, not the obvious. Master the trap list
    and the classification keys — easy marks every year.

keyConcepts:

  # ─── Slide 0: Welcome ────────────────────────────────────────
  - title: "Welcome — Diversity (Living Things + Materials)"
    mascotImage: /master-class/interactions-environment/panda-welcome.png
    body: >-
      Diversity tests ONE skill in two contexts: **classify things by
      their characteristics**. Either organisms (alive vs not, then
      by group) or materials (by properties, then matched to uses).
      PSLE almost never tests the obvious — they test edge cases.
    bullets:
      - |-
        {First up is }**Block 1: Living Things** — {covering }characteristics + animal/plant groups + flow charts{.}
      - |-
        {Next is }**Block 2: Materials** — {focusing on the }6 properties + matching {a }property to {its }use{.}
      - |-
        **Shared skill**: "What characteristics does X have? Which group does that put it in?"

  # ─── Slide 1: Living vs Non-Living — the trap list ─────────
  - title: "Living vs Non-Living — the 7 characteristics + trap list"
    mascotImage: /master-class/interactions-environment/panda-teaching-causal.png
    body: >-
      Easy questions ("is a dog living?") never appear on PSLE. They
      test things that LOOK like one thing but are the other. Memorise
      the 7 characteristics — ALL must be true for "living".
    bullets:
      - |-
        **The 7 characteristics of living things (all must apply):**
        ① Move ② Breathe ③ Grow ④ Reproduce ⑤ Respond to stimuli
        ⑥ Need food/water ⑦ Excrete waste
      - |-
        **PSLE traps — these are NOT living (despite looking like it):**
        -- **Fire** — moves, grows, needs oxygen → BUT doesn't reproduce or excrete
        -- **River** — moves, "grows" by erosion → BUT doesn't reproduce
        -- **Robot / Car** — moves, needs "food" (fuel) → BUT doesn't reproduce or grow
        -- **Cloud / Crystal** — grows → BUT doesn't reproduce or respond
      - |-
        **PSLE traps — these ARE living (despite looking dormant):**
        -- **Seeds** — don't move, but reproduce when planted
        -- **Eggs** — same logic; the organism inside is alive
        -- **Mushroom (fungi)** — alive! NOT a plant (no chlorophyll) but living
      - |-
        {Here's a quick }**Trick**: If something doesn't REPRODUCE on its own, it's not living. This single test eliminates most traps.

  # ─── Slide 2: Practice 1 — Living vs Non-Living ──────────
  - title: "Try it — Living vs Non-Living traps"
    mascotImage: /master-class/interactions-environment/panda-thinking.png
    interactiveQuiz:
      - label: "Classic PSLE trap"
        stem: |-
          Which of the following is NOT a living thing?
          (Use the "does it reproduce?" test)
        options:
          - A mushroom
          - A bean seed
          - A burning candle
          - A young fern
        correctAnswer: 3
        explanation: >-
          Apply the reproduce test: mushroom (fungi) reproduces by spores; seeds
          and ferns reproduce. A burning candle's FLAME moves, grows, needs
          oxygen — but doesn't reproduce or excrete. Not living.
        mascotCorrect: /master-class/interactions-environment/panda-correct.png
        mascotWrong: /master-class/interactions-environment/panda-wrong.png
      - label: "Multi-criterion trap"
        stem: |-
          A car can move and needs fuel. Why is a car NOT a living thing?
          (Pick the SHARPEST reason)
        options:
          - Cars are made of metal.
          - Cars are made by humans.
          - Cars do not reproduce or grow.
          - Cars do not have a brain.
        correctAnswer: 3
        explanation: >-
          PSLE marks the answer that names CHARACTERISTICS, not origin. "Made by
          humans" or "metal" are facts, not characteristics. "Doesn't reproduce
          or grow" directly fails the 7-characteristic test.
        mascotCorrect: /master-class/interactions-environment/panda-correct.png
        mascotWrong: /master-class/interactions-environment/panda-wrong.png

  # ─── Slide 3: Classifying Animals + Plants ────────────────
  - title: "Classifying Animals + Plants — 6 groups, key questions"
    mascotImage: /master-class/interactions-environment/panda-teaching-mutual.png
    body: >-
      Animals split into 6 groups; plants split by reproduction method.
      PSLE tests the **diagnostic question** for each group, not memorising
      lists. Master one question per group.
    bullets:
      - |-
        **6 Animal Groups + 1 diagnostic question each:**
        -- **Mammals**: Has fur AND feeds young with milk? → mammal
        -- **Birds**: Has feathers? → bird (note: ostrich, penguin also birds)
        -- **Reptiles**: Has dry scales? → reptile (snakes, lizards, turtles)
        -- **Amphibians**: Smooth wet skin, lives in water + land? → amphibian
        -- **Fish**: Has gills + wet scales? → fish
        -- **Insects**: Has 6 legs + 3 body parts? → insect (NOT spider — 8 legs)
      - |-
        **Plant classification — 2-stage:**
        -- Stage 1: Flowers or not?
        -- Stage 2: If yes → with seeds (most plants). If no → ferns/mosses (reproduce by spores)
      - |-
        **PSLE traps:**
        -- **Spider** has 8 legs → NOT an insect (arachnid)
        -- **Whale / Dolphin** lives in water → mammal, NOT fish (no gills, breathes air)
        -- **Penguin** swims → bird, NOT fish (has feathers)
        -- **Mushroom** isn't a plant — fungi, separate kingdom
      - |-
        **Trick**: When asked "what group is X?", always look for the **one diagnostic feature** PSLE highlights in the question stem.

  # ─── Slide 4: Practice 2 — Classification ─────────────────
  - title: "Try it — Animal & Plant Classification"
    mascotImage: /master-class/interactions-environment/panda-thinking.png
    interactiveQuiz:
      - label: "Tricky mammal"
        stem: |-
          A whale gives birth to live young and feeds them milk. It lives in
          water. Which group does a whale belong to?
        options:
          - Fish
          - Mammal
          - Reptile
          - Amphibian
        correctAnswer: 2
        explanation: >-
          The KEY clue is "feeds young with milk" — that's a mammal trait. Lives
          in water but breathes air. Trap: students see "water" and pick fish.
          Always look at the diagnostic FEATURE, not the habitat.
        mascotCorrect: /master-class/interactions-environment/panda-correct.png
        mascotWrong: /master-class/interactions-environment/panda-wrong.png
      - label: "Plant or not?"
        stem: |-
          A fern grows in a forest, has green leaves, but produces no flowers
          and no seeds. How does the fern reproduce?
        options:
          - By seeds underground
          - By spores
          - By cuttings only
          - By eating insects
        correctAnswer: 2
        explanation: >-
          Plants that don't produce flowers/seeds (ferns, mosses) reproduce by
          SPORES — tiny dust-like cells, often on the underside of leaves.
        mascotCorrect: /master-class/interactions-environment/panda-correct.png
        mascotWrong: /master-class/interactions-environment/panda-wrong.png

  # ─── Slide 5: Flow Charts ────────────────────────────────
  - title: "Flow Charts — read top-down, one yes/no at a time"
    mascotImage: /master-class/interactions-environment/panda-teaching-causal.png
    body: >-
      Almost every PSLE Diversity paper has 1 flow chart question.
      Pattern: a chart of yes/no questions. Strategy: start at the top,
      answer ONE question, follow the arrow, never skip.
    bullets:
      - |-
        **3-step strategy:**
        -- Step 1: Start at the **top question only**. Ignore the rest of the key for now.
        -- Step 2: Answer YES or NO based on the organism's characteristic.
        -- Step 3: Follow the arrow. Repeat until you hit a name.
      - |-
        **Common trap**: Students try to "shortcut" by reading the bottom answers first and working backwards. This always fails on PSLE — questions are designed so the WRONG answer also makes sense at the bottom.
      - |-
        **Other trap**: Multi-criterion questions ("Has scales AND lays eggs?"). If even ONE part is no, the whole answer is NO. Read carefully.
      - |-
        **PSLE 2024 example**: Key with "Has feathers?" → YES → "Can fly?" → NO → Penguin. Student must recognise penguin is still a bird despite not flying.

  # ─── Slide 6: Practice 3 — Flow Chart ────────────────────
  - title: "Try it — Using a flow chart"
    mascotImage: /master-class/interactions-environment/panda-thinking.png
    interactiveQuiz:
      - label: "Read the key correctly"
        stem: |-
          Use this key to identify the animal:
          1a. Has fur? → go to 2
          1b. No fur? → go to 3
          2a. Eats only plants? → A
          2b. Eats meat or both? → B
          3a. Has scales? → C
          3b. No scales? → D
          The animal has fur and eats only plants. Which is it?
        options:
          - "A"
          - "B"
          - "C"
          - "D"
        correctAnswer: 1
        explanation: >-
          Top question: has fur? YES → go to 2. At 2: eats only plants? YES → A.
          Don't jump straight to 2a — verify YES on 1 first.
        mascotCorrect: /master-class/interactions-environment/panda-correct.png
        mascotWrong: /master-class/interactions-environment/panda-wrong.png

  # ─── Slide 7: Materials — properties + uses ───────────────
  - title: "Materials — 6 properties to know, match to USE"
    mascotImage: /master-class/electrical-circuits/panda-teaching-bulbs.png
    body: >-
      PSLE rarely asks "what is plastic?" Instead: "What property does the
      umbrella fabric need?" Strategy: think about the OBJECT'S USE first,
      then pick the matching property.
    bullets:
      - |-
        **6 properties + opposite pairs (with definitions):**
        -- **Strong** = can hold heavy weight without breaking ↔ **Weak** = breaks easily under load
        -- **Flexible** = can bend without breaking ↔ **Rigid (stiff)** = cannot bend; holds its shape
        -- **Transparent** = light passes through, you can see clearly ↔ **Opaque** = no light passes; cannot see through · (**Translucent** = some light passes; cannot see clearly, like frosted glass)
        -- **Waterproof** = water cannot pass through ↔ **Absorbent** = soaks water in
        -- **Good heat conductor** = heat flows through easily (gets hot fast) ↔ **Poor heat conductor / insulator** = heat does NOT flow through (stays cool to touch)
        -- **Good electrical conductor** = electricity flows through ↔ **Poor electrical conductor / insulator** = electricity does NOT flow through
      - |-
        **Common materials and their key properties:**
        -- **Metal**: strong, rigid, good conductor (heat + electricity)
        -- **Plastic**: flexible, waterproof, poor conductor (heat + electricity)
        -- **Glass**: transparent, rigid, waterproof
        -- **Wood**: strong, rigid, poor conductor of heat/electricity, absorbent
        -- **Rubber**: flexible, waterproof, poor conductor of electricity
        -- **Ceramic**: rigid, poor conductor of heat
      - |-
        **Strategy for "what should X be made of?":**
        -- Step 1: What's the OBJECT'S JOB? (e.g. umbrella → keep rain out)
        -- Step 2: What property is needed? (waterproof)
        -- Step 3: What materials have that property? (plastic, rubber, treated fabric)
      - |-
        **Trap**: Multi-property objects (e.g. saucepan handle needs to be a HEAT INSULATOR even though the pan itself is a heat conductor). PSLE loves these.

  # ─── Slide: Materials OEQ — answering technique ───────────
  - title: "Materials OEQ — 3-step answering technique"
    mascotImage: /master-class/electrical-circuits/panda-teaching-bulbs.png
    body: >-
      OEQ questions on materials (e.g. "Explain why the umbrella fabric
      is suitable for keeping rain out") want a 3-part answer. Miss any
      part → lose a mark. Follow this template every time.
    bullets:
      - |-
        **(a) State the right material / property** — name what the object SHOULD be made of (or what property it has).
        Example: "The umbrella fabric is waterproof."
      - |-
        **(b) Use data from the question / chart** — quote the specific evidence given (table values, observation, image).
        Example: "From the table, fabric Y does not absorb any water." OR
        "The diagram shows water beads rolling off the surface."
      - |-
        **(c) Explain how it fits the context** — link the property to the object's USE / FUNCTION in plain words.
        Example: "This means rain cannot soak through, so the person staying under the umbrella will not get wet."
      - |-
        **Full answer (3 sentences):**
        "The umbrella fabric is waterproof **(a)**. The table shows fabric Y absorbs no water **(b)**. This means rain cannot soak through, keeping the person dry **(c)**."
      - |-
        {Watch out for this }**Common mistake**: only doing {step }(a) — {just }naming the property without explaining WHY it fits the use. That's a 1-mark answer when the question gave 2-3 marks.

  # ─── Slide: Worked Example — Materials OEQ ──────────────
  - title: "Worked example — Material OEQ (3 marks)"
    mascotImage: /master-class/electrical-circuits/panda-teaching-bulbs.png
    body: >-
      A real PSLE-style table + question. Watch how the (a)+(b)+(c)
      structure earns all 3 marks. Most students stop after (a) and
      lose 2 marks.
    bullets:
      - |-
        **The table:**
        Material P → strong, rigid, absorbs water
        Material Q → weak, flexible, absorbs water
        Material R → strong, flexible, waterproof
        Material S → weak, rigid, waterproof
      - |-
        **The question (3 marks):** A toy umbrella needs to be **flexible**
        (so it can fold) and **waterproof** (so it keeps rain out).
        Which material should it be made of? Explain.
      - |-
        **What MOST students write (1 mark only):**
        ✗ "Material R." — missing (b) and (c). Only 1 mark out of 3.
      - |-
        **Full-marks answer (3 marks):**
        **(a)** Material R should be used.
        **(b)** From the table, R is **flexible** AND **waterproof** (does not absorb water).
        **(c)** This means the umbrella can be folded and unfolded easily, AND will keep the rain out so the user stays dry.
      - |-
        **Mark allocation**:
        ✓ Name the material (a) → 1 mark
        ✓ Quote data showing it has BOTH needed properties (b) → 1 mark
        ✓ Link both properties to umbrella's function (c) → 1 mark
      - |-
        **Trick**: when the question lists **2 properties needed**, your (b) and (c) MUST address BOTH. Mentioning only one = lose half.

  # ─── Slide 8: Practice 4 — Materials ──────────────────────
  - title: "Try it — Materials and properties"
    mascotImage: /master-class/electrical-circuits/panda-thinking.png
    interactiveQuiz:
      - label: "Multi-property object"
        stem: |-
          A frying pan has a metal body and a wooden handle. Why is the handle
          made of wood and not metal?
        options:
          - Wood is cheaper than metal.
          - Wood is stronger than metal.
          - Wood is a poor heat conductor — keeps the handle cool to touch.
          - Wood is lighter than metal.
        correctAnswer: 3
        explanation: >-
          The DESIGNED ROLE of the handle is "safe to hold while pan is hot."
          That demands a poor heat conductor — wood. Other answers may be true
          but aren't the design reason. PSLE marks the FUNCTION-driven answer.
        mascotCorrect: /master-class/electrical-circuits/panda-correct.png
        mascotWrong: /master-class/electrical-circuits/panda-wrong.png
      - label: "Property mismatch trap"
        stem: |-
          An umbrella fabric needs to be both **flexible** and **waterproof**.
          Which material best meets BOTH requirements?
        options:
          - Plastic sheet
          - Treated fabric (like nylon)
          - Metal foil
          - Wood
        correctAnswer: 2
        explanation: >-
          Plastic sheet is waterproof and flexible, but it can't fold like
          fabric does. Metal foil is flexible but cracks. Wood is rigid. Treated
          fabric (nylon, polyester) is the standard answer — flexible enough to
          fold AND waterproof when coated.
        mascotCorrect: /master-class/electrical-circuits/panda-correct.png
        mascotWrong: /master-class/electrical-circuits/panda-wrong.png

