# Master Class: Patterns (Math)
# ------------------------------
# Pattern questions are tricky because they live across multiple
# syllabus topics — Basic math operations, Algebra, Statistics,
# Geometry. The practice pool is filtered by stem keyword
# (`practiceStemRegex`) rather than by `syllabusTopic`.
#
# CONVENTIONS:
#   • **bold** in any text renders as bold on screen.
#   • __underline__ also supported.
#   • Use the YAML `|` literal-block syntax for multi-line strings.
#   • `narration.intro`, `narration.bullets`, `narration.scoringExample`,
#     `narration.callout` are OPTIONAL — when set, the audio reads the
#     override instead of the visible content. `bullets` is an array
#     where `null` means "use the visible bullet text as-is".

slug: patterns
subject: math
level: P3-P6
topicLabel: Patterns
title: Patterns in Math

# Pattern questions are scattered across several syllabus topics. The
# admin route honours this regex when set — questions whose stem
# matches AND whose paper is the right subject/level go into the pool.
practiceStemRegex: "\\b(pattern|sequence|figure\\s*\\d|missing number|next term|nth term|the\\s*\\d+(st|nd|rd|th)\\s*(figure|term|number|bead|letter))\\b"

stats:
  psleQuestions: 0
  psleSubjectPercent: 0
  totalPracticePool: 38
  psleQuestionsInPool: 0
  schoolQuestionsInPool: 38
  pctOeq: 50
  headline: >-
    Pattern questions appear in nearly every P3–P6 paper. They look
    short but they're worth **1 to 5 marks** each — and the trickiest
    ones (interleaved sequences, two-colour figures, nth-term) are
    where strong students lose marks they shouldn't.

# ────────────────────────────────────────────────────────────────────
# KEY CONCEPT SLIDES
# ────────────────────────────────────────────────────────────────────
keyConcepts:

  - title: "Patterns: How important is this?"
    mascotImage: /master-class/patterns/panda-welcome.png
    body: >-
      We tracked **38 unique pattern questions** across P3–P6 WA, EOY,
      and Prelim papers in our bank. Even split between MCQ and OEQ,
      averaging **2.3 marks per question**.
    pieChart:
      percentage: 50
      label: are open-ended (OEQ)
      caption: The other half are MCQ — but the MCQ traps are nastier.
    bullets:
      - "**38 questions** across 28 different papers (P3–P6)"
      - "**50% OEQ, 50% MCQ** — short questions, but high stakes per mark"
      - "**Most common at P4** (15 Qs) and **P6** (12 Qs)"
      - |-
        **We will cover the 6 trick families that unlock every pattern question:**
          • The Differences Method
          • Hidden sub-patterns
          • Find the nth term
          • Figure-based patterns
          • Two-colour figures
          • Shape composition
    callout: >-
      Patterns aren't on the official syllabus list — they hide inside
      Algebra, Basic operations, Statistics, and Geometry. That makes
      them easy to under-revise.

  - title: "1: The Differences Method — always start here"
    mascotImage: /master-class/patterns/panda-teaching-differences.png
    body: >-
      For ANY number sequence question, the first move is the same:
      **write the difference between each pair of consecutive numbers**.
      The rule almost always reveals itself.
    bullets:
      - "**Step 1** — Subtract: each term minus the previous term. Write the differences below the sequence."
      - "**Step 2** — Are the differences **constant**? (e.g. all +100) → it's a **linear pattern**. Just keep adding."
      - "**Step 3** — Are the differences themselves **growing**? (e.g. +2, +4, +6, +8) → take the differences of those differences. If THAT's constant, the rule is a **doubled / squared** pattern."
      - "**Step 4** — Don't forget to **check your rule** by extending one more term and seeing if it matches the next given number."
    scoringExample:
      scenario: >-
        Find the missing number: **88 520, 88 720, 88 920, ____, 89 320**
      oneMark:
        label: Guess
        text: "89 020"
      fullMarks:
        label: Full marks (with method)
        text: >-
          Differences: 88 720 − 88 520 = **+200**. 88 920 − 88 720 =
          **+200**. So missing number = 88 920 + 200 = **89 120**.
          Check: 89 120 + 200 = 89 320 ✓
    callout: >-
      9 out of 10 simple sequence questions fall to the Differences
      Method. Always start there.

  - title: "2: Hidden sub-patterns — when the differences DON'T behave"
    mascotImage: /master-class/patterns/panda-teaching-subpatterns.png
    body: >-
      Some sequences look chaotic at first because **two or three
      different rules** are interleaved into ONE list. The PSLE / WA
      trick is to find the sub-pattern.
    bullets:
      - "**Clue 1** — If the differences flip between negative AND positive (e.g. −2, −4, **+6**, −8, −10, **+12**), the rule is **'subtract, subtract, add'** that repeats."
      - "**Clue 2** — If every 2nd / every 3rd number forms its own neat sequence, the original is **two or three interleaved sub-sequences**. Look at positions **1, 3, 5…** separately from **2, 4, 6…**"
      - "**Clue 3** — Always compare your answer to the **NEXT given number**. If your rule doesn't predict it correctly, your rule is wrong."
    scoringExample:
      scenario: >-
        Find the missing number: **950, 947, 941, 950, 938, 923, 941,
        920, 896, 923, ____, 860**
      oneMark:
        label: Wrong guess
        text: "896 (just copying an earlier number)"
      fullMarks:
        label: Full marks (the trick)
        text: >-
          The differences are −3, −6, **+9**, −12, −15, **+18**, −21,
          −24, **+27**, … Pattern = **subtract, subtract, add**, with
          the gap growing by 3 each step. Last move was +27 → 923.
          Next move: −30 → **893**. Check: 893 − 33 = 860 ✓
    callout: >-
      If a sequence looks "random", the rule is hiding. Look for a
      REPEATING set of operations, not a single rule.

  - title: "3: Find the nth term — divide, then look at the remainder"
    mascotImage: /master-class/patterns/panda-teaching-nth-term.png
    body: >-
      "What is the **80th letter**?" or "What is the **74th bead**?"
      These questions look impossible because you'd have to write out
      80 things. You don't. There's a 3-step shortcut.
    bullets:
      - "**Step 1** — Find the **cycle length**. How many items make up ONE repeat of the pattern?"
      - "**Step 2** — Divide the position you want by the cycle length. Note the **remainder**."
      - "**Step 3** — The remainder tells you which item in the cycle to land on. (If remainder = 0, the answer is the **last** item of the cycle.)"
    scoringExample:
      scenario: >-
        The pattern is **A B C D E F G** repeating. What is the **80th
        letter**?
      oneMark:
        label: Brute force
        text: "(Writing it out 80 times → easy to miscount)"
      fullMarks:
        label: Full marks
        text: >-
          Cycle length = **7**. 80 ÷ 7 = **11 remainder 3**. So 80 is
          the **3rd letter** of the 12th cycle → **C**.
    callout: >-
      Remainder 0 = the **last** item in the cycle, NOT the first.
      The most common off-by-one mistake on nth-term questions.

  - title: "4: Figure-based patterns — the longest section, because this is the hardest"
    mascotImage: /master-class/patterns/panda-teaching-figures.png
    body: >-
      Figure-based patterns are the trickiest pattern questions on the
      paper. The diagram is full of dots / sticks / tiles / circles and
      it's easy to panic. The cure is a single discipline: **stop
      counting from the diagram. Build a TABLE.** Once the first 3-4
      rows of the table are filled in, the formula reveals itself.
      Here are the 5 patterns you'll see most often, with worked
      examples.
    bullets:
      - "**Pattern type A — Linear (constant difference)**. Each figure adds the SAME number of objects to the previous one. Formula: count = first + (n − 1) × d, where d is the constant difference."
      - "**Pattern type B — Increasing difference / triangular numbers** (1, 3, 6, 10, 15…). Each figure adds ONE MORE than the previous one (+2, +3, +4, +5). Formula: count = n × (n + 1) ÷ 2."
      - "**Pattern type C — Square numbers** (1, 4, 9, 16, 25…). Differences are consecutive ODD numbers (+3, +5, +7, +9). Formula: count = n². Or sometimes (n + 1)² depending on how the figures are labelled."
      - "**Pattern type D — Two sub-counts** (e.g. dots increase by 3, lines increase by 4). Build TWO tables, find the rule for each, then add at the end if needed."
      - |-
        **The fixed 4-step method** for any figure question:
           • **Step 1** — Make a table: Figure no. | Count. Fill the first 3-4 rows from the diagram.
           • **Step 2** — Look at the **differences** between consecutive counts. Constant → Type A. Growing by 1 each step → Type B. Differences are consecutive odd numbers (3, 5, 7, 9) → Type C.
           • **Step 3** — Pick a formula candidate from the 5 types. Plug in n = 1, 2, 3 to **verify** it matches your table.
           • **Step 4** — Apply the formula to the target figure (Figure 10, Figure 20, Figure 50). Show the substitution clearly — markers want to see your working, not just the answer.
    callout: >-
      **The single most important habit:** before you do ANYTHING else,
      write the table. Three columns: Figure no. | Count | Difference.
      90% of figure questions crack open the moment that table is on
      the page. The remaining 10% need you to split into TWO tables
      (one per colour / object) and apply the same method to each.

  - title: "Now let's see it in action — 3 real worked examples"
    mascotImage: /master-class/patterns/panda-teaching-action.png
    body: >-
      The theory is one thing. The marking scheme doesn't care if you
      know the 5 pattern types — it cares about the **working**. So
      we'll apply the same 4-step method to 3 real prelim / WA
      questions, with the original diagrams. Each one shows the
      **exact question**, the **table** to draw, and the **formula**
      that falls out.
    bullets:
      - "**Coming up:** increasing difference (beads in rows), squared differences (squares in a grid), and constant difference (sticks to make figures)."
      - "**Same recipe every time** — read the question → build the table → list the differences → derive the formula → verify → apply to the target figure."
    callout: >-
      Pause and try each one on paper before reading the answer. The
      point isn't to memorise the result — it's to build the habit.

  - title: "Worked example 1 — Beads in rows (increasing difference)"
    body: >-
      **P5 Tao Nan EOY 2023.** Beads are arranged in rows: row n
      contains n beads. Figure 1 is just row 1, Figure 2 is rows 1-2,
      Figure 3 is rows 1-3, and so on. **Find the TOTAL number of
      beads (grey + white) in Figure 10.**
    diagramImage: /master-class/patterns/pattern-b-beads.png
    bullets:
      - |-
        **Step 1 — Read the current table from the diagram.** Count all the beads in each figure shown.
           • Figure 1 → 1 bead
           • Figure 2 → 3 beads (1 + 2)
           • Figure 3 → 6 beads (1 + 2 + 3)
           • Figure 4 → 10 beads (1 + 2 + 3 + 4)
      - |-
        **Step 2 — Extend the table by working out the next rows.** Differences: 3 − 1 = **2**, 6 − 3 = **3**, 10 − 6 = **4**. **The difference INCREASES by 1 each step** (next: +5, +6, +7…).
           • Figure 5 → 10 + 5 = **15 beads**
           • Figure 6 → 15 + 6 = **21 beads**
           • Figure 7 → 21 + 7 = **28 beads**
           • Figure 8 → 28 + 8 = **36 beads**
           • Figure 9 → 36 + 9 = **45 beads**
           • Figure 10 → 45 + 10 = **55 beads**
      - |-
        **Step 3 — Derive the formula.** Figure n total = 1 + 2 + 3 + … + n. Use the **sum formula** (first + last) × count ÷ 2.
           • Total in Figure n = (1 + n) × n ÷ 2 = **n × (n + 1) ÷ 2**.
           • Check F4: 4 × 5 ÷ 2 = 10 ✓. F10: 10 × 11 ÷ 2 = 55 ✓.
      - "**Step 4 — Answer.** Figure 10 → 10 × 11 ÷ 2 = **55 beads**. ✓ matches the row we extended in Step 2."
    callout: >-
      **Take-away:** when each step ADDS one more than the previous
      (+2, +3, +4, +5…), the total is a **triangular number** and the
      shortcut formula is **n × (n + 1) ÷ 2**. No need to add 10
      numbers one at a time on the exam.

  - title: "Worked example 2 — Squares in a grid (squared differences)"
    body: >-
      **P6 Rosyth WA2 2023, 3 marks.** Squares form a growing n × n
      grid (Figure 1 is 1×1, Figure 2 is 2×2, and so on). **How many
      small squares in total are in Figure 8?**
    diagramImage: /master-class/patterns/pattern-c-squares.png
    bullets:
      - |-
        **Step 1 — Read the current table from the diagram.**
           • Figure 1 → 1 square
           • Figure 2 → 4 squares
           • Figure 3 → 9 squares
           • Figure 4 → 16 squares
           • Figure 5 → 25 squares
      - |-
        **Step 2 — Extend the table by working out the next rows.** Differences: 4 − 1 = **3**, 9 − 4 = **5**, 16 − 9 = **7**, 25 − 16 = **9**. Differences are growing by 2 — **consecutive odd numbers**.
           • Figure 6 → 25 + 11 = **36 squares**
           • Figure 7 → 36 + 13 = **49 squares**
           • Figure 8 → 49 + 15 = **64 squares**
      - |-
        **Step 3 — Derive the formula.** Consecutive odd-number differences is the **fingerprint of square numbers**. Check the totals against n × n.
           • 1 × 1 = 1 ✓, 2 × 2 = 4 ✓, 3 × 3 = 9 ✓, 4 × 4 = 16 ✓, 5 × 5 = 25 ✓.
           • Formula: **Total in Figure n = n × n = n²**.
      - "**Step 4 — Answer.** Figure 8 total = 8 × 8 = **64 squares**. ✓ matches the row we extended in Step 2."
    callout: >-
      **Take-away:** when the differences are consecutive odd numbers
      (3, 5, 7, 9…), the totals are square numbers. Differences-of-
      differences = 2 — the calling card of n².

  - title: "Worked example 3 — Sticks to make the figures (constant difference)"
    body: >-
      **P6 Raffles Girls WA1 2023, 3 marks.** Ahmad uses sticks to
      build figures: each figure has squares with a triangle on top
      and bottom. **(a)** How many sticks for Figure 4?
      **(b)** Ahmad noticed that one figure uses 2 507 sticks. Which
      figure number is it?
    diagramImage: /master-class/patterns/pattern-sticks-triangles.png
    bullets:
      - |-
        **Step 1 — Read the current table from the diagram.** Count the sticks in each figure shown.
           • Figure 1 → 8 sticks
           • Figure 2 → 15 sticks
           • Figure 3 → 22 sticks
      - |-
        **Step 2 — Extend the table by working out the next rows.** Differences: 15 − 8 = **7**, 22 − 15 = **7**. Constant — every new figure adds another square + 2 triangles = **+7 sticks**.
           • Figure 4 → 22 + 7 = **29 sticks**
           • Figure 5 → 29 + 7 = **36 sticks**
           • Figure 6 → 36 + 7 = **43 sticks**
      - |-
        **Step 3 — Derive the formula.** From Figure 1 (= 8 sticks), each later figure adds 7 more.
           • Sticks in Figure n = 8 + 7 × (n − 1) = **7n + 1**.
           • Check F1: 7(1) + 1 = 8 ✓. F3: 7(3) + 1 = 22 ✓.
      - |-
        **Step 4 — Answer.**
           • **(a)** Figure 4 → 7(4) + 1 = **29 sticks** ✓ (matches the row we extended in Step 2).
           • **(b)** Solve 7n + 1 = 2 507 → 7n = 2 506 → n = 2 506 ÷ 7 = **N = 358**.
    callout: >-
      **Take-away:** when each figure adds the SAME number of sticks
      every step (here, +7), the formula is **(constant) × n +
      (starting offset)** — in this case 7n + 1. Same 4-step recipe
      as the bead and squares questions; just a different constant.

  - title: "Let's get some practice!"
    mascotImage: /master-class/patterns/panda-cta.png
    body: >-
      Time to try some real pattern questions from P4–P6 school papers.
      Mix of MCQ and OEQ across every flavour we just covered.
    bullets:
      - "**6 MCQ** + **4 OEQ** — a real cross-section of pattern questions from the bank."
      - After you submit, the AI flags the trick families you got wrong and suggests a follow-up focused quiz on those.
      - "Mistakes are saved — we'll return to them in an auto-revision session in **1 week**."
    cta:
      label: Click here to start your practice quiz
      quizSpec:
        title: "Mastery: Patterns Quiz 1"
        mcq: 6
        oeq: 4

commonMistakes: []

# ────────────────────────────────────────────────────────────────────
# KEY WORDS  (hover-for-definition pills shown above the deck)
# ────────────────────────────────────────────────────────────────────
keyWords:
  - { word: term, definition: "Each individual number / item in a sequence. The 1st term, 2nd term, etc." }
  - { word: nth term, definition: "The term at position n. 'Find the 80th letter' = find the term at the 80th position." }
  - { word: cycle, definition: "A repeating group of items. In 'A B C A B C A B C', the cycle is 'A B C' with cycle length 3." }
  - { word: difference, definition: "Subtract one term from the previous one. Differences often reveal the rule of a sequence." }
  - { word: remainder, definition: "What's left after a division. Key tool for nth-term questions: 80 ÷ 7 = 11 remainder 3." }
  - { word: consecutive, definition: "Next to each other in a sequence. 5, 6, 7 are consecutive whole numbers." }
  - { word: linear pattern, definition: "Every step adds (or subtracts) the same amount. Simplest kind of pattern." }
  - { word: figure number, definition: "The label of each step in a figure-based pattern. Figure 1, Figure 2, Figure 3..." }

# ────────────────────────────────────────────────────────────────────
# SUB-TOPICS  (used by the classifier + mastery-quiz pickers)
# slideIdx is the 0-based position into keyConcepts.
# ────────────────────────────────────────────────────────────────────
subTopics:
  - id: constant-difference
    label: "Patterns: constant difference"
    description: "Number sequences where every step adds (or subtracts) the same amount. Linear add/subtract patterns plus place-value rebuilds (e.g. 12 608 = 10 000 + 2000 + ? + 8). Solved by writing the differences between consecutive terms and confirming they're all equal."
    slideIdx: 1
  - id: changing-difference
    label: "Patterns: changing difference"
    description: "Sequences where the differences themselves change — they flip sign (subtract-subtract-add repeats), grow each step (triangular / square / cubic), or hide two interleaved sub-sequences in one list. Trick is to find the repeating sub-rule or look at every-other term."
    slideIdx: 2
  - id: string-of-symbols
    label: "Patterns: string of symbols"
    description: "Repeating sequences of letters / beads / shapes / colours. Questions ask 'what is the 80th letter / 74th bead / 105th term?'. Solved by finding the cycle length, dividing the target position, and using the remainder."
    slideIdx: 3
  - id: figure-patterns
    label: "Figure patterns"
    description: "'Figure 1, Figure 2, Figure 3…' with objects (tiles, dots, beads, circles, squares) growing. Asks for the count in Figure n, OR the total area / perimeter. Solved by tabling the first 3-4 figures, listing differences, and matching to a formula (linear, triangular, n², or sum of two squares)."
    slideIdx: 4
