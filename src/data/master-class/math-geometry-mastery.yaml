# Master Class: PSLE Math — Geometry Mastery (Shape Properties, Symmetry & Nets)
# -------------------------------------------------------------------------------
# Sequel to math-geometry-angles. That class taught the 5 generic angle
# patterns (basics, parallel lines, isosceles, two-shape glue, folded
# paper). This class drills the three specific PSLE workloads that the
# generic patterns don't fully cover:
#
#   1) Shape-property angle hunts — parallelogram, rhombus, trapezium,
#      isosceles. The "know the shape rules cold" topic.
#   2) Symmetry + reflection — lines of symmetry, folded-paper angles
#      (folding = reflection in action).
#   3) Nets of solids — cuboid, triangular prism, pyramid, cylinder.
#
# Pool reality (PSLE + P6 prelims, Geometry-tagged):
#   - shape-property angle hunts: 96 questions (7 MCQ, 89 OEQ)
#   - symmetry / reflection / fold: 31 questions (12 MCQ, 19 OEQ)
#   - nets of solids: 16 questions (7 MCQ, 9 OEQ)
#
# Quiz spec (18 questions):
#   - 6 MCQ — 2 from each subtopic (round-robin)
#   - 12 OEQ — 8 shape-property + 2 symmetry-reflection + 2 nets
#
# Slide flow (8 slides):
#   0  Welcome — 3 workloads
#   1  Shape-property cheat sheet (the rules for each shape)
#   2  Shape-property worked example A — parallelogram + isosceles
#   3  Shape-property worked example B — trapezium angle hunt
#   4  Symmetry & reflection basics + folded-paper trick
#   5  Symmetry/reflection worked example
#   6  Nets of solids — read the net, count faces, fold mentally
#   7  Practice CTA

