keyWords:
  - { word: "parallelogram", definition: "Four-sided shape with both pairs of opposite sides parallel. Opposite sides equal, opposite angles equal, adjacent angles sum to 180°. Diagonals bisect each other (NOT at 90° in general)." }
  - { word: "rhombus", definition: "Four-sided shape with ALL 4 sides equal. Opposite angles equal, adjacent angles sum to 180°. Diagonals bisect at 90° AND bisect each corner angle." }
  - { word: "trapezium", definition: "Four-sided shape with exactly ONE pair of parallel sides. In PSLE, not usually isosceles unless the figure explicitly marks the equal legs." }
  - { word: "isosceles triangle", definition: "Triangle with 2 sides equal. The 2 base angles (across from the equal sides) are EQUAL. Sum of all 3 angles = 180°." }
  - { word: "equilateral triangle", definition: "Triangle with all 3 sides equal. All 3 angles are 60°. Use as a 'free anchor' whenever it appears in a figure." }
  - { word: "line of symmetry", definition: "A line along which a figure can be folded so the two halves match exactly. Square has 4 lines of symmetry; rectangle 2; equilateral triangle 3; parallelogram (non-rhombus) 0." }
  - { word: "reflection", definition: "A mirror image of a figure across a line. Reflection preserves length AND angle — the reflected side is the same length and the reflected angle is the same size." }
  - { word: "folded paper", definition: "PSLE technique where a corner is folded so it lands on another point. The fold creates equal sides (folding preserves length), which often makes a hidden isosceles or equilateral triangle." }
  - { word: "net of a solid", definition: "The solid 'unfolded' onto a flat sheet. Cuboid has 6 rectangles (3 pairs). Cube has 6 squares (11 distinct nets). Triangular prism has 2 triangles + 3 rectangles. Square pyramid has 1 square + 4 triangles." }

