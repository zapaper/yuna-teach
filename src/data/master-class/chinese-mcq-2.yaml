  # ─── 5. 关联词 ─────────────────────────────────────────────────────
  - title: "5: 关联词 — 5 种关系记 5 组词"
    mascotImage: /master-class/chinese-mcq-2/panda-teaching-connectors.png
    body: >-
      关联词就是连接两个句子的词, 像桥梁一样。每对关联词代表一种关系。
      关键是看第二个句子, 判断它和第一个句子是什么关系。
    bullets:
      - |-
        **因果关系 (第二句是第一句的结果)**
           • **因为……所以……** / **由于……因此……**
           • 例:**因为**下雨了, **所以**我们不出去玩。
      - |-
        **转折关系 (两句意思相反)**
           • **虽然……但是……** / **尽管……还是……** / **即使……也……**
           • 例:**虽然**我很累, **但是**我还是要做完功课。
      - |-
        **条件关系 (有 A 才有 B)**
           • **只要……就……** / **只有……才……** / **要是……就……**
           • 例:**只有**努力学习, **才**能考好成绩。
      - |-
        **递进关系 (B 比 A 更进一步)**
           • **不但……而且……** / **不但……还……**
           • **不但……反而……** (注意:这个表示和预期相反!)
           • 例:他**不但**不道歉, **反而**还动手打人。
      - |-
        **解题方法:先读第二个句子, 判断和第一句的关系, 再选对应的关联词。**
    callout: >-
      关联词总共就 10-15 对, 数量少。把这些背熟, 这 2 分稳拿。

  - title: 试一试 — 关联词 (2 道真题)
    mascotImage: /master-class/chinese-mcq-2/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2024 Q9 — 单个关联词"
        stem: |-
          ___ 这件事很麻烦, 国立需要同学们的帮忙。
        options:
          - 由于
          - 只要
          - 不仅
          - 尽管
        correctAnswer: 1
        explanation: >-
          第二句"国立需要同学们的帮忙"是第一句"事情麻烦"的**结果** →
          因果关系 → **由于**。**只要**(条件)、**不仅**(递进)、**尽管**
          (转折)都不对。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "PSLE 2019 Q10 — 配对关联词"
        stem: |-
          日华得奖后, ___ 不骄傲, ___ 比以前更加努力。
        options:
          - 虽然……但是
          - 不但……反而
          - 不是……而是
          - 因为……所以
        correctAnswer: 2
        explanation: >-
          "不骄傲"和"更加努力"是**两个意外的好行为** → 用 **不但……反而**
          (本来以为他会骄傲, 反而更努力, 表示"反过来")。**虽然但是**是
          转折, 但意思不对;**不是而是**是选择, **因为所以**是因果, 都不合。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png

  # ─── 6. 句子完成 ───────────────────────────────────────────────────
  - title: "6: 句子完成 — 找语义的对接点"
    mascotImage: /master-class/chinese-mcq-2/panda-teaching-completion.png
    body: >-
      Q11 和 Q12 给你半个句子, 让你选另一半。看似简单, 其实很多同学被
      "听起来通顺"骗了。关键不是"语法通顺", 而是"意思对得上"。
    bullets:
      - |-
        **Q11 (空格在开头):** 给你后半句的结果 / 情况, 选合适的前半句。
           • 例:"___, 那是我最开心的一天。"
           • 后半句说"最开心的一天" → 前半句要描述一件让人开心的事
           • 正确:"老师带我们全班去海边野餐"
           • 错误:"爸爸很想带全家人出国旅行" (只是想, 没发生, 不能是"最开心的一天")
      - |-
        **Q12 (空格在结尾):** 给你前半句的情况, 选合适的后半句。
           • 例:"忙了一个星期, ___。"
           • 前半句描述"忙了一周" → 后半句要是和忙了一周相关的结果或感受
           • 正确:"大家都盼望周末的到来"
           • 错误:"爸爸每天都去公司上班" (这只是描述, 没有"忙完一周后"的语义)
      - |-
        **解题方法:**
           • 先找前 (或后) 半句的**关键词** (开心、忙、生气、感动……)
           • 再选另一半句子, 看它是否和这个关键词**有因果或情感关联**
           • 4 个选项里通常有 2 个"听起来通顺", 但只有 1 个意思对得上
      - |-
        **常见陷阱:**
           • 选项 A 听起来通顺, 但和前 / 后半句**没有关联**
           • 选项 B 描述了不同的事情
           • 选项 C 是合理的, 但不是题目暗示的那个意思
    callout: >-
      听起来通顺 ≠ 答案对。要看意思是不是真的接得上。

  - title: 试一试 — 句子完成 (2 道真题)
    mascotImage: /master-class/chinese-mcq-2/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2024 Q11 — 空格在开头"
        stem: |-
          ___, 那是我最开心的一天。
        options:
          - 爸爸很想带全家人出国旅行
          - 同学们在讨论明天一起看戏
          - 我决定从今天起去公园跑步
          - 老师带我们全班去海边野餐
        correctAnswer: 4
        explanation: >-
          后半句"最开心的一天"需要一件**已经发生的开心事**。**老师带全班
          去海边野餐**就是这样的事件。**爸爸很想**(只是想, 没去)、
          **同学讨论看戏**(还没去)、**决定去跑步**(都是计划, 不是开心
          的一天本身)。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "PSLE 2024 Q12 — 空格在结尾"
        stem: |-
          忙了一个星期, ___。
        options:
          - 爸爸每天都去公司上班
          - 大家都盼望周末的到来
          - 休息是为了走更远的路
          - 工作总是堆成一座小山
        correctAnswer: 2
        explanation: >-
          "忙了一个星期"暗示**疲惫、想休息** → 后半句应该是"大家盼望
          周末" (因果关联)。其他三个虽然合理, 但和"忙了一周"没有直接的
          因果或感受关联。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png

  # ─── 7. 词语应用 ───────────────────────────────────────────────────
  - title: "7: 词语应用 — 看它和什么词搭配"
    mascotImage: /master-class/chinese-mcq-2/panda-teaching-usage.png
    body: >-
      Q13-Q15 的题型:同一个词出现在 4 个不同的句子里, 你要选哪一个
      用对了。最难的就在这里——每个词都有它"喜欢搭配"的对象。用对对象,
      句子就对;用错对象, 句子就别扭。
    bullets:
      - |-
        **关键思路:每个词都有它的"搭配伙伴"。**
           • **严格** + **要求** ✓ (妈妈对我的要求很严格)
           • **严格** + **目光** ✗ (目光不能严格)
           • **严格** + **表情** ✗ (表情不能严格)
      - |-
        **看主语 / 宾语对不对:**
           • **能干** 形容**人**, 不形容动作:
             ✓ 丽丽是个**能干**的女孩
             ✗ 爸爸真**能干**, 一小时登上山顶 (能干不是用来形容"登山速度")
           • **马虎** 形容**做事的态度**, 不形容人本身或结果:
             ✓ 做事不能**马虎**
             ✗ 他是个**马虎**的人 / 他**马虎**的技术
      - |-
        **常考词的搭配 (要背) — 这些都是 PSLE 真题考过的:**
           • **遵守** 配 规则、规定、法律、纪律、诺言 (✗ 不配人:不能说"遵守朋友")
           • **珍惜** 配 时间、友谊、机会、生命 (✗ 不配具体物品:不能说"珍惜文件")
           • **精彩** 配 表演、比赛、故事、演讲 (✗ 不配成绩 / 颜色:不能说"精彩的成绩")
           • **气氛** 配 节日、晚会、比赛 — 形容场合的感觉 (✗ 不能说"清新的气氛", 清新是形容**空气**的)
           • **控制** 配 情绪、脾气、速度、体重 (✗ 不配抽象状态:不能说"控制健康")
      - |-
        **解题方法:**
           1. 看每个选项里, 这个词配的对象 (主语或宾语) 是什么
           2. 想:这个对象能不能搭配这个词?
           3. 排除"对象不对的"选项, 剩下的就是答案
    callout: >-
      Q13-Q15 是 Booklet A 最容易丢分的 3 分。词的搭配习惯, 平时阅读时
      多留意。

  - title: 试一试 — 词语应用 (2 道真题)
    mascotImage: /master-class/chinese-mcq-2/panda-thinking.png
    interactiveQuiz:
      - label: "PSLE 2024 Q13 — \"马虎\"的搭配"
        stem: |-
          以下哪一个句子是正确的?
        options:
          - 不管做什么事情都要认真, 不能马虎。
          - 他不遵守交通规则, 真是个马虎的人。
          - 明华修车的技术很马虎, 车子常出问题。
          - 同学们的画马虎得很, 被美术老师批评。
        correctAnswer: 1
        explanation: >-
          **马虎**形容"做事的态度", 不形容"人本身"或"技术好坏"。
          (1) "做事……不能马虎" ✓ (形容做事的态度)。(2) "马虎的人" ✗
          ("马虎"不形容人, 应该说"做事马虎的人")。(3) "技术很马虎" ✗
          (技术只有"好/差", 不是"马虎/不马虎")。(4) "马虎得很" ✗ (画不能
          "马虎得很")。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "PSLE 2023 Q15 — \"神机妙算\"的搭配"
        stem: |-
          以下哪一个句子是正确的?
        options:
          - 他最喜欢神机妙算, 数学成绩总是全班最好。
          - 小月可以神机妙算, 什么东西都能一学就会。
          - 爸爸经过神机妙算, 发现弟弟可以吃得更多。
          - 叔叔真是神机妙算, 小偷果然躲在这间房里。
        correctAnswer: 4
        explanation: >-
          **神机妙算**形容"对未来的预测准确得让人吃惊"。(1) 数学好不等于
          预测准。(2) 一学就会是聪明, 不是预测准。(3) "发现弟弟可以吃得
          更多"不是预测。(4) 叔叔预测了小偷的位置, 结果"果然"正确 →
          神机妙算 ✓。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png

  # ─── 8. 短文填空 ───────────────────────────────────────────────────
  - title: "8: 短文填空 — 先读全文, 再回头填"
    mascotImage: /master-class/chinese-mcq-2/panda-teaching-cloze.png
    body: >-
      Q16-Q20 是一段短文 (大约 200 字), 中间有 5 个空, 每个空 4 个选项。
      短文填空考的是"词在文中怎么用", 不是"词的意思是什么"。
    bullets:
      - |-
        **第一步:先把整段读一遍, 别先看空。**
           • 这一段在讲什么? (一个孩子做了一件事?一个家庭的故事?)
           • 主要的人物、事件、感受是什么?
           • 读完整段, 才有"全局感"
      - |-
        **第二步:一个空一个空填, 看上下文。**
           • 看空格**前后 5-10 个字**, 而不是只看空格那一句
           • 上文是讲什么的?下文是讲什么的?
           • 空格里应该填一个"承上启下"的词
      - |-
        **第三步:4 个选项一个一个代入读一遍。**
           • 读起来"自然通顺"才对
           • 不自然的选项就排除
           • 通常 2 个选项明显不对, 在剩下 2 个里再细比
      - |-
        **常考的词类型:**
           • 动词 (主角的动作:思考、决定、害怕、惭愧……)
           • 关联词 (虽然、所以、于是、可是……)
           • 形容词 (突然、立刻、慢慢、忽然……)
           • 量词或语气词
      - |-
        **最大的陷阱:近义词。**
           • 4 个选项可能意思都相近, 但只有一个最合适。
           • 比如:**惭愧** vs **后悔** vs **难过** vs **害怕** — 都和负面
             情绪有关, 但要看具体语境。
    callout: >-
      短文填空总分 5 分, 是 Booklet A 最大的单一题型分数。读全段 → 看
      上下文 → 代入验证, 三步法。

  - title: 试一试 — 短文填空 (1 段完整短文 + 5 道真题)
    mascotImage: /master-class/chinese-mcq-2/panda-thinking.png
    body: >-
      **下面是一段短文, 中间有 5 个编号空格 (① ② ③ ④ ⑤)。**
      把每个空对应的题目都做了。完整短文如下:
      ---
      昨天放学后, 我看见小明垂头丧气地坐在操场的角落。我走过去问他:
      "你 ___① 什么了?" 他低着头说:"我把数学测验考砸了。" 我心里 ___②
      他, 想了想说:"___③ 看一次, 也许下次就会进步了。" 听了我的话, 他
      ___④ 抬起头来, 露出 ___⑤ 的笑容。
      ---
      ⓘ 这道题用的不是真的 PSLE 题, 是 Yuna 老师写的练习题 (PSLE 真题
      的短文每年都换)。
    interactiveQuiz:
      - label: "短文填空练习 — 空 ①"
        stem: |-
          "你 ___① 什么了?"
        options:
          - 怎么
          - 喜欢
          - 学了
          - 想去
        correctAnswer: 1
        explanation: >-
          看到小明垂头丧气, 朋友问"你怎么了" 是常用的关心话。其他三个都
          不符合关心朋友的语境。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "短文填空练习 — 空 ②"
        stem: |-
          "我心里 ___② 他"
        options:
          - 妒忌
          - 同情
          - 害怕
          - 讨厌
        correctAnswer: 2
        explanation: >-
          朋友考砸了, "我"应该是**同情**他, 而不是妒忌 / 害怕 / 讨厌他。
          这是看人际语境。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "短文填空练习 — 空 ③"
        stem: |-
          "___③ 看一次, 也许下次就会进步了"
        options:
          - 偶尔
          - 再
          - 第一次
          - 不要
        correctAnswer: 2
        explanation: >-
          "也许下次就会进步" → 暗示要**再**做一次/再试一次。**偶尔**、
          **第一次**、**不要**都不和"也许下次进步"接得上。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "短文填空练习 — 空 ④"
        stem: |-
          "他 ___④ 抬起头来"
        options:
          - 慢慢
          - 突然
          - 立刻
          - 后悔
        correctAnswer: 1
        explanation: >-
          从垂头丧气到抬起头, 是一个**慢慢的**心情变化, 不会"突然"或
          "立刻"。**后悔**是情绪词, 不能修饰"抬起头"这个动作。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png
      - label: "短文填空练习 — 空 ⑤"
        stem: |-
          "露出 ___⑤ 的笑容"
        options:
          - 难过
          - 愤怒
          - 感激
          - 害怕
        correctAnswer: 3
        explanation: >-
          朋友安慰自己后, 心情好转, "露出**感激**的笑容"自然合理。
          **难过 / 愤怒 / 害怕**都和"笑容"矛盾。
        mascotCorrect: /master-class/chinese-mcq-2/panda-correct.png
        mascotWrong: /master-class/chinese-mcq-2/panda-wrong.png

  # ─── 练习 CTA ─────────────────────────────────────────────────────
  - title: 来做几道练习题吧!
    mascotImage: /master-class/chinese-mcq-2/panda-cta.png
    body: >-
      4 种题型都过了一遍, 现在来真刀真枪练一练。这套练习用的是 PSLE 真题
      + 学校模拟题, 每个小主题 5 道, 共 20 道。
    bullets:
      - |-
        **20 题** — 每个小主题 5 道
      - |-
        优先用 PSLE 真题, 不够再用学校模拟题补
      - |-
        交卷后, AI 会告诉你哪个小主题需要再加强
      - |-
        **做错的题会记下来** — 一周后自动复习
    cta:
