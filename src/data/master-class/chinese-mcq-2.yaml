commonMistakes: []

keyWords:
  - { word: 关联词, definition: "把两个句子连起来的词。表达因果、转折、条件等关系。例如:因为……所以、虽然……但是。" }
  - { word: 因果关系, definition: "前面是原因, 后面是结果。常用 \"因为……所以……\"。" }
  - { word: 转折关系, definition: "前后两句意思相反。常用 \"虽然……但是……\"。" }
  - { word: 条件关系, definition: "前面是条件, 后面是结果。常用 \"只要……就……\" 或 \"只有……才……\"。" }
  - { word: 递进关系, definition: "后面比前面更进一步。常用 \"不但……而且……\"。" }
  - { word: 搭配, definition: "一个词通常和哪些词一起用。比如 \"严格\" 配 \"要求\", 不配 \"目光\"。" }
  - { word: 语境, definition: "句子或文章的上下文。同一个词在不同语境里, 用法不同。" }

